MOD_OSBSLIDER_AUTOPLAY_INTERVAL_DESC="Temps en millisecondes entre les changements automatiques de diapositives (1000 à 30000)."

MOD_OSBSLIDER_TRANSITION_SPEED_LABEL="Vitesse de transition (ms)"
MOD_OSBSLIDER_TRANSITION_SPEED_DESC="Durée de l'animation de transition entre les diapositives, en millisecondes (100 à 3000)."

