; ── Fieldset labels ───────────────────────────────────────────────────────────
MOD_OSBSLIDER_FIELDSET_BASIC="Source des données"
MOD_OSBSLIDER_FIELDSET_SLIDER="Comportement du curseur"
MOD_OSBSLIDER_FIELDSET_CONTENT="Affichage du contenu"
MOD_OSBSLIDER_FIELDSET_APPEARANCE="Apparence"

