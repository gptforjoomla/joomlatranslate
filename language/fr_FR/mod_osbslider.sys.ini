MOD_OSBSLIDER_DATA_SOURCE_LABEL="Source des données"
MOD_OSBSLIDER_DATA_SOURCE_DESC="Choisissez le type d'éléments à afficher dans le curseur."
MOD_OSBSLIDER_SOURCE_SERVICES="Services"
MOD_OSBSLIDER_SOURCE_RESOURCES="Ressources"
MOD_OSBSLIDER_SOURCE_VENUES="Lieux"
MOD_OSBSLIDER_SOURCE_CATEGORIES="Catégories"

MOD_OSBSLIDER_ITEM_IDS_LABEL="Limiter aux ID"
