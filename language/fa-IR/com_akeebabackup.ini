COM_AKEEBABACKUP_PUSH_ENDBACKUP_WARNINGS_BODY="پشتیبان‌گیری از سایت «%s» واقع در %s در تاریخ %s توسط Akeeba Backup به پایان رسید، اما در طول فرایند هشدارهایی ثبت شده است. این هشدارها ممکن است به این معنا باشند که برخی فایل‌ها پشتیبان‌گیری نشده‌اند یا اگر نسخه پشتیبان را به‌صورت خودکار در فضای ذخیره‌سازی راه دور بارگذاری می‌کنید، عملیات بارگذاری با شکست مواجه شده باشد.\n\nلازم است هشدارها را بررسی کرده و از تکمیل موفقیت‌آمیز پشتیبان‌گیری اطمینان حاصل کنید. توصیه می‌کنیم هر نسخه پشتیبانی که همراه با هشدار ایجاد شده است را حتماً آزمایش کنید تا از صحت عملکرد آن مطمئن شوید. برای این کار می‌توانید آن را روی یک سرور محلی بازیابی کنید. به خاطر داشته باشید که یک نسخه پشتیبان آزمایش‌نشده، عملاً تفاوتی با نداشتن نسخه پشتیبان ندارد."
