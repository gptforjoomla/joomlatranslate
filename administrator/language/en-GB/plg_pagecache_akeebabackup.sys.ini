PLG_PAGECACHE_AKEEBABACKUP="Cache - Akeeba Backup JSON API"
PLG_PAGECACHE_AKEEBABACKUP_XML_DESCRIPTION="Disables Joomla's cache (as implemented by the System - Page Cache plugin) for the Akeeba Backup JSON API. You <strong>MUST</strong> keep this plugin enabled to use the Akeeba Backup JSON API –used to take backups remotely with Akeeba Panopticon, Akeeba Remote CLI, and third party services– when the System - Page Cache is enabled on your site."