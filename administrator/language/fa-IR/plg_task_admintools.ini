[PHPFileChangeScanner]
PLG_TASK_ADMINTOOLS_TASK_SCAN_TITLE="Admin Tools – اسکنر تغییرات فایل‌های PHP"
PLG_TASK_ADMINTOOLS_TASK_SCAN_DESC="سایت خود را با استفاده از اسکنر تغییرات فایل‌های PHP در Admin Tools از نظر فایل‌های PHP تغییر یافته و مشکوک بررسی کنید."

PLG_TASK_ADMINTOOLS_LBL_NOTE01="اعمال تغییر در حداکثر زمان اجرا مشمول محدودیت‌های زیر است: ۱. نمی‌تواند از حداکثر زمان اجرای PHP در سرور شما بیشتر باشد. ۲. نمی‌تواند از مقدار «مهلت اجرای وظیفه» که در تنظیمات «وظایف زمان‌بندی‌شده» تعیین شده است بیشتر باشد. ۳. نمی‌تواند برای اجرای CLI بیش از ۳۶۰۰ ثانیه و برای اجرای تحت وب بیش از ۱۰۰ ثانیه باشد. مقادیر خارج از این محدودیت‌ها به کمترین مقدار مجاز میان آن‌ها تنظیم خواهند شد."

PLG_TASK_ADMINTOOLS_LBL_TIME_LIMIT_CLI_LABEL="حداکثر زمان اجرا (CLI)"
PLG_TASK_ADMINTOOLS_LBL_TIME_LIMIT_CLI_DESC="حداکثر زمان اجرای هر مرحله از اسکن را هنگام اجرای وظیفه زمان‌بندی‌شده از طریق وظیفه CRON مبتنی بر CLI (دستور <code>scheduler:run</code>) بازنویسی می‌کند. برای استفاده از مقدار تعیین‌شده در اسکنر تغییرات فایل‌های PHP، مقدار ۰ را وارد کنید."

PLG_TASK_ADMINTOOLS_LBL_TIME_LIMIT_WEB_LABEL="حداکثر زمان اجرا (وب)"
PLG_TASK_ADMINTOOLS_LBL_TIME_LIMIT_WEB_DESC="حداکثر زمان اجرای هر مرحله از اسکن را هنگام اجرای وظیفه زمان‌بندی‌شده از طریق وب (از طریق URL یا «Web Cron» و همچنین روش «زمان‌بندی تنبل») بازنویسی می‌کند. برای استفاده از مقدار تعیین‌شده در اسکنر تغییرات فایل‌های PHP، مقدار ۰ را وارد کنید."

[RemoveOldLogEntries]
PLG_TASK_ADMINTOOLS_TASK_REMOVEOLDLOGENTRIES_TITLE="Admin Tools – پاک‌سازی گزارش درخواست‌های مسدودشده"
PLG_TASK_ADMINTOOLS_TASK_REMOVEOLDLOGENTRIES_DESC="ورودی‌های قدیمی گزارش درخواست‌های مسدودشده را حذف می‌کند."

PLG_TASK_ADMINTOOLS_LBL_MAXENTRIES_LABEL="حداکثر تعداد ورودی‌های گزارش"
PLG_TASK_ADMINTOOLS_LBL_MAXENTRIES_DESC="با اجرای این وظیفه، فقط این تعداد از جدیدترین ورودی‌های گزارش نگهداری شده و بقیه حذف خواهند شد."

[SessionOptimizer]
PLG_TASK_ADMINTOOLS_TASK_SESSIONOPTIMIZER_TITLE="Admin Tools – تعمیر و بهینه‌سازی جدول نشست"
PLG_TASK_ADMINTOOLS_TASK_SESSIONOPTIMIZER_DESC="جدول پایگاه داده <code>#__session</code> (فراداده نشست‌ها) را تعمیر و بهینه‌سازی می‌کند تا از بروز مشکلات دسترسی به سایت در سایت‌های با ترافیک متوسط تا بسیار زیاد جلوگیری شود."

[SessionCleaner]
PLG_TASK_ADMINTOOLS_TASK_SESSIONCLEANER_TITLE="Admin Tools – پاک‌سازی فراداده نشست‌ها"
PLG_TASK_ADMINTOOLS_TASK_SESSIONCLEANER_DESC="فراداده منقضی‌شده نشست‌ها را با حذف رکوردهای قدیمی از جدول <code>#__session</code> پایگاه داده پاک‌سازی می‌کند."

[CacheCleaner]
PLG_TASK_ADMINTOOLS_TASK_CACHECLEANER_TITLE="Admin Tools – پاک‌سازی حافظه کش"
PLG_TASK_ADMINTOOLS_TASK_CACHECLEANER_DESC="حافظه کش جوملا را پاک می‌کند. می‌توانید کل کش یا فقط موارد منقضی‌شده را حذف کنید."

PLG_TASK_ADMINTOOLS_TASK_CACHECLEANER_TYPE="نوع پاک‌سازی"
PLG_TASK_ADMINTOOLS_TASK_CACHECLEANER_TYPE_DESC="نحوه پاک‌سازی حافظه کش جوملا را انتخاب کنید. گزینه «فقط موارد منقضی‌شده» تنها موارد منقضی‌شده را حذف می‌کند. گزینه «حذف همه» تمام موارد موجود در کش را حذف می‌کند. <strong>نکته مهم:</strong> این وظیفه فقط به مؤلفه کش جوملا دستور انجام عملیات را می‌دهد. حذف شدن موارد کش به نوع فضای ذخیره‌سازی کش و نحوه عملکرد خود جوملا بستگی دارد. اگر از صفحه مدیریت کش جوملا نیز امکان حذف موارد منقضی‌شده یا همه موارد وجود نداشته باشد، این وظیفه نیز قادر به انجام آن نخواهد بود."

PLG_TASK_ADMINTOOLS_TASK_CACHECLEANER_TYPE_CLEAN="حذف همه"
PLG_TASK_ADMINTOOLS_TASK_CACHECLEANER_TYPE_EXPIRE="فقط موارد منقضی‌شده"

[TempDirCleaner]
PLG_TASK_ADMINTOOLS_TASK_TEMPDIRCLEANER_TITLE="Admin Tools – پاک‌سازی پوشه موقت"
PLG_TASK_ADMINTOOLS_TASK_TEMPDIRCLEANER_DESC="محتویات پوشه موقت که بیش از یک دقیقه از ایجاد آن‌ها گذشته باشد را حذف می‌کند."

[DeleteInactiveUsers]
PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_TITLE="Admin Tools – حذف کاربران غیرفعال"
PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_DESC="حساب‌های کاربری غیرفعال را بر اساس معیارهای انتخابی حذف می‌کند."

PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_TYPE="حذف کاربران غیرفعال"
PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_TYPE_DESC="کاربرانی را که ثبت‌نام کرده‌اند اما تا مدت زمان مشخصی هرگز وارد سایت نشده‌اند، به‌صورت خودکار حذف می‌کند."

PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_BLOCKED="فقط کاربرانی که حساب خود را فعال کرده‌اند اما هرگز وارد نشده‌اند"
PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_NOTACTIVATED="فقط کاربرانی که حساب خود را فعال نکرده‌اند"
PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_BOTH="فعال کرده باشند یا نه، تا زمانی که وارد سایت نشده باشند"

PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_DAYS="حذف پس از این تعداد روز"
PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_DAYS_DESC="اگر کاربر تا این تعداد روز پس از ثبت‌نام هنوز وارد سایت نشده باشد، حساب او حذف خواهد شد."

PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_GROUPS="محدود به گروه‌های کاربری"
PLG_TASK_ADMINTOOLS_TASK_DELETEINACTIVEUSERS_GROUPS_DESC="فقط کاربران غیرفعالی را حذف می‌کند که عضو حداقل یکی از گروه‌های انتخاب‌شده باشند. اگر این گزینه را خالی بگذارید، همه کاربران غیرفعال بدون توجه به عضویت در گروه حذف خواهند شد. هشدار: گروه‌های «مدیر» یا «کاربران ویژه» را انتخاب نکنید، مگر اینکه کاملاً مطمئن باشید هیچ حساب مدیریتی معتبر حذف نخواهد شد."

[AutoImport]
PLG_TASK_ADMINTOOLS_TASK_AUTOIMPORT_TITLE="Admin Tools – درون‌ریزی خودکار تنظیمات"
PLG_TASK_ADMINTOOLS_TASK_AUTOIMPORT_DESC="تنظیمات Admin Tools را به‌صورت خودکار از یک نشانی اینترنتی (URL) درون‌ریزی می‌کند."

PLG_TASK_ADMINTOOLS_TASK_AUTOIMPORT_URL="نشانی اینترنتی (URL) درون‌ریزی خودکار"
PLG_TASK_ADMINTOOLS_TASK_AUTOIMPORT_URL_DESC="تنظیمات خود را با قابلیت «برون‌بری» در Admin Tools صادر کنید. فایل JSON ایجادشده را در محلی بارگذاری کنید که از طریق وب در دسترس عموم باشد. سپس نشانی اینترنتی آن فایل JSON را در سایت‌های دیگر وارد کنید تا به‌صورت دوره‌ای دانلود و درون‌ریزی شود. این کار معادل دانلود فایل از آن نشانی و درون‌ریزی آن از طریق قابلیت «درون‌ریزی و برون‌بری» در Admin Tools است. با این قابلیت می‌توانید تنظیمات چندین نصب Admin Tools روی سایت‌های مختلف را با یکدیگر همگام‌سازی کنید."

