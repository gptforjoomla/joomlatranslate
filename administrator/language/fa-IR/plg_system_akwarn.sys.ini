PLG_SYSTEM_AKWARN="سیستم - هشدار بقایای بازیابی Akeeba Backup"
PLG_SYSTEM_AKWARN_XML_DESCRIPTION="این افزونه هر بار که از صفحه کنترل پنل Joomla بازدید می کنید، فایل‌های باقی مانده را برای بازیابی بایگانی Akeeba Backup در ریشه سایت خود بررسی می کند. وجود آنها را به شما هشدار می دهد و به شما امکان حذف آنها را می دهد."
