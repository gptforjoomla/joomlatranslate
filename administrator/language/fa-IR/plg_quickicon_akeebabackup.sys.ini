PLG_QUICKICON_AKEEBABACKUP="نماد سریع - اعلان Akeeba Backup"
PLG_QUICKICON_AKEEBABACKUP_XML_DESCRIPTION="یک نماد Akeeba Backup را در بک‌اند سرپرست شما نمایش می‌دهد و به شما اطلاع می‌دهد که پشتیبان‌گیری عقب افتاده است (قابل تنظیم)."

PLG_QUICKICON_AKEEBABACKUP_GROUP_DESC="گروه این افزونه (این مقدار با مقدار گروهی که در ماژول های <strong>Quick Icons</strong> برای تزریق آیکون ها استفاده می شود مقایسه می شود)"
PLG_QUICKICON_AKEEBABACKUP_GROUP_LABEL="گروه"

PLG_QUICKICON_AKEEBABACKUP_LBL_WARNINGS="فعال کردن نماد هشدار"
PLG_QUICKICON_AKEEBABACKUP_DESC_WARNINGS="هنگامی که فعال باشد، نماد نشان‌واره Akeeba Backup یک علامت هشدار کوچک را در صورت عدم موفقیت یا قدیمی بودن پشتیبان‌گیری نشان می‌دهد (به زیر مراجعه کنید)."
PLG_QUICKICON_AKEEBABACKUP_LBL_WARNFAILED="هشدار در مورد پشتیبان‌گیری ناموفق"
PLG_QUICKICON_AKEEBABACKUP_DESC_WARNFAILED="هنگامی که هر دو گزینه و گزینه های قبلی فعال هستند، در صورت عدم موفقیت آخرین نسخه پشتیبان، یک نماد هشدار نمایش داده می شود."
PLG_QUICKICON_AKEEBABACKUP_LBL_PERIOD="زمان پشتیبان‌گیری قدیمی، بر حسب ساعت"
PLG_QUICKICON_AKEEBABACKUP_DESC_PERIOD="اگر این چند ساعت از آخرین پشتیبان‌گیری موفق گذشته باشد، فرض کنید که یک نسخه پشتیبان قدیمی است. اگر نسخه پشتیبان قدیمی باشد، اگر گزینه اول فعال باشد، یک نماد هشدار نمایش داده می شود."

PLG_QUICKICON_AKEEBABACKUP_PROFILE_LABEL="نمایه پشتیبان"
PLG_QUICKICON_AKEEBABACKUP_PROFILE_DESC="نمایه پشتیبان‌گیری را انتخاب کنید که با کلیک روی نماد پشتیبان‌گیری، از آن برای تهیه نسخه پشتیبان کامل از سایت استفاده می‌شود."
