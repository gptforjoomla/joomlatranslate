COM_AKEEBABACKUP_ACCESS_DOWNLOAD_LBL="دانلود کنید"
COM_AKEEBABACKUP_ACCESS_DOWNLOAD_DESC="به دانلود، آپلود و مدیریت بایگانی های Akeeba Backup و همچنین استفاده از Site Transfer Wizard (در صورت وجود) اجازه می دهد."

