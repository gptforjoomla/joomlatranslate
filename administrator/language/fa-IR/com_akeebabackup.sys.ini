;; Custom menu items (backend menu editor)
;; ================================================================================
COM_AKEEBABACKUP_VIEW_CPANEL_TITLE="کنترل پنل"
COM_AKEEBABACKUP_VIEW_CPANEL_DESC="صفحه اصلی Akeeba Backup که به شما امکان پیکربندی، گرفتن، مدیریت و بازیابی نسخه های پشتیبان را می دهد."

COM_AKEEBABACKUP_VIEW_BACKUP_TITLE="پشتیبان‌گیری"
COM_AKEEBABACKUP_VIEW_BACKUP_DESC="بک آپ بگیرید"
COM_AKEEBABACKUP_VIEW_BACKUP_PROFILE_LABEL="نمایه پشتیبان اجباری"
COM_AKEEBABACKUP_VIEW_BACKUP_PROFILE_DESC="قبل از تهیه نسخه پشتیبان، نمایه پشتیبان را برای تغییر به آن انتخاب کنید. برای استفاده از نمایه پشتیبان فعلی، هر چه که باشد، «(هیچ)» را انتخاب کنید."
COM_AKEEBABACKUP_VIEW_BACKUP_AUTOSTART_LABEL="بلافاصله شروع کنید"
COM_AKEEBABACKUP_VIEW_BACKUP_AUTOSTART_DESC="آیا پشتیبان‌گیری باید بلافاصله شروع شود؟ اگر این کار را انجام دهد، کاربر فرصتی برای وارد کردن توضیحات و نظرات پشتیبان نخواهد داشت."
COM_AKEEBABACKUP_VIEW_BACKUP_HIDETOOLBAR_LABEL="پنهان کردن نوار ابزار"
COM_AKEEBABACKUP_VIEW_BACKUP_HIDETOOLBAR_DESC="آیا نوار ابزار با دکمه های Help و Control Panel باید پنهان شود؟"
COM_AKEEBABACKUP_VIEW_BACKUP_RETURNURL_LABEL="URL برگشتی"
COM_AKEEBABACKUP_VIEW_BACKUP_RETURNURL_DESC="یک URL داخلی وارد کنید تا پس از کامل شدن پشتیبان‌گیری به آن بازگردد. برای مثال: برای بازگشت به کنترل‌پنل Joomla مقدار <code>index.php</code> را وارد کنید، یا برای بازگشت به کنترل‌پنل Akeeba Backup مقدار <code>index.php%3Foption%26com_akeeba</code> را وارد کنید. <br/> <strong>هشدار</strong> به دلیل شیوه کارکرد مدیر منوی Joomla!، URL واردشده حتماً باید URL-encoded باشد. می‌توانید این کار را با ذخیره کردن آیتم منو <em>دو بار پشت سر هم</em> انجام دهید. این یک باگ/قابلیت ناقص شناخته‌شده در خود Joomla! است."

COM_AKEEBABACKUP_VIEW_CONFIGURATION_TITLE="پیکربندی"
COM_AKEEBABACKUP_VIEW_CONFIGURATION_DESC="نمایه پشتیبان فعال فعلی را پیکربندی کنید."

COM_AKEEBABACKUP_VIEW_MANAGE_TITLE="مدیریت پشتیبان‌گیری"
COM_AKEEBABACKUP_VIEW_MANAGE_DESC="تلاش‌های پشتیبان‌گیری را مدیریت کنید، از جمله انتخاب برای بازیابی هر نسخه پشتیبان قدیمی."

COM_AKEEBABACKUP_VIEW_RESTORE_TITLE="آخرین نسخه پشتیبان را بازیابی کنید"
COM_AKEEBABACKUP_VIEW_RESTORE_DESC="آخرین نسخه پشتیبان گرفته شده با یک نمایه پشتیبان خاص را بازیابی کنید. لطفاً مستندات را بخوانید."
COM_AKEEBABACKUP_VIEW_RESTORE_PROFILE_LABEL="نمایه پشتیبان"
COM_AKEEBABACKUP_VIEW_RESTORE_PROFILE_DESC="آخرین نسخه پشتیبان گرفته شده با این نمایه پشتیبان را بازیابی کنید. <strong>IMPORTANT!</strong> It will only look for the latest backup taken with this profile. آرشیو پشتیبان باید در سرور شما وجود داشته باشد. اگر آن را حذف کرده باشید، یا اگر از راه دور ذخیره شده باشد، با خطا مواجه خواهید شد. برای بازیابی پشتیبان‌های ذخیره‌شده از راه دور، باید ابتدا به مدیریت پشتیبان‌گیری‌ها بروید و آن‌ها را به سرور خود بازگردانید."

COM_AKEEBABACKUP_VIEW_TRANSFER_TITLE="جادوگر سایت انتقال"
COM_AKEEBABACKUP_VIEW_TRANSFER_DESC="به شما امکان می دهد آخرین نسخه پشتیبان را در مکان / سرور دیگری بازیابی کنید. <strong>مهم!</strong> این فقط به دنبال آخرین نسخه پشتیبان گرفته شده است. آرشیو پشتیبان باید در سرور شما وجود داشته باشد. اگر آن را حذف کرده اید، یا اگر از راه دور ذخیره شده باشد، به شما گفته می شود که یک نسخه پشتیبان جدید بگیرید. برای انتقال بک‌آپ‌های ذخیره‌شده از راه دور، ابتدا باید به مدیریت پشتیبان‌گیری‌ها بروید و آن‌ها را به سرور خود بازگردانید."
