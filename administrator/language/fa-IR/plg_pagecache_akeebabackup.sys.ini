PLG_PAGECACHE_AKEEBABACKUP="حافظه پنهان - Akeeba Backup JSON API"
PLG_PAGECACHE_AKEEBABACKUP_XML_DESCRIPTION="کش Joomla را، همان‌طور که افزونه System - Page Cache پیاده‌سازی می‌کند، برای JSON API مربوط به Akeeba Backup غیرفعال می‌کند. برای استفاده از JSON API در Akeeba Backup، <strong>حتماً</strong> باید این افزونه را فعال نگه دارید؛ این API برای تهیه پشتیبان از راه دور با Akeeba Panopticon، Akeeba Remote CLI و سرویس‌های شخص ثالث استفاده می‌شود، مخصوصاً وقتی System - Page Cache روی سایت شما فعال است."
