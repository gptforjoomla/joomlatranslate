PLG_ADMINTOOLS_LBL_CLEANTEMP_DESC="تمام محتویات پوشه موقت سایت را به‌صورت دوره‌ای حذف می‌کند.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"

