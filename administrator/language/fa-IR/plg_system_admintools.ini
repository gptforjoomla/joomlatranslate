PLG_ADMINTOOLS_LBL_CACHEEXPIRE="فعال‌سازی انقضای خودکار حافظه کش"
PLG_ADMINTOOLS_LBL_CACHEEXPIRE_DESC="موارد منقضی‌شده حافظه کش را به‌صورت دوره‌ای حذف می‌کند. برخلاف پاک‌سازی کامل کش، فقط موارد منقضی‌شده حذف می‌شوند و کل حافظه کش پاک نخواهد شد.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"

PLG_ADMINTOOLS_LBL_CACHECLEANER="فعال‌سازی پاک‌سازی حافظه کش"
PLG_ADMINTOOLS_LBL_CACHECLEANER_DESC="حافظه کش را به‌صورت دوره‌ای و به‌طور کامل پاک می‌کند، بدون توجه به اینکه موارد آن منقضی شده باشند یا خیر.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"

