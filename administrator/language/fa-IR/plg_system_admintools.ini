PLG_ADMINTOOLS_LBL_DELETEINACTIVE="حذف کاربران غیرفعال"
PLG_ADMINTOOLS_LBL_DELETEINACTIVE_DESC="کاربرانی را که ثبت‌نام کرده‌اند اما تا مدت زمان مشخصی هرگز وارد سایت نشده‌اند، به‌صورت خودکار حذف می‌کند.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"
PLG_ADMINTOOLS_LBL_DELETEINACTIVE_NONE="هرگز"
PLG_ADMINTOOLS_LBL_DELETEINACTIVE_BLOCKED="فقط در صورتی که حساب خود را فعال کرده اما هرگز وارد سایت نشده باشند"
PLG_ADMINTOOLS_LBL_DELETEINACTIVE_NOTACTIVATED="فقط در صورتی که حساب خود را فعال نکرده باشند"
PLG_ADMINTOOLS_LBL_DELETEINACTIVE_BOTH="فعال کرده باشند یا نه، تا زمانی که وارد سایت نشده باشند"

PLG_ADMINTOOLS_LBL_DELETEINACTIVE_DAYS="حذف پس از این تعداد روز"
PLG_ADMINTOOLS_LBL_DELETEINACTIVE_DAYS_DESC="اگر کاربر تا این تعداد روز پس از ثبت‌نام هنوز وارد سایت نشده باشد، حساب کاربری او حذف خواهد شد."

PLG_ADMINTOOLS_LBL_OVERRIDE="زبان ایمیل"
PLG_ADMINTOOLS_LBL_OVERRIDE_DESC="ایمیل‌هایی که Admin Tools هنگام مسدود شدن یک درخواست برای کاربران ویژه (Super Users) ارسال می‌کند، به زبان فعلی بخش کاربری سایت خواهد بود. در سایت‌های چندزبانه این موضوع ممکن است باعث سردرگمی شود. با انتخاب یک زبان در اینجا، می‌توانید ارسال این ایمیل‌ها را صرف‌نظر از زبان فعلی سایت، به آن زبان انجام دهید."

PLG_ADMINTOOLS_LBL_MAXLOGENTRIES="حداکثر تعداد ورودی‌های گزارش درخواست‌های مسدودشده"
PLG_ADMINTOOLS_LBL_MAXLOGENTRIES_DESC="حداکثر تعداد ورودی‌هایی را که باید در گزارش درخواست‌های مسدودشده نگهداری شوند مشخص کنید. رکوردهای اضافی حذف خواهند شد. برای غیرفعال کردن این قابلیت و نگهداری همه ورودی‌های گزارش، مقدار ۰ را وارد کنید. توجه: اگر هزاران رکورد قدیمی داشته باشید، حذف همه آن‌ها توسط Admin Tools مدتی زمان خواهد برد. برای حفظ کارایی، رکوردهای قدیمی در هر بار بارگذاری صفحه به‌صورت دسته‌های ۱۰٬۰۰۰ تایی حذف می‌شوند.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"

PLG_ADMINTOOLS_LBL_SESCLEANER="فعال‌سازی پاک‌سازی نشست‌ها"
PLG_ADMINTOOLS_LBL_SESCLEANER_DESC="جدول فراداده نشست‌ها را به‌صورت دوره‌ای پاک‌سازی می‌کند.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"

PLG_ADMINTOOLS_LBL_SESOPT="فعال‌سازی بهینه‌سازی نشست‌ها"
PLG_ADMINTOOLS_LBL_SESOPT_DESC="جدول فراداده نشست‌ها را به‌صورت دوره‌ای بررسی کرده و در صورت نیاز آن را تعمیر و بهینه‌سازی می‌کند.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"

PLG_ADMINTOOLS_LBL_SESOPT_FREQ="اجرا هر X دقیقه"
PLG_ADMINTOOLS_LBL_SESOPT_FREQ_DESC="عملیات بهینه‌سازی نشست‌ها هر X دقیقه اجرا می‌شود."

PLG_ADMINTOOLS_LBL_SES_FREQ="اجرا هر X دقیقه"
PLG_ADMINTOOLS_LBL_SES_FREQ_DESC="عملیات پاک‌سازی نشست‌ها هر X دقیقه اجرا می‌شود."

PLG_ADMINTOOLS_LBL_RESCUEURL="نشانی اینترنتی نجات"
PLG_ADMINTOOLS_LBL_RESCUEURL_DESC="با فعال بودن این قابلیت، اگر دسترسی شما مسدود شود می‌توانید به نشانی http://www.example.com/administrator/index.php?admintools_rescue=your_email@example.com مراجعه کنید (که در آن http://www.example.com آدرس سایت شما و your_email@example.com آدرس ایمیل حساب کاربر ویژه شما است) تا ایمیلی شامل دستورالعمل غیرفعال‌سازی موقت Admin Tools دریافت کنید و دوباره به سایت خود دسترسی پیدا کنید. این قابلیت فقط برای بخش مدیریت سایت کاربرد دارد و تنها زمانی ایمیل ارسال می‌شود که نشانی IP فعلی شما توسط Admin Tools مسدود شده باشد. این قابلیت گذرواژه اصلی یا ویژگی‌هایی که از طریق فایل‌های پیکربندی سمت سرور پیاده‌سازی شده‌اند، مانند گذرواژه پوشه مدیریت، سازنده ‎.htaccess‎ یا حالت اضطراری آفلاین را غیرفعال نمی‌کند."

PLG_ADMINTOOLS_LBL_RESCUEURL_SENTMSG="برای دریافت اطلاعات مربوط به نشانی اینترنتی نجات، ایمیل خود را بررسی کنید."
PLG_ADMINTOOLS_LBL_RESCUEURL_ERR_INVALIDADDRESS="خیر، متأسفانه آدرس ایمیل کاربر ویژه شما %s نیست. لطفاً دوباره تلاش کنید و به‌جای %1$s، آدرس ایمیلی را وارد کنید که برای حساب کاربر ویژه سایت خود تنظیم کرده‌اید."

PLG_ADMINTOOLS_LBL_RESCUEDURATION="مدت زمان حالت نجات (دقیقه)"
PLG_ADMINTOOLS_LBL_RESCUEDURATION_DESC="مدت زمانی که حالت نجات، پس از دنبال کردن دستورالعمل‌های ارسال‌شده به ایمیل شما از طریق نشانی اینترنتی نجات، فعال خواهد بود. پس از پایان این مدت، Admin Tools به حالت عادی بازمی‌گردد. مقدار پیش‌فرض: ۱۵ دقیقه."

PLG_ADMINTOOLS_LBL_AUTOIMPORTURL="نشانی اینترنتی درون‌ریزی خودکار"
PLG_ADMINTOOLS_LBL_AUTOIMPORTURL_DESC="تنظیمات خود را با قابلیت «برون‌بری» در Admin Tools صادر کنید. فایل JSON صادرشده را در محلی بارگذاری کنید که از طریق وب در دسترس عموم باشد. سپس نشانی اینترنتی آن فایل JSON را در سایر سایت‌های خود وارد کنید تا به‌صورت دوره‌ای دانلود و درون‌ریزی شود. این کار معادل دانلود فایل از آن نشانی و درون‌ریزی آن از طریق قابلیت «درون‌ریزی و برون‌بری» در Admin Tools است. با این قابلیت می‌توانید تنظیمات چندین نصب Admin Tools روی سایت‌های مختلف را با یکدیگر همگام‌سازی کنید.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"

PLG_ADMINTOOLS_LBL_AUTOIMPORTFREQ="فاصله زمانی درون‌ریزی خودکار (ساعت)"
PLG_ADMINTOOLS_LBL_AUTOIMPORTFREQ_DESC="مشخص می‌کند Admin Tools هر چند ساعت یک‌بار تلاش کند فایل JSON را از نشانی اینترنتی بالا دانلود و درون‌ریزی کند.<br/><strong>این گزینه منسوخ شده است و در Admin Tools 8.0 حذف خواهد شد. لطفاً در جوملا 4.1 و نسخه‌های جدیدتر از «وظایف زمان‌بندی‌شده» استفاده کنید.</strong>"

PLG_ADMINTOOLS_PWLOGINONWEBAUTHN_FIELDSET_LABEL="احراز هویت با گذرواژه"
PLG_ADMINTOOLS_PWLOGINONWEBAUTHN_LABEL="اجازه استفاده از گذرواژه هنگام فعال بودن WebAuthn"
PLG_ADMINTOOLS_PWLOGINONWEBAUTHN_DESC="این گزینه فقط زمانی کاربرد دارد که احراز هویت بدون گذرواژه با WebAuthn را برای حساب کاربری خود فعال کرده باشید. در این صورت مشخص می‌کند آیا همچنان بتوانید با نام کاربری و گذرواژه نیز وارد سایت شوید یا خیر. توصیه می‌شود این گزینه را روی «خیر» قرار دهید، زیرا گذرواژه امنیت کمتری نسبت به WebAuthn دارد و برای ورود باید از WebAuthn استفاده کنید. با این حال، ممکن است بخواهید موقتاً آن را روی «بله» قرار دهید تا بتوانید از یک دستگاه جدید با گذرواژه وارد شوید و سپس احراز هویت WebAuthn را با احرازکننده داخلی دستگاه (مانند Face ID، Touch ID، Windows Hello، حسگر اثر انگشت اندروید و موارد مشابه) راه‌اندازی کنید. پس از پایان کار، دوباره این گزینه را روی «خیر» قرار دهید."

PLG_ADMINTOOLS_HEADING_NOTICES="اعلان‌ها"

PLG_ADMINTOOLS_LBL_BLOCKEDREQUESTEMAILNOTICE="اعلان مربوط به ایمیل درخواست‌های مسدودشده"
PLG_ADMINTOOLS_LBL_BLOCKEDREQUESTEMAILNOTICE_DESC="اگر فیلد «ایمیل هنگام مسدود شدن درخواست» در صفحه «پیکربندی WAF» مقدار داشته باشد، این اعلان نمایش داده می‌شود تا به شما یادآوری کند آن را در سایت عملیاتی (Production) غیرفعال کنید."

PLG_ADMINTOOLS_LBL_EBRNOTICE_HEAD="در صورت مسدود شدن هر درخواست توسط Admin Tools، ایمیل ارسال خواهد شد."
PLG_ADMINTOOLS_LBL_EBRNOTICE_MESSAGE="این قابلیت فقط برای عیب‌یابی موقت در نظر گرفته شده است. فعال نگه داشتن آن در یک سایت عملیاتی ممکن است باعث ارسال تعداد زیادی ایمیل غیرضروری و شلوغ شدن صندوق ورودی شما شود."
PLG_ADMINTOOLS_LBL_EBRNOTICE_BTN_NOEMAIL="غیرفعال کردن ارسال ایمیل"
PLG_ADMINTOOLS_LBL_EBRNOTICE_BTN_NONOTICE="عدم نمایش این پیام"
