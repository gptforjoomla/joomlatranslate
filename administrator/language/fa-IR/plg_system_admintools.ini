PLG_ADMINTOOLS_MSG_ADMINPW_COOKIE="<strong>یادآوری</strong>: به دلیل اینکه قبلاً با این مرورگر وارد این سایت شده‌اید، بدون وارد کردن مستقیم پارامتر محرمانه آدرس مدیر، اجازه دسترسی به صفحه ورود بخش مدیریت را دارید."
PLG_ADMINTOOLS_MSG_ADMINPW_COOKIE_NONSUPERUSER="<p>اگر هنگام استفاده از بخش مدیریت سایت این پیام را به‌طور مکرر مشاهده می‌کنید، لطفاً موارد زیر را انجام دهید:</p><ul><li>همواره فقط روی یک صفحه مدیریت کار کنید.</li><li>اگر قصد ندارید تا چند دقیقه آینده از بخش مدیریت استفاده کنید، از حساب کاربری خود خارج شوید.</li><li>همیشه از نشانی ورود اختصاصی که در اختیار شما قرار داده شده است برای ورود به بخش مدیریت استفاده کنید (مشابه <code>%s</code>).</li></ul>"
PLG_ADMINTOOLS_MSG_ADMINPW_COOKIE_SUPERUSER="<p>اگر شما یا سایر کاربران سایت هنگام استفاده از بخش مدیریت این پیام را به‌طور مکرر مشاهده می‌کنید، بهتر است:</p><ul><li>مدت زمان نشست را در «پیکربندی کلی» جوملا افزایش دهید.</li><li>به کاربران یادآوری کنید که هم‌زمان فقط روی یک صفحه مدیریت کار کنند.</li><li>به کاربران یادآوری کنید اگر تا چند دقیقه آینده قصد استفاده از بخش مدیریت را ندارند، از گزینه «خروج» جوملا استفاده کنند.</li><li>به کاربران یادآوری کنید همیشه از نشانی ورودی استفاده کنند که شامل پارامتر محرمانه آدرس مدیر باشد؛ همان‌گونه که در مستندات Admin Tools توضیح داده شده است (مشابه <code>%s</code>).</li></ul><p>می‌توانید این قابلیت را از مسیر «کامپوننت‌ها → Admin Tools → دیوار آتش برنامه وب → پیکربندی WAF» فعال یا غیرفعال کرده و همچنین نمایش این پیام را مخفی کنید.</p>"

PLG_ADMINTOOLS_MSG_BLOCKED="این درخواست توسط Admin Tools مسدود شده است. برای تغییر این پیام، تنظیمات کامپوننت را ویرایش کنید. {RESCUEINFO}"
PLG_ADMINTOOLS_MSG_BLOCKED_RESCUEINFO="اگر مدیر این سایت هستید و به‌اشتباه نشانی IP خود را مسدود کرده‌اید، به نشانی {RESCUE_TRIGGER_URL}%1$s مراجعه کنید که در آن %1$s آدرس ایمیل حساب «کاربر ویژه» (Super User) شما است. این نشانی فقط زمانی برای شما ایمیل ارسال می‌کند که نشانی IP فعلی شما توسط Admin Tools مسدود شده باشد. اگر IP شما مسدود نشده باشد، هیچ ایمیلی ارسال نخواهد شد؛ زیرا در این حالت نیازی به دریافت راهنمای رفع مسدودسازی IP ندارید."
PLG_ADMINTOOLS_MSG_DISABLEPWDRESET="به دلایل امنیتی، امکان بازنشانی گذرواژه توسط خود کاربر برای این حساب غیرفعال شده است. لطفاً برای بازیابی گذرواژه با مدیر سایت تماس بگیرید."

