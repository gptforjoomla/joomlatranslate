COM_ADMINTOOLS_WAFEXCEPTIONS_LBL_VIEW_DESC="نام نمای (View) کامپوننت یا نام کنترلری که باید در URL وجود داشته باشد تا این قانون اعمال شود. اگر آدرس‌های SEF را غیرفعال کنید، یکی از مقادیر <code>view=ViewName</code> یا <code>task=ViewName.TaskName</code> را خواهید دید که در آن <var>ViewName</var> همان مقداری است که باید وارد کنید. اگر این قسمت را خالی بگذارید، قانون برای همه نماها اعمال خواهد شد. اگر می‌خواهید یک مسیر SEF را تطبیق دهید، گزینه «کامپوننت» را روی «(همه)» قرار داده و مسیر SEF را <strong>همراه با اسلش ابتدایی (/)</strong> ولی <strong>بدون</strong> <code>index.php</code> وارد کنید؛ برای مثال: <code>/foo/bar</code>. در سایت‌های چندزبانه، پیشوند زبان را وارد نکنید؛ برای مثال <s><code>/en/example</code></s> نادرست و <code>/example</code> صحیح است. همچنین این مسیر می‌تواند ناقص باشد؛ بنابراین <code>/foo/bar</code> با هر دو مسیر <code>/foo/bar/test</code> و <code>/foo/bar.html</code> مطابقت خواهد داشت."
COM_ADMINTOOLS_WAFEXCEPTIONS_LBL_VIEW_ANY="(همه)"

COM_ADMINTOOLS_WAFEXCEPTIONS_LBL_QUERY="پارامتر Query"
COM_ADMINTOOLS_WAFEXCEPTIONS_LBL_QUERY_DESC="پارامتر Query که می‌خواهید فیلترهای امنیتی برای آن غیرفعال شوند؛ برای مثال <code>id</code>. اگر این قسمت را خالی بگذارید، قانون برای همه پارامترهای Query اعمال خواهد شد. توجه داشته باشید که استثناهای WAF پس از تبدیل URLهای SEF به قالب غیر SEF توسط جوملا اعمال می‌شوند، صرف‌نظر از اینکه قابلیت SEF در سایت شما فعال باشد یا خیر."

