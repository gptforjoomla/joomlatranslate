COM_ADMINTOOLS_WAFEXCEPTIONS_LBL_WHATSTHIS_GROUP_A = "اگر برای یک کامپوننت یا نما، <i>تمام پارامترهای Query</i> انتخاب شوند، قابلیت‌های زیر به‌طور کامل غیرفعال خواهند شد: Bad Behaviour، SQLiShield، XSSShield، MUAShield، RFIShield، DFIShield و فیلتر کلمات ممنوع."
COM_ADMINTOOLS_WAFEXCEPTIONS_LBL_WHATSTHIS_GROUP_B = "اگر برای یک کامپوننت یا نما، <i>پارامترهای Query مشخصی</i> انتخاب شوند، قابلیت‌های زیر <i>فقط برای همان پارامترها</i> غیرفعال خواهند شد: SQLiShield، XSSShield، RFIShield، DFIShield، فیلتر کلمات ممنوع و مسدودسازی پارامترهای مشکوک URL."

