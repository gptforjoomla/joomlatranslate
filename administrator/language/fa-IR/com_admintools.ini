COM_ADMINTOOLS_ADMINPASSWORD_LBL_HOWITWORKS="این قابلیت چگونه کار می‌کند؟"
COM_ADMINTOOLS_ADMINPASSWORD_LBL_INFO="با فعال‌سازی محافظت با رمز عبور، هر بار که آدرس یک منبع محافظت‌شده در پوشه <code>administrator</code> درخواست شود، مرورگر از شما نام کاربری و رمز عبور درخواست می‌کند. باید نام کاربری و رمز عبوری را که در این صفحه وارد کرده‌اید، وارد کنید. این نام کاربری و رمز عبور برای <em>تمام مدیران سایت مشترک</em> است و <em>باید با اطلاعات ورود جوملای شما متفاوت باشد</em>. این قابلیت در سطح وب‌سرور و با استفاده از فایل <code>.htaccess</code> در پوشه <code>administrator</code> سایت شما عمل می‌کند. برای استفاده از این قابلیت، وب‌سرور باید از محافظت پوشه‌ها با فایل‌های <code>.htaccess</code> پشتیبانی کند. اگر مطمئن نیستید، از شرکت میزبان خود سؤال کنید."
COM_ADMINTOOLS_ADMINPASSWORD_LBL_WARN="توجه داشته باشید که این محافظت حتی در صورت غیرفعال یا حذف Admin Tools نیز برقرار خواهد ماند. اگر دسترسی به بخش مدیریت سایت از بین رفت یا نیاز داشتید بدون دسترسی به این صفحه محافظت را حذف کنید، باید فایل‌های <code>.htaccess</code> و <code>.htpasswd</code> را از پوشه <code>administrator</code> سایت خود با استفاده از FTP، SFTP یا مدیر فایل هاست <strong>حذف</strong> کنید."

COM_ADMINTOOLS_ADMINPASSWORD_LBL_PASSWORDPROTECTION="تنظیم محافظت از بخش مدیریت با رمز عبور"
COM_ADMINTOOLS_ADMINPASSWORD_LBL_RESETERRORPAGES="بازنشانی صفحات خطای سفارشی"
COM_ADMINTOOLS_ADMINPASSWORD_LBL_RESETERRORPAGES_HELP="صفحات خطای سفارشی Apache برای کدهای HTTP 401 و 403 را به حالت پیش‌فرض بازمی‌گرداند. این کار از نمایش خطای «404 - مقاله پیدا نشد» هنگام دسترسی به صفحه ورود مدیریت پس از فعال‌سازی محافظت با رمز عبور جلوگیری می‌کند. اکیداً توصیه می‌شود این گزینه را فعال نگه دارید، مگر اینکه باعث بروز خطای HTTP 500 شود."
