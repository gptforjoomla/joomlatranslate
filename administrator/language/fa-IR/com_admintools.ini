COM_ADMINTOOLS_CONFIGUREWAF_LBL_PERMABANNUM_TIP="اگر گزینه قبلی فعال باشد، مشخص می‌کند پس از چند بار مسدودسازی خودکار، IP به‌طور دائمی مسدود شده و به «فهرست مسدودسازی IP» افزوده شود."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_PERMABAN_TIP="اگر یک IP به این تعداد مسدودسازی خودکار برسد، در صورتی که دوباره قرار باشد به‌صورت خودکار مسدود شود، به‌طور دائمی به «فهرست مسدودسازی IP» اضافه خواهد شد. توجه داشته باشید که برای مؤثر بودن این قابلیت باید گزینه <em>جلوگیری از دسترسی سایت برای IPهای موجود در فهرست مسدودسازی IP</em> را روی «بله» قرار دهید؛ در غیر این صورت افزودن دائمی IP به این فهرست هیچ تأثیری نخواهد داشت."
