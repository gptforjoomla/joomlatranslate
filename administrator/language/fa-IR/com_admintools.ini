COM_ADMINTOOLS_MAIL_RESCUEURL_TITLE="Admin Tools: پیوند نجات"
COM_ADMINTOOLS_MAIL_RESCUEURL_DESC="هنگامی که یکی از کاربران بخش مدیریت برای بازیابی دسترسی به سایت درخواست «پیوند نجات» (Rescue URL) کند، این ایمیل توسط Admin Tools ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_RESCUEURL_SUBJECT="درخواست پیوند نجات در {SITENAME} برای {USER}"
COM_ADMINTOOLS_EMAIL_RESCUEURL_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که کاربر {USER} برای سایت {SITENAME} درخواست «پیوند نجات» (Rescue URL) داده است. اگر این درخواست توسط خود شما ثبت شده است، روی پیوند زیر کلیک کنید یا آن را در مرورگر خود کپی و جای‌گذاری نمایید. با استفاده از این پیوند می‌توانید وارد بخش مدیریت سایت شوید تا IP خود را از حالت مسدود خارج کرده و/یا تنظیمات Admin Tools را تغییر دهید.\n\nپیوند نجات:\n\n{RESCUEURL}\n\nدر ادامه این ایمیل، راهنمای کارهایی که پس از ورود به بخش مدیریت باید انجام دهید آورده شده است.\n\nنمی‌دانم چرا این ایمیل را دریافت کرده‌ام\n======================================================================\n\nبخش «پیوند نجات چیست؟» را در ادامه مطالعه کنید. در این حالت نیازی به انجام هیچ اقدامی نیست و جای نگرانی وجود ندارد.\n\nچه کسی درخواست پیوند نجات را ثبت کرده است؟\n======================================================================\n\nنام کاربری: {USER}\nنشانی IP: {IP} (بررسی IP: {LOOKUP})\nUser Agent: {UA}\n\nپیوند نجات چیست؟\n======================================================================\n\nگاهی اوقات تنظیمات سخت‌گیرانه Admin Tools ممکن است باعث شود که حتی شما، به‌عنوان یک کاربر ارشد (Super User)، به اشتباه از دسترسی به سایت خود محروم شوید. در حالت عادی برای رفع این مشکل باید فایل افزونه سیستمی Admin Tools را تغییر نام دهید که این کار نسبتاً پیچیده و مستعد خطاست.\n\nقابلیت «پیوند نجات» برای حل همین مشکل طراحی شده است. زمانی که در اثر مسدود شدن به یک آدرس ویژه مراجعه کنید، این ایمیل برای شما ارسال می‌شود. پیوند موجود در این ایمیل فقط برای همان مرورگر، همان نشانی IP و تنها برای مدت محدودی معتبر است. با استفاده از آن می‌توانید به صفحه ورود مدیریت که به‌صورت موقت برای شما آزاد شده است دسترسی پیدا کنید و پس از ورود، IP خود را از حالت مسدود خارج کرده و/یا تنظیمات Admin Tools را اصلاح نمایید.\n\nبه‌صورت پیش‌فرض این قابلیت در تمام نصب‌های Admin Tools فعال است. همچنین، تا زمانی که در بخش Configure WAF گزینه «پیام سفارشی» (Custom Message) را تنظیم نکرده باشید، هنگام مسدود شدن کاربران، پیامی درباره امکان استفاده از پیوند نجات نمایش داده می‌شود. اگر نمی‌دانید چرا این ایمیل را دریافت کرده‌اید، احتمالاً شخصی پیام پیش‌فرض مسدود شدن IP را دیده و آدرس ایمیل کاربر ارشد شما را حدس زده است. جای نگرانی نیست؛ زیرا برای سوءاستفاده از این قابلیت، فرد علاوه بر دسترسی به ایمیل شما، باید رمز عبور حساب کاربر ارشدتان را نیز در اختیار داشته باشد؛ یعنی عملاً باید از قبل به حساب شما نفوذ کرده باشد. همان‌طور که در مستندات نیز توصیه شده است، بهتر است متن «پیام سفارشی» را تغییر دهید تا مشخص نباشد سایت شما توسط Admin Tools محافظت می‌شود. اگر مایل نیستید از قابلیت پیوند نجات استفاده کنید و ترجیح می‌دهید در صورت مسدود شدن فایل‌ها را به‌صورت دستی تغییر نام دهید، به مسیر «افزونه‌ها → پلاگین‌ها» بروید، تنظیمات پلاگین سیستمی Admin Tools را باز کرده و گزینه «Rescue URL» را روی «خیر» قرار دهید.\n\nپس از ورود چه کاری انجام دهم؟\n======================================================================\n\nاگر IP شما توسط Admin Tools مسدود شده است، به مسیر «کامپوننت‌ها → Admin Tools» بروید و روی دکمه بزرگ «Unblock My IP» در بالای صفحه کلیک کنید.\n\nاگر بدون انجام هیچ فعالیت مشکوکی مرتباً IP شما مسدود می‌شود، IP مسدودشده همیشه یکسان است اما با IP نمایش‌داده‌شده در http://www.ip-adress.eu/ و https://www.whatismyip.com/ تفاوت دارد، احتمالاً سایت شما پشت یک CDN یا Reverse Proxy قرار دارد. در این صورت، علاوه بر مراحل بالا، به مسیر «سیستم → تنظیمات سراسری» بروید، گزینه «Behind Load Balancer» را روی «بله» قرار دهید و تنظیمات را ذخیره کنید.\n\nاما اگر IP واقعی شما که توسط دو سرویس فوق نمایش داده می‌شود همچنان مسدود می‌شود، باید علت این مسدودسازی را بررسی کنید. به مسیر «کامپوننت‌ها → Admin Tools → Web Application Firewall → Security Exceptions Log» بروید و ستون‌های «Reason» و «Target URL» را برای رکوردهایی که IP شما را دارند بررسی کنید. اگر متوجه علت نشدید، یک درخواست پشتیبانی ثبت کرده و اطلاعات موجود در Security Exceptions Log را نیز ارسال نمایید. توجه داشته باشید که برای دریافت پشتیبانی باید اشتراک فعال داشته باشید.\n\nاگر مقدار «Administrator Secret URL Parameter» را فراموش کرده‌اید، به مسیر «کامپوننت‌ها → Admin Tools → Web Application Firewall → Configure WAF» بروید، تب «Basic Protection Features» را باز کنید و مقدار گزینه «Administrator Secret URL Parameter» را تغییر دهید یا کاملاً حذف کنید تا این قابلیت بازنشانی یا غیرفعال شود.\n\nاگر همچنان نتوانستم وارد سایت شوم چه کنم؟\n======================================================================\n\nدر دو حالت، قابلیت پیوند نجات یا تغییر نام فایل پلاگین سیستمی Admin Tools کمکی نخواهد کرد؛ زیرا در این شرایط، مسدودسازی توسط وب‌سرور انجام می‌شود، نه توسط Admin Tools.\n\nحالت اول زمانی است که قابلیت محافظت از پوشه مدیریت با رمز عبور (Administrator Password Protection) فعال باشد. در این صورت باید فایل‌های .htaccess و .htpasswd را از پوشه administrator سایت خود حذف کنید.\n\nحالت دوم زمانی است که از قابلیت .htaccess Maker استفاده کرده باشید. در این شرایط فایل .htaccess موجود در ریشه سایت را با نسخه پیش‌فرض فایل .htaccess جوملا جایگزین کنید.\n\nدر هر دو حالت توجه داشته باشید که نام این فایل‌ها با نقطه (.) آغاز می‌شود و به‌صورت پیش‌فرض مخفی هستند. برای مشاهده، ویرایش یا حذف آن‌ها باید نمایش فایل‌های مخفی را در مدیر فایل هاست خود فعال کنید. اگر نحوه انجام این کار را نمی‌دانید، از شرکت میزبان سایت خود بخواهید راهنمایی‌تان کند.\n\nاگر مشکل شما در هیچ‌یک از موارد بالا قرار نمی‌گیرد، احتمالاً ارتباطی با Admin Tools ندارد. اگر از افزونه امنیتی دیگری استفاده می‌کنید، تنظیمات آن را بررسی کنید. در غیر این صورت با شرکت میزبان سایت خود تماس بگیرید؛ زیرا بسیاری از شرکت‌های هاستینگ از سامانه‌های امنیتی اختصاصی استفاده می‌کنند که ممکن است دسترسی شما به سایت را مسدود کرده باشند."
COM_ADMINTOOLS_EMAIL_RESCUEURL_BODY_HTML="<p>سلام،</p><p>به اطلاع شما می‌رسانیم که کاربر {USER} برای سایت {SITENAME} درخواست «پیوند نجات» (Rescue URL) داده است. اگر این درخواست توسط خود شما ثبت شده است، روی پیوند زیر کلیک کنید یا آن را در مرورگر خود کپی و جای‌گذاری نمایید. با استفاده از این پیوند می‌توانید وارد بخش مدیریت سایت شوید تا IP خود را از حالت مسدود خارج کرده و/یا تنظیمات Admin Tools را تغییر دهید.</p><p><a href=\\"_QQ_"{RESCUEURL}\\"_QQ_" rel=\\"_QQ_"alternate\\"_QQ_">{RESCUEURL}</a></p><p>در ادامه این ایمیل، راهنمای کارهایی که پس از ورود به بخش مدیریت باید انجام دهید آورده شده است.</p><h3>نمی‌دانم چرا این ایمیل را دریافت کرده‌ام</h3><p>بخش «پیوند نجات چیست؟» را در ادامه مطالعه کنید. <strong>نیازی به انجام هیچ اقدامی نیست</strong> و <strong>جای نگرانی وجود ندارد.</strong></p><h3>چه کسی درخواست پیوند نجات را ثبت کرده است؟</h3><p>نام کاربری: {USER}<br />نشانی IP: {IP} (<a href=\\"_QQ_"{LOOKUP}\\"_QQ_">بررسی IP</a>)<br />User Agent: {UA}</p><h3>پیوند نجات چیست؟</h3><p>گاهی اوقات تنظیمات سخت‌گیرانه Admin Tools ممکن است باعث شود که حتی شما، به‌عنوان یک کاربر ارشد (Super User)، به اشتباه از دسترسی به سایت خود محروم شوید. در حالت عادی برای رفع این مشکل باید فایل افزونه سیستمی Admin Tools را تغییر نام دهید که این کار نسبتاً پیچیده و مستعد خطاست.</p><p>قابلیت «پیوند نجات» برای حل همین مشکل طراحی شده است. زمانی که در اثر مسدود شدن به یک آدرس ویژه مراجعه کنید، این ایمیل برای شما ارسال می‌شود. پیوند موجود در این ایمیل فقط برای همان مرورگر، همان نشانی IP و تنها برای مدت محدودی معتبر است. با استفاده از آن می‌توانید به صفحه ورود مدیریت که <em>به‌صورت موقت</em> برای شما آزاد شده است دسترسی پیدا کنید و پس از ورود، IP خود را از حالت مسدود خارج کرده و/یا تنظیمات Admin Tools را اصلاح نمایید.</p><p>به‌صورت پیش‌فرض این قابلیت در تمام نصب‌های Admin Tools فعال است. همچنین، تا زمانی که در بخش Configure WAF گزینه «پیام سفارشی» (Custom Message) را تنظیم نکرده باشید، هنگام مسدود شدن کاربران، پیامی درباره امکان استفاده از پیوند نجات نمایش داده می‌شود. اگر نمی‌دانید چرا این ایمیل را در