COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_HTTPBLMAXAGE_TIP="Project Honeypot زمان آخرین باری را که یک IP هنگام ارسال هرزنامه شناسایی شده گزارش می‌دهد. هرچه این زمان قدیمی‌تر باشد (عدد بزرگ‌تر)، احتمال اینکه آن IP همچنان توسط هرزنامه‌فرستان استفاده شود کمتر است. در اینجا می‌توانید حداکثر سن گزارش قابل قبول برای مسدودسازی را تعیین کنید. مقدار پیش‌فرض ۳۰ به این معنی است که IPهایی که طی ۳۰ روز گذشته هرزنامه ارسال کرده‌اند مسدود خواهند شد."
