COM_ADMINTOOLS_ADMINPASSWORD_LBL_MODE_EVERYTHING="همه موارد"
COM_ADMINTOOLS_ADMINPASSWORD_LBL_MODE_HELP="انتخاب کنید چه بخش‌هایی با رمز عبور محافظت شوند. گزینه «جوملا» فقط فایل <code>index.php</code> جوملا (نقطه ورود برنامه مدیریت) را محافظت می‌کند و سایر فایل‌ها، از جمله فایل‌های PHP افزونه‌های شخص ثالث، بدون محدودیت در دسترس خواهند بود. گزینه «همه فایل‌های PHP» تمام فایل‌های PHP موجود در پوشه <code>administrator</code> و زیرپوشه‌های آن را محافظت می‌کند. گزینه «همه موارد» مانند نسخه‌های قدیمی Admin Tools عمل کرده و دسترسی به هر فایل موجود در پوشه <code>administrator</code> و زیرپوشه‌های آن را، بدون توجه به پسوند فایل، محدود می‌کند."

COM_ADMINTOOLS_ADMINPASSWORD_LBL_HASHTYPE="الگوریتم هش رمز عبور"
COM_ADMINTOOLS_ADMINPASSWORD_LBL_HASHTYPE_HELP="رمزهای عبور به‌صورت هش‌شده در فایل <code>administrator/.htpasswd</code> ذخیره می‌شوند. این گزینه الگوریتم هش را تعیین می‌کند. bCrypt امن‌ترین گزینه است، اما همیشه توسط همه میزبان‌ها پشتیبانی نمی‌شود. APR-1 (پیش‌فرض) امنیت مناسبی دارد و توسط بیشتر میزبان‌ها پشتیبانی می‌شود. SHA-1 همیشه در دسترس است، اما دیگر امن محسوب نمی‌شود. الگوریتم crypt() فقط از رمزهای حداکثر ۸ کاراکتری پشتیبانی می‌کند، در ویندوز پشتیبانی نمی‌شود و امنیت پایینی دارد. گزینه «متن ساده» هیچ هش‌سازی انجام نمی‌دهد و <strong>هرگز</strong> نباید به‌جز برای عیب‌یابی موقت و با یک رمز عبور موقتی از آن استفاده شود."
