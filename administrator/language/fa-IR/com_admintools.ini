COM_ADMINTOOLS_MAIL_TROUBLESHOOTING_TITLE="Admin Tools: ایمیل رفع اشکال"
COM_ADMINTOOLS_MAIL_TROUBLESHOOTING_DESC="هر زمان که تغییری در تنظیمات Admin Tools ایجاد کنید که ممکن است باعث از دست رفتن دسترسی شما به سایت شود، این ایمیل ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_TROUBLESHOOTING_SUBJECT="اطلاعات رفع اشکال Admin Tools"
COM_ADMINTOOLS_EMAIL_TROUBLESHOOTING_BODY="سلام {USER}،\n\nشما به‌تازگی با استفاده از کامپوننت Admin Tools در سایت «{SITENAME}»، عملیات {ACTION} را انجام داده‌اید. این عملیات معمولاً کاملاً ایمن است. با این حال، در برخی موارد ممکن است به دلیل سوءبرداشت، خطای انسانی یا تغییر ناخواسته تنظیمات توسط مرورگر یا سرور، سایت به‌درستی کار نکند یا دسترسی به آن امکان‌پذیر نباشد. این موضوع هم برای خود جوملا و هم برای افزونه‌های شخص ثالث آن صدق می‌کند. در چنین شرایط نادری، لطفاً برای رفع مشکل به آدرس‌های زیر مراجعه کنید:\n\n{TROUBLESHOOTING_URLS}\n\nاگر موفق به رفع مشکل نشدید و اشتراک فعال Admin Tools دارید، لطفاً در سایت https://www.akeeba.com یک درخواست پشتیبانی ثبت کنید و توضیح دهید پیش از بروز مشکل چه کاری انجام داده‌اید، مشکل چیست و تاکنون چه راهکارهایی را امتحان کرده‌اید.\n\nاین ایمیل توسط چه کسی ارسال شده است؟\n======================================================================\n\nاین ایمیل به‌صورت خودکار توسط Admin Tools که روی سایت شما اجرا می‌شود، به نشانی ایمیل ثبت‌شده در پروفایل کاربری جوملای شما ارسال می‌شود. این ایمیل هر زمان که یک عملیات مدیریتی انجام دهید که ممکن است به‌طور ناخواسته باعث از دست رفتن دسترسی شما به سایت شود ارسال خواهد شد. این پیام برای سایر کاربران سایت ارسال نمی‌شود.\n\nاگر دیگر مایل به دریافت این ایمیل‌ها نیستید، وارد بخش مدیریت سایت شوید و از مسیر «کامپوننت‌ها → Admin Tools → دیواره آتش برنامه وب (WAF) → پیکربندی WAF → سفارشی‌سازی» گزینه «ارسال ایمیل رفع اشکال هنگام عملیات مدیریتی» را روی «خیر» قرار دهید."
COM_ADMINTOOLS_EMAIL_TROUBLESHOOTING_BODY_HTML="<p>سلام {USER}،</p><p>شما به‌تازگی با استفاده از کامپوننت Admin Tools در سایت «{SITENAME}»، عملیات {ACTION} را انجام داده‌اید. این عملیات معمولاً کاملاً ایمن است. با این حال، در برخی موارد ممکن است به دلیل سوءبرداشت، خطای انسانی یا تغییر ناخواسته تنظیمات توسط مرورگر یا سرور، سایت به‌درستی کار نکند یا دسترسی به آن امکان‌پذیر نباشد. این موضوع هم برای خود جوملا و هم برای افزونه‌های شخص ثالث آن صدق می‌کند. در چنین شرایط نادری، لطفاً برای رفع مشکل به آدرس‌های زیر مراجعه کنید:</p>{TROUBLESHOOTING_URLS_HTML}<p>اگر موفق به رفع مشکل نشدید و اشتراک فعال Admin Tools دارید، لطفاً در سایت https://www.akeeba.com یک درخواست پشتیبانی ثبت کنید و توضیح دهید پیش از بروز مشکل چه کاری انجام داده‌اید، مشکل چیست و تاکنون چه راهکارهایی را امتحان کرده‌اید.</p><h3>این ایمیل توسط چه کسی ارسال شده است؟</h3><p>این ایمیل به‌صورت خودکار توسط Admin Tools که روی سایت شما اجرا می‌شود، به نشانی ایمیل ثبت‌شده در پروفایل کاربری جوملای شما ارسال می‌شود. این ایمیل هر زمان که یک عملیات مدیریتی انجام دهید که ممکن است به‌طور ناخواسته باعث از دست رفتن دسترسی شما به سایت شود ارسال خواهد شد. این پیام برای سایر کاربران سایت ارسال نمی‌شود.</p><p>اگر دیگر مایل به دریافت این ایمیل‌ها نیستید، وارد بخش مدیریت سایت شوید و از مسیر «کامپوننت‌ها → Admin Tools → دیواره آتش برنامه وب (WAF) → پیکربندی WAF → سفارشی‌سازی» گزینه «ارسال ایمیل رفع اشکال هنگام عملیات مدیریتی» را روی «خیر» قرار دهید.</p>"

COM_ADMINTOOLS_MAIL_CONFIGMONITOR_TITLE="Admin Tools: پایش تنظیمات"
COM_ADMINTOOLS_MAIL_CONFIGMONITOR_DESC="هر زمان که در تنظیمات سراسری جوملا یا تنظیمات یک کامپوننت تغییری ایجاد شود و گزینه‌های «پایش تنظیمات سراسری» و/یا «پایش تنظیمات کامپوننت‌ها» در دیواره آتش برنامه وب فعال باشند، این ایمیل توسط Admin Tools ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_CONFIGMONITOR_SUBJECT="تنظیمات {AREA} در سایت {SITENAME} تغییر کرد"
COM_ADMINTOOLS_EMAIL_CONFIGMONITOR_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که تنظیمات {AREA} در سایت {SITENAME} توسط کاربر {USER} تغییر یافته است. جزئیات این تغییر به شرح زیر است:\n\nنشانی IP: {IP} (بررسی IP: {LOOKUP})\nشناسه مرورگر (User Agent): {UA}\n\nاگر این تغییر توسط شما یا یکی از مدیرانی که به او اعتماد دارید انجام نشده است، لطفاً در اسرع وقت سایت خود را بررسی کنید، زیرا این موضوع می‌تواند نشانه‌ای از نفوذ یا هک شدن سایت باشد.\n\nبا احترام\n\nتیم {SITENAME}\n\nتوجه: این ایمیل به‌صورت خودکار برای شما ارسال شده است، زیرا شما یکی از مدیران سایت {SITENAME} هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
COM_ADMINTOOLS_EMAIL_CONFIGMONITOR_BODY_HTML="<p>سلام،</p><p>به اطلاع شما می‌رسانیم که تنظیمات {AREA} در سایت {SITENAME} توسط کاربر {USER} تغییر یافته است. جزئیات این تغییر به شرح زیر است:</p><ul><li>نشانی IP: {IP} (<a href=\\"_QQ_"{LOOKUP}\\"_QQ_">بررسی IP</a>)</li><li>شناسه مرورگر (User Agent): {UA}</li></ul><p>اگر این تغییر توسط شما یا یکی از مدیرانی که به او اعتماد دارید انجام نشده است، لطفاً در اسرع وقت سایت خود را بررسی کنید، زیرا این موضوع می‌تواند نشانه‌ای از نفوذ یا هک شدن سایت باشد.</p><p>با احترام</p><p>تیم {SITENAME}</p><p><small>این ایمیل به‌صورت خودکار برای شما ارسال شده است، زیرا شما یکی از مدیران سایت <em>{SITENAME}</em> هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است.</small></p>"

COM_ADMINTOOLS_MAIL_USERREACTIVATE_TITLE="Admin Tools: فعال‌سازی مجدد کاربر"
COM_ADMINTOOLS_MAIL_USERREACTIVATE_DESC="هرگاه یک حساب کاربری به دلیل تعداد زیاد تلاش‌های ناموفق برای ورود به‌طور موقت غیرفعال شود، این ایمیل توسط Admin Tools ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_USER_REACTIVATE_SUBJECT="حساب کاربری در {SITENAME} به‌طور موقت مسدود شد"
COM_ADMINTOOLS_EMAIL_USER_REACTIVATE_BODY="سلام،\n\nچندین تلاش ناموفق برای ورود به حساب کاربری {USER} در سایت {SITENAME} شناسایی شده است. در نتیجه، سیستم ما در تاریخ {DATE} این حساب کاربری را به‌صورت موقت مسدود کرده است.\n\nاگر فکر می‌کنید این پیام به اشتباه برای شما ارسال شده است، یعنی خودتان به‌اشتباه با رمز عبور نادرست تلاش کرده‌اید وارد شوید، لطفاً روی پیوند زیر کلیک کنید تا مسدودسازی موقت حساب کاربری شما برداشته شود:\n{ACTIVATE}\n\nبا احترام\n\nتیم {SITENAME}\n\nتوجه: این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا در سایت {SITENAME} یک حساب کاربری دارید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
