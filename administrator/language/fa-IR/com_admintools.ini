COM_ADMINTOOLS_CONFIGUREWAF_LBL_ADMINLOGINFOLDER_TIP="برای مثال، اگر عبارت <code>test</code> را وارد کنید، تنها از طریق نشانی‌ای مانند <code>http://www.example.com/test</code> می‌توانید به بخش مدیریت سایت دسترسی داشته باشید. اگر تلاش کنید از طریق <code>http://www.example.com/administrator</code> وارد شوید، به صفحه اصلی سایت هدایت خواهید شد. پس از یک‌بار مراجعه به نشانی مخفی، تا پایان نشست (Session) خود می‌توانید بدون مسدود شدن از آدرس <code>http://www.example.com/administrator</code> نیز استفاده کنید. اگر نمی‌خواهید از این قابلیت استفاده کنید، این فیلد را خالی بگذارید. توجه داشته باشید که برای عملکرد این قابلیت، گزینه‌های <strong>SEF URLs</strong> و <strong>Use URL Rewriting</strong> در پیکربندی سراسری جوملا باید هر دو روی «بله» تنظیم شده باشند."
