COM_ADMINTOOLS_MAIL_CRITICALFILES_GLOBAL_TITLE="Admin Tools: تغییر فایل تحت نظارت"
COM_ADMINTOOLS_MAIL_CRITICALFILES_GLOBAL_DESC="هنگامی که یک یا چند فایل انتخاب‌شده برای نظارت بر تغییرات توسط Admin Tools تغییر کنند، این ایمیل ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_CRITICALFILES_GLOBAL_SUBJECT="فایل‌های تحت نظارت در {SITENAME} تغییر کرده‌اند"
COM_ADMINTOOLS_EMAIL_CRITICALFILES_GLOBAL_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که یک یا چند فایل که از Admin Tools خواسته بودید تغییرات آن‌ها را پایش کند، در سایت {SITENAME} تغییر کرده‌اند. فهرست فایل‌های تغییر یافته به شرح زیر است:\n\n{INFO}\n\nاگر این پیام در نتیجه یک تغییر مورد انتظار و مجاز برای شما ارسال نشده است، لطفاً هرچه سریع‌تر سایت خود را بررسی کنید؛ زیرا ممکن است نشانه‌ای از فعالیت مخرب یا نفوذ به سایت باشد.\n\nبا احترام\n\nتیم {SITENAME}\n\nتوجه: این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت {SITENAME} هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
