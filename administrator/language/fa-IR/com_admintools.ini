COM_ADMINTOOLS_MAIL_ADMINLOGINFAIL_TITLE="Admin Tools: ورود ناموفق مدیر"
COM_ADMINTOOLS_MAIL_ADMINLOGINFAIL_DESC="در صورت وقوع یک تلاش ناموفق برای ورود به بخش مدیریت، در صورتی که این قابلیت فعال باشد، این ایمیل توسط Admin Tools ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_ADMINLOGINFAIL_SUBJECT="ورود ناموفق مدیر برای کاربر {USER} در {SITENAME}"
COM_ADMINTOOLS_EMAIL_ADMINLOGINFAIL_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که کاربر {USER} موفق به ورود به بخش مدیریت سایت {SITENAME} نشده است. اطلاعات بیشتر:\n\nنام کاربری: {USER}\nنشانی IP: {IP} ({LOOKUP})\nرشته User Agent مرورگر: {UA}\n\nاگر این موضوع مورد انتظار شما بوده است، نیازی به انجام هیچ اقدامی نیست. در غیر این صورت، اگر احتمال می‌دهید این یک تلاش برای نفوذ باشد، لطفاً فوراً وارد بخش مدیریت سایت شوید و حالت «آفلاین اضطراری» (Emergency Off-Line) در Admin Tools را فعال کنید.\n\nبا احترام\n\nتیم {SITENAME}\n\nتوجه: این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت {SITENAME} هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
