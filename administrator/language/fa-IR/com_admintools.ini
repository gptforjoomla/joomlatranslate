COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_HTTPBLBLOCKSUSPICIOUS="مسدود کردن IPهای مشکوک نیز، نه فقط هرزنامه‌فرست‌های تأییدشده"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_HTTPBLBLOCKSUSPICIOUS_TIP="گاهی سرویس Project Honeypot نمی‌تواند با اطمینان تشخیص دهد که یک IP متعلق به یک هرزنامه‌فرست است یا صرفاً کاربری است که به‌اشتباه روی لینکی کلیک کرده است. در این حالت IP با وضعیت «مشکوک» علامت‌گذاری می‌شود. رفتار پیش‌فرض، مسدود نکردن این IPها است. با این حال، اگر سایت شما با حجم زیادی از هرزنامه مواجه است، می‌توانید این گزینه را فعال کنید تا IPهای مشکوک نیز مسدود شوند. توجه داشته باشید که ممکن است در این حالت برخی کاربران واقعی نیز به اشتباه مسدود شوند؛ بنابراین با احتیاط از این گزینه استفاده کنید."
