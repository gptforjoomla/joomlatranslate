COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_NONEWFRONTENDADMINS_GROUPS_TIP="این قابلیت برای کدام گروه‌های کاربری دارای دسترسی مدیریت اعمال شود؟ اگر هیچ گروهی انتخاب نشود، Admin Tools ایجاد یا ویرایش تمام کاربرانی را که دارای دسترسی به مدیریت هستند یا قرار است چنین دسترسی‌ای دریافت کنند، از طریق بخش کاربری سایت غیرفعال خواهد کرد."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_PHPSHIELD="مسدودسازی PHP Stream Wrapperها (PHPShield)"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_PHPSHIELD_TIP="برخی مهاجمان تلاش می‌کنند با استفاده از PHP Stream Wrapperها (مانند آدرس‌هایی که با <code>php://</code>، <code>phar://</code> و موارد مشابه آغاز می‌شوند) فایل‌های سایت را بدون استفاده از سازوکارهای معمول بارگذاری فایل در جوملا دستکاری کنند. با فعال بودن این گزینه، Admin Tools تمام درخواست‌هایی را که شامل این الگوها باشند مسدود می‌کند."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_REASONS_NOEMAIL="برای این دلایل اعلان ایمیلی ارسال نشود"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_REASONS_NOEMAIL_TIP="درخواست‌هایی که به دلایل انتخاب‌شده مسدود شوند، باعث ارسال ایمیل به نشانی تعیین‌شده در گزینه <em>ارسال ایمیل هنگام مسدود شدن درخواست</em> نخواهند شد."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_REASONS_NOLOG="این دلایل ثبت گزارش نشوند"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_REASONS_NOLOG_TIP="درخواست‌هایی که به دلایل انتخاب‌شده مسدود شوند، در گزارش‌ها ثبت نخواهند شد. در نتیجه، IPهایی که به‌دلیل این موارد به‌طور مکرر مسدود می‌شوند، به‌صورت خودکار از سایت ممنوع نخواهند شد. همچنین به‌دلیل نبود گزارش، امکان تشخیص علت مسدود شدن کاربران نیز وجود نخواهد داشت."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_RESETJOOMLATFA="غیرفعال کردن احراز هویت دومرحله‌ای جوملا هنگام بازنشانی رمز عبور"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_RESETJOOMLATFA_TIP="در صورت فعال بودن، هنگام بازنشانی رمز عبور، تنظیمات احراز هویت دومرحله‌ای داخلی جوملا برای آن کاربر غیرفعال می‌شود. این گزینه فقط برای قابلیت احراز هویت دومرحله‌ای داخلی جوملا (از نسخه 3.2 به بعد) کاربرد دارد و شامل قابلیت احراز هویت دومرحله‌ای Admin Tools نمی‌شود."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_RFISHIELD="مسدودسازی درج فایل از راه دور (RFIShield)"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_RFISHIELD_TIP="برخی مهاجمان تلاش می‌کنند یک افزونه آسیب‌پذیر را وادار کنند کد PHP را مستقیماً از سرور خود بارگذاری کند. این کار معمولاً با ارسال آدرس‌های <code>http://</code>، <code>https://</code> یا <code>ftp://</code> در درخواست انجام می‌شود. در صورت فعال بودن این گزینه، Admin Tools این آدرس‌ها را بررسی کرده، محتوای آن‌ها را دریافت و اسکن می‌کند و اگر حاوی کد PHP باشد، درخواست را مسدود خواهد کرد."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SAVEUSERSIGNUPIP="ذخیره IP ثبت‌نام کاربران در یادداشت‌های کاربر"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SAVEUSERSIGNUPIP_TIP="در صورت فعال بودن، IP کاربران جدید هنگام ثبت‌نام در قالب «یادداشت کاربر» ذخیره می‌شود. کاربرانی که از طریق بخش مدیریت ایجاد می‌شوند، IP آن‌ها ذخیره نخواهد شد، زیرا این حساب‌ها توسط مدیر سایت ایجاد شده‌اند. همچنین ممکن است برخی افزونه‌های جانبی هنگام ایجاد کاربر، رویداد مربوطه را اجرا نکنند."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SAVEUSERSIGNUPIP_CATEGORY="دسته‌بندی یادداشت‌های کاربر"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SAVEUSERSIGNUPIP_CATEGORY_TIP="دسته‌بندی یادداشت‌های کاربری را که Admin Tools باید IP کاربران را در آن ذخیره کند انتخاب کنید. مقدار پیش‌فرض «بدون دسته‌بندی» است."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SELFPROTECT="محافظت در برابر غیرفعال شدن افزونه"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SELFPROTECT_TIP="در صورت فعال بودن، Admin Tools از غیرفعال شدن (عدم انتشار) افزونه توسط کاربران بخش مدیریت جلوگیری می‌کند. در نتیجه، تا زمانی که این گزینه را غیرفعال نکنید، خودتان نیز قادر به غیرفعال کردن افزونه نخواهید بود. توجه داشته باشید این قابلیت در برابر ویرایش مستقیم پایگاه داده، تغییر نام یا حذف فایل‌های افزونه Admin Tools (پوشه <code>plugins/system/admintools</code>) محافظتی ایجاد نمی‌کند. همچنین از حذف کامل Admin Tools نیز جلوگیری نمی‌کند، زیرا به‌طور پیش‌فرض فقط Super Userها قادر به حذف افزونه هستند. اگر مهاجم به سطح دسترسی Super User دست پیدا کند، غیرفعال کردن Admin Tools کوچک‌ترین نگرانی شما خواهد بود."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SESSIONSHIELD="محافظت در برابر آلوده‌سازی داده‌های نشست PHP (SessionShield)"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SESSIONSHIELD_TIP="از ورود داده‌های مخربی که می‌توانند PHP را هنگام بازیابی نشست کاربر به اجرای کد دلخواه وادار کنند جلوگیری می‌کند. <strong>هشدار:</strong> این قابلیت <em>ممکن است</em> برخی درخواست‌های معتبر را نیز مسدود کند."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SQLISHIELD="محافظت SQLiShield در برابر حملات تزریق SQL"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SQLISHIELD_TIP="در صورت فعال بودن، Admin Tools تلاش می‌کند حملات رایج تزریق SQL علیه سایت شما را شناسایی کرده و آن‌ها را مسدود کند."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SUPERUSERSLIST="پایش حساب‌های Super User"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SUPERUSERSLIST_TIP="Admin Tools فهرست حساب‌های دارای دسترسی Super User را زیر نظر می‌گیرد. اگر یک حساب Super User جدید خارج از صفحه «کاربران» جوملا ایجاد شود، از طریق ایمیل به شما اطلاع داده خواهد شد. همچنین آن حساب به‌صورت خودکار مسدود می‌شود. کاربرانی که توسط سایر Super Userها از طریق صفحه کاربران جوملا در بخش مدیریت ایجاد یا ارتقا داده شوند، توسط این قابلیت مسدود نخواهند شد. برای جلوگیری از این کار از قابلیت «غیرفعال کردن ویرایش ویژگی‌های کاربران مدیریتی» استفاده کنید."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SUPERUSERSLIST_EMAIL="ارسال ایمیل هنگام تغییر در حساب‌های Super User"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_SUPERUSERSLIST_EMAIL_TIP="نشانی‌های ایمیلی (جداشده با ویرگول) را وارد کنید تا در صورت هرگونه تلاش برای تغییر فهرست Super Userهای سایت (که مسدود نیز خواهد شد) اعلان دریافت کنند. اگر این فیلد خالی باشد، از نشانی تعیین‌شده در گزینه «ارسال ایمیل پس از مسدودسازی خودکار IP» استفاده می‌شود. اگر هر دو فیلد خالی باشند، ایمیل برای تمام حساب‌های فعال Super User که گزینه «دریافت ایمیل‌های سیستمی» را در پروفایل خود فعال کرده‌اند ارسال خواهد شد."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TEMPLATE="مسدود کردن تغییر قالب سایت با پارامتر template=foo"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TEMPLATE_TIP="یکی از قابلیت‌های پنهان جوملا امکان تغییر قالب نصب‌شده سایت از طریق یک پارامتر URL است. برای مثال، با افزودن پارامتر <code>?template=beez5</code> می‌توان قالب Beez5 را به‌طور موقت نمایش داد."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TMPL="مسدود کردن تغییر قالب سیستمی با پارامتر tmpl=foo"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TMPLWHITELIST="فهرست کلیدواژه‌های مجاز tmpl="
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TMPLWHITELIST_TIP="در هر خط یک کلیدواژه tmpl وارد کنید. مقادیر <code>component</code> و <code>system</code> همیشه به‌صورت خودکار مجاز هستند، حتی اگر آن‌ها را در این فهرست اضافه نکنید."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TMPL_TIP="یکی از قابلیت‌های کمتر شناخته‌شده جوملا، قالب‌های سیستمی آن است. زمانی که خطایی رخ دهد یا سایت را آفلاین کنید، جوملا قالب سیستمی مربوطه را بارگذاری می‌کند. با افزودن پارامتری مانند <code>?tmpl=offline</code> به آدرس سایت، می‌توان این قالب‌ها را بدون ایجاد خطا یا آفلاین کردن سایت آزمایش کرد. فعال کردن این گزینه این قابلیت پنهان جوملا را غیرفعال می‌کند. توجه داشته باشید که <code>tmpl=system</code> و <code>tmpl=component</code> باید مجاز باشند (به گزینه بعدی مراجعه کنید)، زیرا برخی افزونه‌ها برای عملکرد صحیح به آن‌ها نیاز دارند."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TRACKFAILEDLOGINS="در نظر گرفتن ورودهای ناموفق به‌عنوان دلیل مسدودسازی درخواست"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TRACKFAILEDLOGINS_TIP="در صورت فعال بودن، تلاش‌های ناموفق برای ورود هر نوع کاربر (حتی کاربران عادی ثبت‌نام‌شده) به‌عنوان یک دلیل معتبر برای مسدود کردن درخواست در نظر گرفته شده و در گزارش درخواست‌های مسدودشده Admin Tools ثبت می‌شود. این موضوع مزیت مهمی دارد؛ زیرا این موارد در شمارش مسدودسازی خودکار IP نیز لحاظ می‌شوند. بنابراین پس از چند بار ورود ناموفق، IP کاربر به‌صورت خودکار برای مدت تعیین‌شده مسدود خواهد شد."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TROUBLESHOOTEREMAIL="ارسال ایمیل راهنمای عیب‌یابی هنگام انجام عملیات مدیریتی"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_TROUBLESHOOTEREMAIL_TIP="هر زمان کاربر واردشده در بخش مدیریت یکی از عملیات مدیریتی Admin Tools را انجام دهد که ممکن است باعث قفل شدن دسترسی به سایت یا بروز اختلال در عملکرد آن شود، یک ایمیل راهنمای عیب‌یابی برای او ارسال می‌شود. این ایمیل شامل پیوندهایی به مقالات آموزشی برای رفع مشکل و بازگرداندن سایت به وضعیت عادی است. اکیداً توصیه می‌شود این قابلیت را فعال نگه دارید، زیرا مطالعه این راهنماها بسیار سریع‌تر از انتظار برای پاسخ تیم پشتیبانی خواهد بود."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_USE403VIEW="نمایش خطاها با استفاده از قالب HTML قابل سفارشی‌سازی"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_USE403VIEW_TIP="به‌طور پیش‌فرض، پیام درخواست مسدودشده با صفحه استاندارد خطای جوملا نمایش داده می‌شود. با فعال کردن این گزینه، Admin Tools از یک قالب HTML قابل سفارشی‌سازی استفاده می‌کند. فایل پیش‌فرض این قالب در مسیر <code>components/com_admintools/View/Blocks/tmpl/default.php</code> قرار دارد. <strong>این فایل را مستقیماً ویرایش نکنید!</strong> برای ایجاد Override صحیح، مستندات افزونه را مطالعه کنید."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_WHITELIST_DOMAINS="دامنه‌هایی که هرگز مسدود نمی‌شوند"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_WHITELIST_DOMAINS_TIP="اگر IP بازدیدکننده‌ای که قرار است مسدود شود به نام دامنه‌ای ختم شود که در این فهرست وارد کرده‌اید، درخواست او مسدود نخواهد شد و به‌طور عادی پردازش می‌شود. در واقع این دامنه‌ها همیشه مجاز هستند. توجه داشته باشید که طولانی بودن این فهرست می‌تواند تأثیر منفی قابل‌توجهی بر عملکرد سایت داشته باشد. مقادیر پیش‌فرض شامل <code>.crawl.baidu.com</code>، <code>.crawl.baidu.jp</code>، <code>.google.com</code>، <code>.googlebot.com</code>، <code>.search.msn.com</code>، <code>.crawl.yahoo.net</code>، <code>.yandex.ru</code>، <code>.yandex.net</code> و <code>.yandex.com</code> است که خزنده‌های رایج موتورهای جستجو را مجاز می‌کند."
COM_ADMINTOOLS_CONFIGUREWAF_LBL_PERMABAN="افزودن متخلفان تکراری به فهرست مسدودسازی IP"
COM_ADMINTOOLS_CONFIGUREWAF_LBL_PERMABANNUM="مسدودسازی دائمی IP پس از این تعداد مسدودسازی خودکار"
