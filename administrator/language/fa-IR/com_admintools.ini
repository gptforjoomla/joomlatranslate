COM_ADMINTOOLS_MAIL_SUPERUSERSLIST_TITLE="Admin Tools: افزودن کاربران ارشد"
COM_ADMINTOOLS_MAIL_SUPERUSERSLIST_DESC="هنگامی که یک کاربر ارشد (Super User) ایجاد شود و قابلیت «نظارت بر حساب‌های کاربر ارشد» فعال باشد، این ایمیل توسط Admin Tools ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_SUPERUSERSLIST_SUBJECT="کاربران ارشد جدیدی به {SITENAME} افزوده شده‌اند"
COM_ADMINTOOLS_EMAIL_SUPERUSERSLIST_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که افزودن مشکوک یک یا چند حساب کاربری با سطح دسترسی کاربر ارشد (Super User) در سایت {SITENAME} شناسایی شده است. به نظر می‌رسد این حساب‌ها از روش معمول، یعنی از طریق صفحه «کاربران» جوملا، ایجاد نشده‌اند. بنابراین این حساب‌ها به‌صورت خودکار مسدود شده‌اند. فهرست حساب‌های شناسایی و مسدود شده:\n\n{INFO}\n\nآیا باید نگران باشم؟\n======================================================================\n\nکاربران ارشد دسترسی کامل به سایت دارند. آن‌ها می‌توانند بدون هیچ محدودیتی تمام محتوای سایت را تغییر دهند و همچنین نرم‌افزارهایی نصب کنند که به تمامی بخش‌های سایت، از جمله فایل‌ها، پایگاه داده و تنظیمات، دسترسی کامل داشته باشند. دسترسی کاربر ارشد را فقط به افرادی که کاملاً به آن‌ها اعتماد دارید اعطا کنید.\n\nدریافت این ایمیل معمولاً به این معناست که این حساب‌های کاربری خارج از صفحه «کاربران» جوملا ایجاد شده‌اند. این وضعیت اغلب نشان‌دهنده آن است که مهاجمی موفق شده از لایه‌های امنیتی سایت یا سرور عبور کرده و به‌صورت مخفیانه برای خود حساب کاربر ارشد ایجاد کند. به همین دلیل این حساب‌ها مسدود شده‌اند و امکان ورود به سایت را ندارند.\n\nالبته ممکن است این پیام به اشتباه برای شما ارسال شده باشد؛ برای مثال اگر شما یا یکی دیگر از کاربران ارشد، عمداً این حساب‌ها را با استفاده از یک ابزار شخص ثالث ایجاد کرده باشید. در این صورت جای نگرانی نیست. کافی است با حساب کاربر ارشد خود وارد بخش مدیریت سایت شوید، به صفحه «کاربران» بروید، کاربران ذکرشده در این ایمیل را ویرایش کرده و از حالت مسدود خارج کنید.\n\nاگر شما یا هیچ‌یک از کاربران ارشد چنین حساب‌هایی را ایجاد نکرده‌اید، توصیه می‌کنیم سایت و سرور خود را از نظر هرگونه فعالیت غیرعادی یا نشانه‌های نفوذ به‌طور کامل بررسی کنید.\n\nبا احترام\n\nتیم {SITENAME}\n\nتوجه: این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت {SITENAME} هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
