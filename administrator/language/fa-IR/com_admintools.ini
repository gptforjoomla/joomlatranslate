COM_ADMINTOOLS_CONFIGUREWAF_LBL_SPAMMERMESSAGE_TIP="به شما امکان می‌دهد پیام دلخواهی را به IPهای مسدودشده نمایش دهید. برای مثال می‌توانید توضیح دهید که IP آن‌ها به دلیل شناسایی فعالیت مشکوک مسدود شده است. همچنین می‌توانید از متن ویژه <code>[IP]</code> (کاملاً با حروف بزرگ و بدون فاصله) استفاده کنید تا IP کاربر در پیام نمایش داده شود. این قابلیت در مواقعی که کاربری به اشتباه مسدود شده و از شما درخواست راهنمایی می‌کند، مفید خواهد بود."
