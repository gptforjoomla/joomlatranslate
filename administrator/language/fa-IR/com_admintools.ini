COM_ADMINTOOLS_UNBLOCKIP_LBL_INFO="از این صفحه می‌توانید انسداد نشانی IP کاربر یا مراجعه‌کننده‌ای را که به‌اشتباه توسط Admin Tools مسدود شده است، رفع کنید. با این کار تمام رکوردهای مرتبط با آن IP که در ایجاد این مسدودسازی نقش داشته‌اند حذف می‌شوند. این قابلیت فقط برای IPهایی که به‌صورت خودکار مسدود شده‌اند و همچنین IPهای تکی موجود در «فهرست IPهای غیرمجاز» عمل می‌کند. اگر IP به‌دلیل یک بازه IP یا سایر انواع مسدودسازی چندگانه که به‌صورت دستی در فهرست IPهای غیرمجاز وارد کرده‌اید مسدود شده باشد، این ابزار کار نخواهد کرد. همچنین برای IPهایی که به‌دلیل عوامل خارجی مانند قوانین موجود در فایل .htaccess، فایروال شخص ثالث یا سایر سامانه‌های امنیتی مسدود شده‌اند نیز قابل استفاده نیست."
