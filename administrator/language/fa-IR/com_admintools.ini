COM_ADMINTOOLS_WAFDENYLISTS_LBL_QUERY_TYPE_DESC="نحوه تطبیق پارامتر Query را انتخاب کنید. گزینه «عبارت باقاعده» یعنی مقدار این فیلد یک <a href=\\"_QQ_"https://www.php.net/manual/en/reference.pcre.pattern.syntax.php\\"_QQ_" target=\\"_QQ_"_blank\\"_QQ_">عبارت باقاعده PHP</a> است که با محتوای پارامتر تطبیق داده می‌شود. با قراردادن علامت تعجب (<code>!</code>) در ابتدای عبارت می‌توانید نتیجه را معکوس کنید. گزینه «دقیق» یعنی نام پارامتر باید دقیقاً مطابق مقدار واردشده (با رعایت حروف کوچک و بزرگ) باشد. گزینه «جزئی» یعنی نام پارامتر باید شامل متن واردشده باشد؛ برای مثال مقدار «bar» با «rebar»، «bartender» و «bar» مطابقت خواهد داشت."

