COM_ADMINTOOLS_CONFIGUREWAF_LBL_OPT_HTTPBLTHRESHOLD_TIP="Project Honeypot از یک «امتیاز تهدید» لگاریتمی برای ارزیابی احتمال هرزنامه‌فرست بودن یک IP استفاده می‌کند. این گزینه حداقل امتیازی را مشخص می‌کند که یک IP باید داشته باشد تا مسدود شود. مقدار ۲۵ به این معناست که آن IP حدود ۱۰۰ پیام هرزنامه در تله‌های Project Honeypot ارسال کرده و معمولاً نشانه قابل اعتمادی از هرزنامه‌فرست بودن آن است. توجه داشته باشید که این امتیاز لگاریتمی است؛ مقدار ۵۰ معادل حدود ۱٬۰۰۰ پیام و مقدار ۷۵ معادل حدود یک میلیون پیام هرزنامه است. این مقدار را بیشتر از ۵۰ قرار ندهید، زیرا در این صورت احتمالاً هیچ هرزنامه‌فرستی مسدود نخواهد شد. مقدار پیش‌فرض ۲۵ است (تشخیص ۱۰۰ پیام هرزنامه از آن IP)."
