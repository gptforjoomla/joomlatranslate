COM_ADMINTOOLS_MAIL_ADMINLOGINSUCCESS_DESC="در صورت ورود موفق به بخش مدیریت، در صورتی که این قابلیت فعال باشد، این ایمیل توسط Admin Tools ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_ADMINLOGINSUCCESS_SUBJECT="کاربر {USER} وارد بخش مدیریت سایت {SITENAME} شد"
COM_ADMINTOOLS_EMAIL_ADMINLOGINSUCCESS_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که کاربر {USER} به‌تازگی وارد بخش مدیریت سایت {SITENAME} شده است. اطلاعات بیشتر:\n\nنام کاربری: {USER}\nنشانی IP: {IP} ({LOOKUP})\nرشته User Agent مرورگر: {UA}\n\nاگر این موضوع مورد انتظار شما بوده است، نیازی به انجام هیچ اقدامی نیست. در غیر این صورت، اگر احتمال می‌دهید این یک تلاش برای نفوذ باشد، لطفاً فوراً وارد بخش مدیریت سایت شوید و حالت «آفلاین اضطراری» (Emergency Off-Line) در Admin Tools را فعال کنید.\n\nبا احترام\n\nتیم {SITENAME}\n\nتوجه: این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت {SITENAME} هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
COM_ADMINTOOLS_EMAIL_ADMINLOGINSUCCESS_BODY_HTML="<p>سلام،</p><p>به اطلاع شما می‌رسانیم که کاربر <strong>{USER}</strong> به‌تازگی وارد بخش مدیریت سایت {SITENAME} شده است. اطلاعات بیشتر:</p><p>نام کاربری: {USER}<br />نشانی IP: {IP} (<a href=\\"_QQ_"{LOOKUP}\\"_QQ_">بررسی IP</a>)<br />رشته User Agent مرورگر: {UA}</p><p>اگر این موضوع مورد انتظار شما بوده است، نیازی به انجام هیچ اقدامی نیست. در غیر این صورت، اگر احتمال می‌دهید این یک تلاش برای نفوذ باشد، لطفاً فوراً وارد بخش مدیریت سایت شوید و حالت «آفلاین اضطراری» (Emergency Off-Line) در Admin Tools را فعال کنید.</p><p>با احترام</p><p>تیم {SITENAME}</p><p><small>این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت <em>{SITENAME}</em> هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است.</small></p>"

COM_ADMINTOOLS_MAIL_IPAUTOBAN_TITLE="Admin Tools: مسدودسازی خودکار IP"
COM_ADMINTOOLS_MAIL_IPAUTOBAN_DESC="در صورتی که یک یا چند آدرس ایمیل برای این قابلیت انتخاب شده باشد، هنگام مسدود شدن خودکار یک نشانی IP این ایمیل توسط Admin Tools ارسال می‌شود. این ایمیل همچنین شامل راهنمای «حالت نجات» (Rescue Mode) نیز هست."
COM_ADMINTOOLS_EMAIL_IPAUTOBAN_SUBJECT="اعلان مسدودسازی خودکار IP ‏{IP} در {SITENAME}"
COM_ADMINTOOLS_EMAIL_IPAUTOBAN_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که نشانی IP ‏{IP} به‌صورت موقت از دسترسی به سایت {SITENAME} مسدود شده است. جزئیات بیشتر:\n\nنشانی IP: {IP} (بررسی IP: {LOOKUP})\nدلیل آخرین درخواست مسدودشده: {REASON}\nمسدود تا: {UNTIL}\n\n{RESCUEINFO}\n\nبا احترام\n\nتیم {SITENAME}\n\nاین پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت {SITENAME} هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
COM_ADMINTOOLS_EMAIL_IPAUTOBAN_BODY_HTML="<p>سلام،</p><p>به اطلاع شما می‌رسانیم که نشانی IP ‏{IP} به‌صورت موقت از دسترسی به سایت {SITENAME} مسدود شده است. جزئیات بیشتر:</p><p>نشانی IP: {IP} (<a href=\\"_QQ_"{LOOKUP}\\"_QQ_">بررسی IP</a>)<br />دلیل آخرین درخواست مسدودشده: {REASON}<br />مسدود تا: {UNTIL}</p><p>{RESCUEINFO}</p><p>با احترام</p><p>تیم {SITENAME}</p><p><small>این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت <em>{SITENAME}</em> هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است.</small></p>"

COM_ADMINTOOLS_MAIL_CRITICALFILES_TITLE="Admin Tools: تغییر فایل حیاتی"
COM_ADMINTOOLS_MAIL_CRITICALFILES_DESC="هنگامی که یک «فایل حیاتی» تغییر کند، این ایمیل توسط Admin Tools ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_CRITICALFILES_SUBJECT="فایل(های) حیاتی در {SITENAME} تغییر کرده‌اند"
COM_ADMINTOOLS_EMAIL_CRITICALFILES_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که یک یا چند فایل حیاتی در سایت {SITENAME} تغییر کرده‌اند. فهرست فایل‌های تغییر یافته به شرح زیر است:\n\n{INFO}\n\nآیا باید نگران باشم؟\n======================================================================\n\nمنظور از «فایل‌های حیاتی» در این ایمیل، فایل‌هایی است که معمولاً پس از نفوذ موفق به یک سایت، بیش از سایر فایل‌ها هدف مهاجمان قرار می‌گیرند. البته این فایل‌ها ممکن است، و در بسیاری از موارد نیز به دلایل کاملاً عادی، تغییر کنند. برای مثال، هنگام ذخیره تنظیمات سراسری سایت (Global Configuration) یا به‌روزرسانی جوملا یا یکی از قالب‌های سایت.\n\nاگر این ایمیل پس از انجام یکی از اقدامات زیر توسط شما یا یکی از مدیرانی که به او اعتماد دارید ارسال شده است، جای نگرانی نیست:\n\n* بازیابی فایل‌ها و/یا پایگاه داده سایت از نسخه پشتیبان\n* تغییر تنظیمات سراسری سایت (Global Configuration)\n* به‌روزرسانی جوملا\n* به‌روزرسانی قالب سایت\n\nاگر این پیام در نتیجه هیچ‌یک از تغییرات فوق ارسال نشده است، لطفاً هرچه سریع‌تر سایت خود را بررسی کنید؛ زیرا ممکن است نشانه‌ای از نفوذ، یا عملکرد یک افزونه یا نرم‌افزار شخص ثالث باشد که از آن آگاه نبوده‌اید و می‌تواند تأثیر نامطلوبی بر سایت شما داشته باشد.\n\nبا احترام\n\nتیم {SITENAME}\n\nتوجه: این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت {SITENAME} هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
