COM_ADMINTOOLS_JCONFIG_OVERRIDE_APACHE_DESCRIPTION="اگر از وب‌سرور Apache استفاده می‌کنید، نسخه آن را انتخاب کنید. برای اکثر سایت‌ها گزینه «تشخیص خودکار» توصیه می‌شود. فقط زمانی نسخه را به‌صورت دستی انتخاب کنید که شرکت میزبان عمداً متغیر محیطی <code>SERVER_SOFTWARE</code> را از دسترس PHP خارج کرده یا مقدار نادرست یا خالی برای آن تنظیم کرده باشد."
