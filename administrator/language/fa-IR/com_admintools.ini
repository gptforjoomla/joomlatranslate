COM_ADMINTOOLS_CONTROLPANEL_ERR_FESECRETWORD_HEADER="قابلیت‌های زمان‌بندی اسکنر تغییرات فایل PHP از بخش کاربری غیرفعال شده‌اند."
COM_ADMINTOOLS_CONTROLPANEL_ERR_FESECRETWORD_INTRO="«عبارت محرمانه» شما امنیت کافی ندارد و به‌راحتی قابل حدس زدن است. برای محافظت از سایت، Admin Tools دسترسی به زمان‌بندی بخش کاربری را تا زمانی که یک عبارت محرمانه امن وارد نکنید غیرفعال کرده است. مشکل شناسایی‌شده:"
COM_ADMINTOOLS_CONTROLPANEL_ERR_FESECRETWORD_WHATTODO_COMMON="همچنین می‌توانید با کلیک روی دکمه زیر، عبارت محرمانه را به مقدار پیشنهادی <code>%s</code> بازنشانی کنید. در هر دو حالت باید وظایف CRON خود را با عبارت محرمانه جدید به‌روزرسانی کنید."
COM_ADMINTOOLS_CONTROLPANEL_ERR_FESECRETWORD_WHATTODO_JOOMLA="لطفاً روی «تنظیمات»، سپس «بخش کاربری (Frontend)» کلیک کرده و یک عبارت محرمانه پیچیده‌تر وارد کنید."
COM_ADMINTOOLS_CONTROLPANEL_BTN_FESECRETWORD_RESET="اعمال عبارت محرمانه پیشنهادی"

COM_ADMINTOOLS_CONTROLPANEL_LBL_DISCLAIMER="سلب مسئولیت"
COM_ADMINTOOLS_CONTROLPANEL_LBL_DISTEXT="افزونه‌های امنیتی مانند Admin Tools برای ارائه محافظت ۱۰۰٪ در برابر همه حملات احتمالی طراحی نشده‌اند. این افزونه‌ها به افزایش امنیت سایت شما کمک می‌کنند، اما جایگزین رعایت اصول امنیتی نیستند. برای حفظ امنیت سایت، حداقل باید جوملا و افزونه‌های آن را به‌طور منظم به‌روزرسانی کنید، به‌صورت منظم نسخه‌های پشتیبان آزمایش‌شده و خارج از سرور تهیه کنید و همواره رفتارهای غیرعادی سایت را زیر نظر داشته باشید."

COM_ADMINTOOLS_CONTROLPANEL_LBL_EMPTYROOT_HEAD="مسیر پایه سایت خالی گزارش شده است."
COM_ADMINTOOLS_CONTROLPANEL_LBL_EMPTYROOT_BODY="PHP مسیر پایه سایت را به‌صورت خالی گزارش می‌کند. این مشکل ناشی از یک باگ در نسخه‌های قدیمی PHP است. لطفاً از میزبان خود بخواهید نسخه PHP نصب‌شده روی سرور را به‌روزرسانی کند. اگر در این وضعیت از قابلیت «اصلاح مجوزها» (Fix Permissions) استفاده کنید، احتمال بسیار زیادی وجود دارد که دسترسی شما به سایت قطع شود."

COM_ADMINTOOLS_CONTROLPANEL_LBL_MAINPASSWORD="رمز عبور اصلی"
COM_ADMINTOOLS_CONTROLPANEL_LBL_MAINPASSWORD_HEAD="محافظت با رمز عبور"
COM_ADMINTOOLS_CONTROLPANEL_LBL_MAINPASSWORD_INTRO="مدیر این سایت برخی یا تمام قابلیت‌های Admin Tools را با رمز عبور محافظت کرده است. برای دسترسی به این قابلیت‌ها، لطفاً رمز عبور را وارد کنید."

COM_ADMINTOOLS_CONTROLPANEL_LBL_MUSTENTERDLID="باید شناسه دانلود (Download ID) خود را وارد کنید."
COM_ADMINTOOLS_CONTROLPANEL_LBL_NEEDSDLID="برای به‌روزرسانی نسخه حرفه‌ای Admin Tools باید <b>شناسه دانلود (Download ID)</b> خود را وارد کنید. <a href='%s' target='_blank'>اگر شناسه دانلود خود را نمی‌دانید، اینجا کلیک کنید.</a>"
COM_ADMINTOOLS_CONTROLPANEL_MSG_WHERETOENTERDLID="از منوی «سیستم» جوملا در سمت چپ وارد شوید. در بخش «به‌روزرسانی» روی «سایت‌های به‌روزرسانی» کلیک کنید. مورد «Admin Tools Professional» را پیدا کرده و روی آن کلیک کنید. یا برای رفتن مستقیم به آن صفحه <a href=\\"_QQ_"%s\\"_QQ_">اینجا کلیک کنید</a>. شناسه دانلود خود (Main ID یا Download ID افزونه) را در کادر «کلید دانلود» (Download Key) وارد کرده و روی دکمه «ذخیره» کلیک کنید."
COM_ADMINTOOLS_CONTROLPANEL_MSG_JOOMLABUGGYUPDATES="<strong>مهم:</strong> اگر جوملا پیش از وارد کردن شناسه دانلود، وجود نسخه جدید Admin Tools را تشخیص داده باشد، به دلیل برخی باگ‌های قدیمی جوملا <em>ممکن است حتی پس از وارد کردن شناسه دانلود نیز نتواند آن را دانلود کند</em>. در این صورت، فایل ZIP آخرین نسخه را از سایت ما دانلود کنید. سپس از منوی «سیستم» جوملا وارد بخش «نصب» شوید، روی «افزونه‌ها» کلیک کرده، زبانه «بارگذاری فایل بسته» را انتخاب کنید و فایل ZIP دانلودشده را <strong>دو بار پیاپی</strong> نصب کنید، <strong>بدون اینکه Admin Tools را قبل یا بین دو نصب حذف کنید</strong>. نصب دوباره برای رفع یکی دیگر از باگ‌های قدیمی جوملا ضروری است که گاهی باعث می‌شود همه فایل‌های به‌روزرسانی به‌درستی جایگزین نشوند."

