COM_ADMINTOOLS_NGINXCONFMAKER_LBL_WILLTHISWORK_NO="<b>خیر، اصلاً</b>. تشخیص داده شد که از نوع سروری استفاده می‌کنید که با فایل‌های پیکربندی NginX سازگار نیست (مانند Microsoft IIS، Apache، LiteSpeed یا Lighttpd). بنابراین استفاده از سازنده فایل پیکربندی NginX <strong>هیچ تأثیری</strong> بر سایت شما نخواهد داشت."
COM_ADMINTOOLS_NGINXCONFMAKER_LBL_WILLTHISWORK_YES="<b>به احتمال زیاد بله</b>. تشخیص داده شد که وب‌سرور شما NginX است. البته پشتیبانی از فایل پیکربندی سفارشی برای هر سایت به تنظیمات میزبان شما بستگی دارد. لطفاً درباره روش صحیح استفاده از فایل nginx.conf سفارشی با میزبان خود مشورت کنید."

