مقدار «Administrator Secret URL Parameter» را فراموش کرده‌اید، به مسیر «کامپوننت‌ها → Admin Tools → Web Application Firewall → Configure WAF» بروید، تب «Basic Protection Features» را باز کنید و مقدار گزینه «Administrator Secret URL Parameter» را تغییر دهید یا کاملاً حذف کنید تا این قابلیت بازنشانی یا غیرفعال شود.</p><h3>اگر همچنان نتوانستم وارد سایت شوم چه کنم؟</h3><p>در دو حالت، قابلیت پیوند نجات یا تغییر نام فایل پلاگین سیستمی Admin Tools کمکی نخواهد کرد؛ زیرا در این شرایط، Admin Tools یک فایل پیکربندی <em>وب‌سرور</em> ایجاد کرده است و در نتیجه مسدودسازی توسط <em>وب‌سرور</em> انجام می‌شود، نه توسط Admin Tools.</p><p>حالت اول زمانی است که قابلیت <strong>محافظت از پوشه مدیریت با رمز عبور</strong> فعال باشد. در این صورت باید فایل‌های <code>.htaccess</code> و <code>.htpasswd</code> را از پوشه <code>administrator</code> سایت خود حذف کنید.</p><p>حالت دوم زمانی است که از قابلیت <strong>.htaccess Maker</strong> استفاده کرده باشید. در این شرایط فایل <code>.htaccess</code> موجود در ریشه سایت را با <a href=\\"_QQ_"https://raw.githubusercontent.com/joomla/joomla-cms/staging/htaccess.txt\\"_QQ_" rel=\\"_QQ_"alternate\\"_QQ_">نسخه پیش‌فرض فایل .htaccess جوملا</a> جایگزین کنید.</p><p>در هر دو حالت توجه داشته باشید که نام این فایل‌ها با نقطه (.) آغاز می‌شود و به‌صورت <em>مخفی</em> هستند. برای مشاهده، ویرایش یا حذف آن‌ها باید نمایش فایل‌های مخفی را در مدیر فایل هاست خود فعال کنید. اگر نحوه انجام این کار را نمی‌دانید، از شرکت میزبان سایت خود بخواهید راهنمایی‌تان کند و اعلام کنید که نیاز به ویرایش یا حذف فایل‌های مخفی دارید.</p><p>اگر مشکل شما در هیچ‌یک از موارد بالا قرار نمی‌گیرد، احتمالاً ارتباطی با Admin Tools ندارد. اگر از افزونه امنیتی دیگری استفاده می‌کنید، تنظیمات آن را بررسی کنید. در غیر این صورت با شرکت میزبان سایت خود تماس بگیرید؛ زیرا بسیاری از شرکت‌های هاستینگ از سامانه‌های امنیتی اختصاصی استفاده می‌کنند که ممکن است دسترسی شما به سایت را مسدود کرده باشند.</p>"

COM_ADMINTOOLS_MAIL_BLOCKEDREQUEST_TITLE="Admin Tools: درخواست مسدودشده"
COM_ADMINTOOLS_MAIL_BLOCKEDREQUEST_DESC="هنگامی که یک درخواست توسط فایروال برنامه‌های وب (WAF) در Admin Tools مسدود شود، این ایمیل ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_BLOCKEDREQUEST_SUBJECT="درخواستی در {SITENAME} مسدود شد"
COM_ADMINTOOLS_EMAIL_BLOCKEDREQUEST_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که یک استثنای امنیتی در سایت {SITENAME} شناسایی شده است. جزئیات آن به شرح زیر است:\n\nنشانی IP: {IP} (بررسی IP: {LOOKUP})\nدلیل: {REASON}\n\nاگر این نوع استثنای امنیتی به‌طور مکرر تکرار شد، لطفاً وارد بخش مدیریت سایت شوید و این نشانی IP را به فهرست مسدودسازی فایروال برنامه‌های وب (WAF) در Admin Tools اضافه کنید تا دسترسی این کاربر به‌طور کامل مسدود شود.\n\nبا احترام\n\nتیم {SITENAME}\n\nتوجه: این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت {SITENAME} هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است."
COM_ADMINTOOLS_EMAIL_BLOCKEDREQUEST_BODY_HTML="<p>سلام،</p><p>به اطلاع شما می‌رسانیم که یک استثنای امنیتی در سایت {SITENAME} شناسایی شده است. جزئیات آن به شرح زیر است:</p><p>نشانی IP: {IP} (<a href=\\"_QQ_"{LOOKUP}\\"_QQ_">بررسی IP</a>)<br />دلیل: {REASON}</p><p>اگر این نوع استثنای امنیتی به‌طور مکرر تکرار شد، لطفاً وارد بخش مدیریت سایت شوید و این نشانی IP را به فهرست مسدودسازی فایروال برنامه‌های وب (WAF) در Admin Tools اضافه کنید تا دسترسی این کاربر به‌طور کامل مسدود شود.</p><p>با احترام</p><p>تیم {SITENAME}</p><p><small>این پیام به‌صورت خودکار برای شما ارسال شده است، زیرا یکی از مدیران سایت <em>{SITENAME}</em> هستید. لطفاً به این ایمیل پاسخ ندهید؛ این پیام از یک نشانی ایمیل بدون نظارت ارسال شده است.</small></p>"

COM_ADMINTOOLS_MAIL_DELUGEREQUESTS_TITLE="Admin Tools: افزایش تعداد درخواست‌های مسدودشده"
COM_ADMINTOOLS_MAIL_DELUGEREQUESTS_DESC="هنگامی که تعداد زیادی درخواست در یک بازه زمانی توسط سایت مسدود شود، این ایمیل توسط Admin Tools ارسال می‌شود."
COM_ADMINTOOLS_EMAIL_DELUGEREQUESTS_SUBJECT="افزایش تعداد درخواست‌های مسدودشده در {SITENAME}"
COM_ADMINTOOLS_EMAIL_DELUGEREQUESTS_BODY="سلام،\n\nبه اطلاع شما می‌رسانیم که وب‌سایت {SITENAME} در حال حاضر تعداد زیادی درخواست را مسدود می‌کند.\n\nاز تاریخ {DATE} تاکنون، در مجموع {NUM} درخواست مسدود شده است. پیشنهاد می‌کنیم علت این درخواست‌های مسدودشده را بررسی کنید و اگر احتمال می‌دهید این وضعیت آغاز یک حمله مداوم علیه سایت شما باشد، اقدامات امنیتی بیشتری را در نظر بگیرید."
COM_ADMINTOOLS_EMAIL_DELUGEREQUESTS_BODY_HTML="<p>سلام،</p><p>به اطلاع شما می‌رسانیم که وب‌سایت {SITENAME} در حال حاضر تعداد زیادی درخواست را مسدود می‌کند.</p><p>از تاریخ {DATE} تاکنون، در مجموع {NUM} درخواست مسدود شده است. پیشنهاد می‌کنیم علت این درخواست‌های مسدودشده را بررسی کنید و اگر احتمال می‌دهید این وضعیت آغاز یک حمله مداوم علیه سایت شما باشد، اقدامات امنیتی بیشتری را در نظر بگیرید.</p>"

