COM_ADMINTOOLS_TITLE_EMAILTEMPLATES="قالب‌های ایمیل"

COM_ADMINTOOLS_EMAILTEMPLATES_LBL_WHERE_HEAD="قالب‌های ایمیل کجا هستند؟"
COM_ADMINTOOLS_EMAILTEMPLATES_LBL_WHERE_TEXT="قالب‌های ایمیل مربوط به جوملا و افزونه‌های شخص ثالث مانند Admin Tools، به‌صورت متمرکز در مسیر «سیستم → قالب‌های ایمیل» مدیریت می‌شوند. با این حال، افزونه‌های شخص ثالث باید کد مخصوص خود را برای نصب و به‌روزرسانی این قالب‌ها پیاده‌سازی کنند. این صفحه همین وظیفه را انجام می‌دهد. اگر می‌خواهید قالب‌های ایمیل را سفارشی‌سازی کنید، روی دکمه زیر کلیک کنید تا به صفحه «قالب‌های ایمیل» جوملا منتقل شوید."
COM_ADMINTOOLS_EMAILTEMPLATES_BTN_MAILTEMPLATES="قالب‌های ایمیل"

COM_ADMINTOOLS_EMAILTEMPLATES_LBL_MANAGE_HEAD="مدیریت قالب‌های ایمیل"
COM_ADMINTOOLS_EMAILTEMPLATES_BTN_UPDATE="نصب یا به‌روزرسانی"
COM_ADMINTOOLS_EMAILTEMPLATES_LBL_UPDATE="قالب‌های ایمیل جدید Admin Tools را نصب کرده و در صورت تغییر، قالب‌های موجود را به‌روزرسانی می‌کند. قالب‌های ایمیلی که توسط کاربر ویرایش شده‌اند، بدون تغییر باقی خواهند ماند."
COM_ADMINTOOLS_EMAILTEMPLATES_BTN_RESET="بازنشانی"
COM_ADMINTOOLS_EMAILTEMPLATES_LBL_RESET="همه قالب‌های ایمیل را بازنشانی می‌کند. با این کار تمام قالب‌های ایمیل Admin Tools، <strong>از جمله قالب‌هایی که توسط کاربر ویرایش شده‌اند</strong> حذف شده و سپس همه قالب‌های پیش‌فرض دوباره نصب می‌شوند. فقط زمانی از این گزینه استفاده کنید که تصور می‌کنید اطلاعات مربوط به قالب‌های ایمیل در پایگاه داده دچار مشکل شده است. در غیر این صورت، برای بازنشانی موضوع و متن هر ایمیل به حالت پیش‌فرض، از مدیر «قالب‌های ایمیل» جوملا و دکمه‌های موجود در آن استفاده کنید."

