;; File Scanner
COM_ADMINTOOLS_JCONFIG_SCAN_LABEL="اسکنر فایل"
COM_ADMINTOOLS_JCONFIG_SCAN_DESC="نحوه عملکرد اسکنر فایل‌های PHP را پیکربندی می‌کند."

COM_ADMINTOOLS_JCONFIG_LOGLEVEL_LABEL="سطح ثبت گزارش"
COM_ADMINTOOLS_JCONFIG_LOGLEVEL_DESC="میزان جزئیات گزارش اسکنر فایل‌های PHP که در پوشه گزارش‌های تنظیم‌شده سایت ذخیره می‌شود. مقادیر پیشنهادی: «هشدارها» برای سایت‌های عملیاتی (Production) و «اشکال‌زدایی» زمانی که قصد دریافت پشتیبانی از ما را دارید."
COM_ADMINTOOLS_JCONFIG_LOGLEVEL_NONE="بدون ثبت گزارش"
COM_ADMINTOOLS_JCONFIG_LOGLEVEL_ERROR="خطاها"
COM_ADMINTOOLS_JCONFIG_LOGLEVEL_WARNING="هشدارها"
COM_ADMINTOOLS_JCONFIG_LOGLEVEL_INFO="اطلاعات"
COM_ADMINTOOLS_JCONFIG_LOGLEVEL_DEBUG="اشکال‌زدایی"
COM_ADMINTOOLS_JCONFIG_MINEXEC_LABEL="حداقل زمان هر درخواست"
COM_ADMINTOOLS_JCONFIG_MINEXEC_DESC="حداقل مدت زمانی که هر درخواست اسکنر تغییرات فایل‌های PHP باید طول بکشد. اگر سرور شما به دلیل ارسال مکرر درخواست‌ها خطا می‌دهد یا به محدودیت CPU یا منابع می‌رسید، این مقدار را افزایش دهید.<br/><br/>مقدار پیشنهادی: ۲٫۰ تا ۷٫۰ ثانیه."
COM_ADMINTOOLS_JCONFIG_MAXEXEC_LABEL="حداکثر زمان پردازش"
COM_ADMINTOOLS_JCONFIG_MAXEXEC_DESC="حداکثر زمانی که اسکنر تغییرات فایل‌های PHP در هر درخواست صرف اسکن سایت می‌کند. اگر به محدودیت CPU یا منابع سرور برخورد می‌کنید، این مقدار را کاهش دهید. اگر این مقدار را کمتر از «حداقل زمان هر درخواست» قرار دهید، یک دوره استراحت برای مصرف CPU ایجاد می‌شود که باعث کاهش مصرف منابع هنگام اسکن فایل‌ها خواهد شد، هرچند سرعت اسکن نیز کمتر می‌شود.<br/><br/>مقدار پیشنهادی: ۳٫۰ تا ۷٫۰ ثانیه."
COM_ADMINTOOLS_JCONFIG_RUNTIMEBIAS_LABEL="ضریب زمان پردازش"
COM_ADMINTOOLS_JCONFIG_RUNTIMEBIAS_DESC="عددی بین ۵۰ تا ۱۰۰ که مشخص می‌کند Admin Tools با چه حساسیتی نزدیک شدن به محدودیت «حداکثر زمان پردازش» را پیش‌بینی کند. مقدار ۵۰ بیشترین حساسیت را دارد و باعث می‌شود اسکن در هر درخواست تقریباً نیمی از حداکثر زمان پردازش طول بکشد. مقدار ۱۰۰ کمترین حساسیت را دارد و معمولاً باعث می‌شود مدت اسکن برابر یا بیشتر از حداکثر زمان پردازش باشد.<br/><br/>مقدار پیشنهادی: ۷۵.<br/><br/><strong>نکته:</strong> اگر سرور شما حساس است، پیشنهاد می‌شود «حداقل زمان هر درخواست» را روی ۷٫۰، «حداکثر زمان پردازش» را روی ۵٫۰ و «ضریب زمان پردازش» را روی ۵۰ قرار دهید. در این حالت، اسکنر هر بار بین ۲٫۵ تا ۵ ثانیه کار می‌کند و سپس سرور بین ۲ تا ۴٫۵ ثانیه بدون فعالیت خواهد بود. در نتیجه اسکن سایت حدود سه برابر بیشتر طول می‌کشد، اما احتمال تکمیل موفق آن بیشتر خواهد بود."
COM_ADMINTOOLS_JCONFIG_DIRTHRESHOLD_LABEL="حداکثر تعداد پوشه‌ها در هر مرحله"
COM_ADMINTOOLS_JCONFIG_DIRTHRESHOLD_DESC="حداکثر تعداد پوشه‌هایی که در هر بار از یک پوشه فهرست می‌شوند. این کار از بروز خطای پایان زمان اجرای PHP هنگام فهرست کردن پوشه‌های بسیار بزرگ که صدها زیرپوشه دارند جلوگیری می‌کند.<br/><br/>مقدار پیشنهادی: ۵۰<br/><br/>به خاطر داشته باشید که زمان لازم برای فهرست کردن محتویات پوشه‌ها به‌صورت <strong>تصاعدی</strong> با تعداد فایل‌ها و پوشه‌های موجود در آن‌ها افزایش می‌یابد. این محدودیت مربوط به سیستم‌عامل و درایورهای فایل‌سیستم است و جوملا، PHP یا Admin Tools کنترلی بر آن ندارند. توصیه می‌شود پوشه‌های بسیار بزرگ را از اسکن مستثنا کنید و از ایجاد پوشه‌هایی با هزاران فایل یا زیرپوشه خودداری نمایید. در صورت امکان، ساختار پوشه‌های خود را عمیق‌تر طراحی کنید."
COM_ADMINTOOLS_JCONFIG_FILETHRESHOLD_LABEL="حداکثر تعداد فایل‌ها در هر مرحله"
COM_ADMINTOOLS_JCONFIG_FILETHRESHOLD_DESC="حداکثر تعداد فایل‌هایی که در هر بار از یک پوشه فهرست می‌شوند. این کار از بروز خطای پایان زمان اجرای PHP هنگام فهرست کردن پوشه‌های بسیار بزرگ که هزاران فایل دارند جلوگیری می‌کند.<br/><br/>مقدار پیشنهادی: ۱۰۰<br/><br/>به خاطر داشته باشید که زمان لازم برای فهرست کردن محتویات پوشه‌ها به‌صورت <strong>تصاعدی</strong> با تعداد فایل‌ها و پوشه‌های موجود در آن‌ها افزایش می‌یابد. این محدودیت مربوط به سیستم‌عامل و درایورهای فایل‌سیستم است و جوملا، PHP یا Admin Tools کنترلی بر آن ندارند. توصیه می‌شود پوشه‌های بسیار بزرگ را از اسکن مستثنا کنید و از ایجاد پوشه‌هایی با هزاران فایل یا زیرپوشه خودداری نمایید. در صورت امکان، ساختار پوشه‌های خود را عمیق‌تر طراحی کنید."
COM_ADMINTOOLS_JCONFIG_FEBENABLE_LABEL="فعال‌سازی زمان‌بندی از بخش کاربری"
COM_ADMINTOOLS_JCONFIG_FEBENABLE_DESC="در صورت فعال بودن، امکان اجرای اسکنر تغییرات فایل‌های PHP از بخش کاربری سایت بدون ورود به بخش مدیریت را فراهم می‌کند."
COM_ADMINTOOLS_JCONFIG_SECRETWORD_LABEL="عبارت محرمانه"
COM_ADMINTOOLS_JCONFIG_SECRETWORD_DESC="با الزام استفاده از این عبارت محرمانه در نشانی زمان‌بندی بخش کاربری، از قابلیت زمان‌بندی در برابر حملات DoS محافظت می‌کند. از یک عبارت طولانی و پیچیده استفاده کنید. برای اطلاعات بیشتر به مستندات مراجعه کنید."
COM_ADMINTOOLS_JCONFIG_EMAILTIMEZONE_LABEL="منطقه زمانی ایمیل‌ها"
COM_ADMINTOOLS_JCONFIG_EMAILTIMEZONE_DESC="همه تاریخ‌ها و زمان‌های موجود در ایمیل‌های هشدار امنیتی ارسال‌شده توسط Admin Tools بر اساس منطقه زمانی انتخاب‌شده نمایش داده خواهند شد. مقدار پیش‌فرض: GMT"
COM_ADMINTOOLS_JCONFIG_EMAILTIMEZONE_DEFAULT="منطقه زمانی سرور"
COM_ADMINTOOLS_JCONFIG_DIRECTORYFILTERS_LABEL="پوشه‌های مستثنا"
COM_ADMINTOOLS_JCONFIG_DIRECTORYFILTERS_DESC="پوشه‌هایی که هنگام اسکن سایت نادیده گرفته می‌شوند.<br/><br/>مسیر پوشه‌ها باید نسبت به ریشه سایت وارد شود. در هر خط یک پوشه وارد کنید.<br/><br/>پیش‌فرض: هیچ‌کدام<br/><br/><em>نکته:</em> برخی پوشه‌ها بدون نیاز به افزودن در اینجا به‌صورت خودکار مستثنا می‌شوند؛ از جمله پوشه گزارش‌ها (Log)، پوشه موقت (Temporary)، پوشه‌های کش بخش کاربری و مدیریت، همچنین پوشه‌های tmp، log و logs در بخش کاربری یا مدیریت سایت. همچنین پیوندهای نمادین (Symbolic Links) به پوشه‌های خارج از ریشه سایت دنبال نمی‌شوند و محتوای آن‌ها اسکن نخواهد شد."
COM_ADMINTOOLS_JCONFIG_FILEFILTERS_LABEL="فایل‌های مستثنا"
COM_ADMINTOOLS_JCONFIG_FILEFILTERS_DESC="فایل‌هایی که هنگام اسکن سایت نادیده گرفته می‌شوند.<br/><br/>مسیر فایل‌ها باید نسبت به ریشه سایت وارد شود. در هر خط مسیر یک فایل را وارد کنید.<br/><br/>پیش‌فرض: هیچ‌کدام<br/><br/>این گزینه را فقط برای مستثنا کردن فایل‌هایی که واقعاً قابل اجرا نیستند استفاده کنید؛ برای مثال فایل‌های گزارش با پسوند ‎.php‎ که خارج از پوشه Log جوملا قرار دارند. برای علامت‌گذاری فایل‌های سالم از این گزینه استفاده نکنید؛ به‌جای آن از قابلیت «علامت‌گذاری به‌عنوان سالم» در صفحه گزارش اسکن استفاده کنید."
COM_ADMINTOOLS_JCONFIG_SCANEXTENSIONS_LABEL="پسوندهای قابل اسکن"
COM_ADMINTOOLS_JCONFIG_SCANEXTENSIONS_DESC="فهرست پسوند فایل‌هایی که باید اسکن شوند، با جداکننده ویرگول و بدون نقطه ابتدایی.<br/><br/>مقدار پیش‌فرض: php, phps, phtml, php3, inc<br/><br/>توجه داشته باشید که اسکنر تغییرات فایل‌های PHP فقط برای اسکن و ارزیابی امتیاز تهدید فایل‌های PHP طراحی شده است. اکیداً توصیه می‌کنیم پسوند فایل‌های مربوط به زبان‌های برنامه‌نویسی دیگر مانند JavaScript یا Perl و همچنین فایل‌های دودویی را به این فهرست اضافه نکنید. در غیر این صورت ممکن است با نتایج مثبت کاذب یا حتی منفی کاذب مواجه شوید."
COM_ADMINTOOLS_JCONFIG_DOUBLEEXTENSIONS_LABEL="اسکن فایل‌های دارای پسوند دوگانه"
COM_ADMINTOOLS_JCONFIG_DOUBLEEXTENSIONS_DESC="فایل‌هایی را اسکن می‌کند که پسوندهای موردنظر قبل از پسوند دیگری قرار گرفته باشند. برای مثال اگر <code>php</code> را در «پسوندهای قابل اسکن» اضافه کرده باشید، با فعال بودن این گزینه هر دو فایل <code>example.php</code> و <code>example.php.png</code> اسکن خواهند شد."
COM_ADMINTOOLS_JCONFIG_CASEINSENSITIVEEXTENSIONS_LABEL="عدم حساسیت به حروف بزرگ و کوچک در پسوندها"
COM_ADMINTOOLS_JCONFIG_CASEINSENSITIVEEXTENSIONS_DESC="تطبیق پسوند فایل‌ها را بدون توجه به حروف بزرگ و کوچک انجام می‌دهد. برای مثال اگر <code>php</code> را در «پسوندهای قابل اسکن» اضافه کرده باشید، هر دو فایل <code>example.php</code> و <code>example.PHP</code> اسکن خواهند شد."
COM_ADMINTOOLS_JCONFIG_LARGEFILETHRESHOLD_LABEL="آستانه فایل‌های بزرگ"
COM_ADMINTOOLS_JCONFIG_LARGEFILETHRESHOLD_DESC="اسکنر تغییرات فایل‌های PHP قبل از اسکن فایل‌هایی که از این مقدار (بر حسب بایت) بزرگ‌تر باشند، عمداً عملیات را متوقف کرده و در درخواست بعدی ادامه می‌دهد. این کار از بروز خطای پایان زمان اجرای PHP هنگام اسکن فایل‌های بزرگ در انتهای زمان پردازش جلوگیری می‌کند.<br/><br/>مقدار پیشنهادی: 524288"
COM_ADMINTOOLS_JCONFIG_SCANDIFF_LABEL="محاسبه تفاوت فایل‌ها هنگام اسکن"
COM_ADMINTOOLS_JCONFIG_SCANDIFF_DESC="در صورت فعال بودن، Admin Tools برای هر فایل تغییریافته، تفاوت فایل (Diff) را به‌صورت فشرده محاسبه و ذخیره می‌کند.<br/><br/><strong>هشدار:</strong> این قابلیت فضای بسیار زیادی از پایگاه داده مصرف می‌کند؛ برای یک سایت معمولی حدود ۲۰ تا ۴۰ مگابایت."
COM_ADMINTOOLS_JCONFIG_SCANIGNORENONTHREATS_LABEL="عدم گزارش فایل‌های با امتیاز تهدید صفر"
COM_ADMINTOOLS_JCONFIG_SCANIGNORENONTHREATS_DESC="در صورت فعال بودن، فایل‌های جدید یا تغییریافته‌ای که امتیاز تهدید آن‌ها صفر باشد گزارش نخواهند شد.<br/><br/>مقدار پیشنهادی: خیر<br/><br/><strong>هشدار:</strong> فعال کردن این گزینه توصیه نمی‌شود. ممکن است فایل‌های مخربی وجود داشته باشند که به دلیل نحوه نگارش کد مخربشان، توسط اسکنر خودکار از کدهای سالم قابل تشخیص نباشند و امتیاز تهدید صفر دریافت کنند. در این صورت این فایل‌ها گزارش نخواهند شد و ممکن است امنیت سایت شما به خطر بیفتد. این گزینه فقط برای اشکال‌زدایی الگوریتم محاسبه امتیاز تهدید در نظر گرفته شده است و نباید در سایت‌های عملیاتی (Production) فعال شود."
COM_ADMINTOOLS_JCONFIG_OVERSIZEFILETHRESHOLD_LABEL="آستانه فایل‌های بسیار بزرگ"
COM_ADMINTOOLS_JCONFIG_OVERSIZEFILETHRESHOLD_DESC="برای فایل‌هایی که از این مقدار (بر حسب بایت) بزرگ‌تر باشند، امتیاز تهدید محاسبه نخواهد شد.<br/><br/>مقدار پیشنهادی: 5242880<br/><br/>اگر این مقدار بیش از حد کم باشد، ممکن است فایل‌های اجرایی از نظر کد مخرب بررسی نشوند که یک خطر امنیتی محسوب می‌شود. اگر این مقدار بیش از حد زیاد باشد، احتمال بروز خطای پایان زمان اجرای PHP هنگام اسکن فایل‌های بسیار بزرگ (مانند فایل‌های گزارش با پسوند ‎.php‎) افزایش می‌یابد."
COM_ADMINTOOLS_JCONFIG_SCANEMAIL_DESC="نتایج اسکن به‌صورت خودکار به این نشانی ایمیل ارسال می‌شود. اگر این قسمت را خالی بگذارید، هیچ ایمیلی ارسال نخواهد شد."
COM_ADMINTOOLS_JCONFIG_SCANEMAIL_LABEL="ارسال نتایج به این ایمیل"
COM_ADMINTOOLS_JCONFIG_SCAN_CONDITIONAL_EMAIL_LABEL="ارسال ایمیل فقط در صورت وجود موارد نیازمند اقدام"
COM_ADMINTOOLS_JCONFIG_SCAN_CONDITIONAL_EMAIL_DESC="در صورت فعال بودن (پیش‌فرض)، اسکنر تغییرات فایل‌های PHP فقط زمانی خلاصه نتایج اسکن را از طریق ایمیل ارسال می‌کند که موارد نیازمند اقدام مانند فایل‌های جدید، تغییریافته یا مشکوک شناسایی شده باشند."

;; Email sending
COM_ADMINTOOLS_JCONFIG_EMAIL_LABEL="ارسال ایمیل"
COM_ADMINTOOLS_JCONFIG_EMAIL_DESC="تنظیمات مربوط به نحوه ارسال ایمیل برای درخواست‌های مسدودشده توسط Admin Tools. این گزینه‌ها فقط در نسخه Professional در دسترس هستند."
COM_ADMINTOOLS_JCONFIG_THROTTLE_LABEL="محدودسازی ارسال ایمیل درخواست‌های مسدودشده"
COM_ADMINTOOLS_JCONFIG_THROTTLE_DESC="در صورت فعال بودن، Admin Tools فقط تعداد مشخصی ایمیل را در یک بازه زمانی معین ارسال می‌کند. این قابلیت از پر شدن صندوق ایمیل هنگام حمله به سایت جلوگیری می‌کند. برای عملکرد صحیح، باید ثبت گزارش درخواست‌های مسدودشده برای <em>همه دلایل مسدودسازی</em> که قصد ارسال ایمیل برای آن‌ها را دارید فعال باشد. همچنین حداکثر تعداد گزارش‌های نگهداری‌شده در تنظیمات افزونه سیستم باید <em>برابر یا بیشتر</em> از حداکثر تعداد ایمیل تعیین‌شده در ادامه باشد؛ در غیر این صورت محدودسازی ارسال ایمیل اعمال نخواهد شد."
COM_ADMINTOOLS_JCONFIG_EMAIL_NUM_LABEL="حداکثر تعداد درخواست‌های مسدودشده برای ارسال ایمیل"
COM_ADMINTOOLS_JCONFIG_EMAIL_NUM_DESC="حداکثر تعداد درخواست‌های مسدودشده‌ای که در بازه زمانی تعیین‌شده در ادامه برای آن‌ها ایمیل ارسال می‌شود. توجه داشته باشید که در حملات سنگین، بسته به سرعت پاسخ‌گویی سرور وب، پایگاه داده و سرویس ایمیل، ممکن است تعداد بیشتری ایمیل ارسال شود. همچنین این محدودیت فقط برای درخواست‌هایی اعمال می‌شود که در پایگاه داده ثبت شده‌اند و دلیل مسدودسازی آن‌ها در فهرست دلایلی که نباید برایشان ایمیل ارسال شود قرار نداشته باشد."
COM_ADMINTOOLS_JCONFIG_EMAIL_NUMFREQ_LABEL="بازه زمانی محدودسازی ارسال ایمیل"
COM_ADMINTOOLS_JCONFIG_EMAIL_NUMFREQ_DESC="محدودسازی ارسال ایمیل بر اساس تعداد درخواست‌های مسدودشده ثبت‌شده در این بازه زمانی انجام می‌شود. واحد زمانی این بازه را در گزینه بعدی انتخاب کنید."
COM_ADMINTOOLS_JCONFIG_EMAIL_FREQ_LABEL="واحد زمانی"
COM_ADMINTOOLS_JCONFIG_EMAIL_FREQ_DESC="بازه زمانی بالا بر اساس واحد زمانی انتخاب‌شده در این قسمت محاسبه می‌شود. برای این محاسبات، هر دقیقه ۶۰ ثانیه، هر ساعت ۳۶۰۰ ثانیه و هر روز ۸۶۴۰۰ ثانیه در نظر گرفته می‌شود. این مقادیر ممکن است با زمان واقعی در سال‌های دارای ثانیه کبیسه یا هنگام تغییر بین ساعت تابستانی و استاندارد کاملاً یکسان نباشند."
COM_ADMINTOOLS_JCONFIG_EMAIL_FREQ_SECONDS="ثانیه"
COM_ADMINTOOLS_JCONFIG_EMAIL_FREQ_MINUTES="دقیقه"
COM_ADMINTOOLS_JCONFIG_EMAIL_FREQ_HOURS="ساعت"
COM_ADMINTOOLS_JCONFIG_EMAIL_FREQ_DAYS="روز"

;; Backend options
COM_ADMINTOOLS_JCONFIG_BACKEND_LABEL="بخش مدیریت"
COM_ADMINTOOLS_JCONFIG_BACKEND_DESC="تنظیماتی که نحوه عملکرد بخش مدیریت این کامپوننت را تعیین می‌کنند."
COM_ADMINTOOLS_JCONFIG_SHOWSTATS_LABEL="نمایش نمودارها و آمار"
COM_ADMINTOOLS_JCONFIG_SHOWSTATS_DESC="نمایش نمودارها و آمار مربوط به درخواست‌های مسدودشده (فقط در نسخه Professional)."
COM_ADMINTOOLS_JCONFIG_REORDERPLUGIN_LABEL="مرتب‌سازی خودکار افزونه"
COM_ADMINTOOLS_JCONFIG_REORDERPLUGIN_DESC="افزونه «System - Admin Tools» برای عملکرد صحیح باید اولین افزونه منتشرشده باشد. هنگام ورود به Admin Tools در بخش مدیریت، این افزونه به‌صورت خودکار به اولین جایگاه منتقل می‌شود. در برخی موارد نادر ممکن است لازم باشد افزونه‌های دیگری ابتدا اجرا شوند؛ برای مثال مدیریت‌کننده‌های ایمیل جایگزین مانند CMandrill. در این صورت این گزینه را روی «خیر» قرار دهید.<br/><br/><strong>هشدار بسیار مهم!</strong> در این حالت مسئولیت مرتب‌سازی افزونه‌ها کاملاً بر عهده شما خواهد بود. اگر افزونه‌ای آسیب‌پذیر قبل از «System - Admin Tools» منتشر شده باشد، سایت شما ممکن است هک شود. در چنین شرایطی Admin Tools قادر به محافظت از سایت نخواهد بود، زیرا قبل از اجرای کد آسیب‌پذیر اجرا نمی‌شود و امکان تشخیص حمله را ندارد. این گزینه را فقط در صورتی روی «خیر» قرار دهید که کاملاً با نحوه عملکرد آن آشنا باشید."
COM_ADMINTOOLS_JCONFIG_SERVERCONFIGWARN_LABEL="هشدار درباره ویرایش دستی فایل‌های پیکربندی سرور"
COM_ADMINTOOLS_JCONFIG_SERVERCONFIGWARN_DESC="در صورت ویرایش دستی فایل‌های پیکربندی سرور (مانند ‎.htaccess‎، ‎nginx.conf‎ یا ‎web.config‎) به‌جای استفاده از ابزارهای Htaccess Maker، NginX Maker یا WebConfig Maker، Admin Tools به شما هشدار خواهد داد."
COM_ADMINTOOLS_JCONFIG_USAGESTATS_LABEL="فعال‌سازی ارسال ناشناس نسخه‌های PHP، MySQL و Joomla!"
COM_ADMINTOOLS_JCONFIG_USAGESTATS_DESC="با ارسال ناشناس و خودکار نسخه‌های PHP، MySQL و Joomla! به ما کمک کنید تا نرم‌افزار را بهبود دهیم. این اطلاعات به ما کمک می‌کند درباره نسخه‌هایی که در آینده پشتیبانی خواهیم کرد تصمیم بگیریم. <strong>توجه:</strong> نام سایت، نشانی IP یا هیچ اطلاعات شناسایی‌کننده مستقیم یا غیرمستقیم دیگری جمع‌آوری نمی‌شود."
COM_ADMINTOOLS_JCONFIG_ACCURATE_PHP_CLI_LABEL="تشخیص دقیق مسیر PHP-CLI"
COM_ADMINTOOLS_JCONFIG_ACCURATE_PHP_CLI_DESCRIPTION="در صورت فعال بودن، Admin Tools تلاش می‌کند مسیر دقیق PHP-CLI را در سرور شناسایی کند. اگر سرور شما این کار را مجاز نمی‌داند و در نتیجه ممکن است نشانی IP شما برای چند دقیقه یا حتی چند ساعت مسدود شود (مانند برخی سرورهای IONOS)، این گزینه را غیرفعال کنید."
COM_ADMINTOOLS_JCONFIG_WORKAROUND_MAILTEMPLATE_LABEL="استفاده از راهکار جایگزین برای مشکل قالب‌های ایمیل در Joomla! 5.2 و بالاتر"
COM_ADMINTOOLS_JCONFIG_WORKAROUND_MAILTEMPLATE_DESC="در Joomla! 5.2 قابلیت Mail Template Layout معرفی و به‌صورت پیش‌فرض فعال شده است. اما این قابلیت باعث <em>خراب شدن</em> پیوندهایی می‌شود که آدرس آن‌ها از متغیرهایی مانند <code>{URL}</code> دریافت می‌شود؛ زیرا آدرس سایت را به ابتدای آن اضافه کرده و آن را نامعتبر می‌کند. این مشکل حتی در برخی بخش‌های خود جوملا نیز وجود دارد. اگرچه امکان اصلاح خود جوملا وجود ندارد، اما Admin Tools می‌تواند برای ایمیل‌های ارسالی خود از یک راهکار جایگزین استفاده کند. اگر به هر دلیلی مایل به استفاده از این راهکار نیستید، این گزینه را روی «خیر» قرار دهید."
COM_ADMINTOOLS_JCONFIG_OVERRIDE_SERVER_LABEL="وب‌سرور"
COM_ADMINTOOLS_JCONFIG_OVERRIDE_SERVER_DESCRIPTION="سایت شما از کدام وب‌سرور استفاده می‌کند؟ برای اکثر سایت‌ها گزینه «تشخیص خودکار» توصیه می‌شود. فقط زمانی نوع وب‌سرور را به‌صورت دستی انتخاب کنید که شرکت میزبان عمداً متغیر محیطی <code>SERVER_SOFTWARE</code> را از دسترس PHP خارج کرده یا مقدار نادرست یا خالی برای آن تنظیم کرده باشد."
