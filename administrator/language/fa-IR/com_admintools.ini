COM_ADMINTOOLS_CONTROLPANEL_RESCUEMODE_HEAD="حالت نجات (Rescue Mode)"
COM_ADMINTOOLS_CONTROLPANEL_RESCUEMODE_MESSAGE="Admin Tools در حالت نجات اجرا می‌شود. این حالت برای رفع مشکلات طراحی شده و به شما امکان می‌دهد اگر به‌طور تصادفی دسترسی خود به سایت را مسدود کرده‌اید، آن را بازیابی کنید. در این حالت، قابلیت‌های حفاظتی Admin Tools فقط برای دسترسی مدیریتی حساب کاربری شما و فقط از طریق مرورگر و آدرس IP فعلی شما به‌صورت موقت غیرفعال می‌شوند. تا زمانی که این پیام را مشاهده می‌کنید، Admin Tools همچنان از سایت شما محافظت می‌کند."
