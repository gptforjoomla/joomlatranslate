COM_ADMINTOOLS_WAFDENYLISTS_LBL_QUERY="پارامتر Query"
COM_ADMINTOOLS_WAFDENYLISTS_LBL_QUERY_DESC="پارامتر Query String که محتوای آن برای تطبیق این قانون بررسی می‌شود؛ مانند <code>id</code>. اگر این قسمت را خالی بگذارید، قانون بدون توجه به محتوای پارامترها اعمال خواهد شد. توجه داشته باشید که بررسی محتوای Query فقط <strong>پس از</strong> تبدیل URLهای SEF به قالب غیر SEF توسط جوملا انجام می‌شود. بنابراین ممکن است برخی پارامترها برای شما قابل مشاهده نباشند، اما همچنان توسط جوملا و Admin Tools پردازش شوند و باعث مسدود شدن درخواست گردند؛ مگر اینکه URLهای SEF را غیرفعال کنید."

