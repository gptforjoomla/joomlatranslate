PLG_TASK_AKEEBABACKUP_TASK_BACKUP_TITLE="Akeeba Backup - یک نسخه پشتیبان تهیه کنید"
PLG_TASK_AKEEBABACKUP_TASK_BACKUP_DESC="با Akeeba Backup از سایت خود نسخه پشتیبان تهیه کنید."

PLG_TASK_AKEEBABACKUP_TASK_CLIBACKUP_TITLE="Akeeba Backup – پشتیبان‌گیری فقط با CLI"
PLG_TASK_AKEEBABACKUP_TASK_CLIBACKUP_DESC="با Akeeba Backup از سایت خود نسخه پشتیبان تهیه کنید. این نوع وظیفه زمانی با <strong>only</strong> کار می کند که وظایف برنامه ریزی شده توسط یک کار CLI CRON راه اندازی شوند."

PLG_TASK_AKEEBABACKUP_TASK_FAILEDCHECK_TITLE="Akeeba Backup – وجود پشتیبان‌گیری ناموفق را بررسی کنید"
PLG_TASK_AKEEBABACKUP_TASK_FAILEDCHECK_DESC="تلاش‌های پشتیبان‌گیری ناموفق را بررسی کنید و به مدیران سایت اطلاع دهید."

PLG_TASK_AKEEBABACKUP_TASK_FAILEDUPLOADCHECK_TITLE="Akeeba Backup – آپلودهای ناموفق را بررسی کنید"
PLG_TASK_AKEEBABACKUP_TASK_FAILEDUPLOADCHECK_DESC="نسخه‌های پشتیبان را که در ذخیره‌سازی راه دور آپلود نشده‌اند بررسی کنید و به مدیران سایت اطلاع دهید."

PLG_TASK_AKEEBABACKUP_NOTE01_DESC="<strong><span aria-hidden=\\"_QQ_"true\\"_QQ_" class=\\"_QQ_"fa fa-exclamation-triangle\\"_QQ_"></span> مهم!</strong> لطفاً مستندات ما را بخوانید تا محدودیت‌ها و ملاحظات تهیه پشتیبان از سایت با استفاده از Scheduled Tasks در Joomla را بدانید."

PLG_TASK_AKEEBABACKUP_NOTE02_DESC="اگر از برنامه CLI Joomla برای راه اندازی وظایف برنامه ریزی شده استفاده می کنید، این نوع وظیفه پشتیبان، <strong>only</strong> را اجرا می کند. کارآمدتر و قابل اعتمادتر از نوع کار \\"_QQ_"Akeeba Backup - گرفتن پشتیبان\\"_QQ_" است، اما با استفاده از زمانبندی کار تنبل یا هنگام استفاده از URL Joomla برای راه اندازی وظایف برنامه ریزی شده اجرا نمی شود. اگر می خواهید از یکی از دو روش اخیر استفاده کنید، لطفاًً به جای آن از نوع کار \\"_QQ_"Akeeba Backup - Backup Take a Backup\\"_QQ_" استفاده کنید."

PLG_TASK_AKEEBABACKUP_PROFILE_LABEL="نمایه پشتیبان"
PLG_TASK_AKEEBABACKUP_PROFILE_DESC="انتخاب کنید از کدام نمایه پشتیبان برای پشتیبان‌گیری برنامه ریزی شده استفاده شود."
