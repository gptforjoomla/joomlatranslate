; Wizard redesign strings
OS_WIZARD_HERO_SUBTITLE="این ۶ مرحله سریع را تکمیل کنید تا سیستم رزرو شما آماده استفاده شود."
OS_WIZARD_NETWORK_ERROR="خطای شبکه. لطفاً اتصال اینترنت خود را بررسی کرده و دوباره تلاش کنید."

OS_WIZARD_STEP_WORKING_TIMES_ASIDE="ساعات کاری پیش‌فرض کسب‌وکار خود را تعیین کنید. این ساعات به‌صورت پیش‌فرض برای همه روزها اعمال می‌شوند."
OS_WIZARD_TIP_WORKING_1="بعداً می‌توانید برای تاریخ‌های خاص، ساعات کاری متفاوتی را از بخش «ساعات کاری سفارشی» تعریف کنید."
OS_WIZARD_TIP_WORKING_2="اگر کسب‌وکار شما در یک روز تعطیل است، آن روز را به‌عنوان تعطیل علامت‌گذاری کنید."

OS_WIZARD_STEP_PAYMENT_ASIDE="مشخص کنید که آیا مشتریان هنگام رزرو باید پرداخت انجام دهند و چه مقدار بیعانه لازم است."
OS_WIZARD_TIP_PAYMENT_1="هر زمان که بخواهید می‌توانید تنظیمات پرداخت را از بخش پیکربندی تغییر دهید."
OS_WIZARD_TIP_PAYMENT_2="بیعانه می‌تواند مبلغی ثابت یا درصدی از کل هزینه باشد."

OS_WIZARD_STEP_TIMESLOTS_ASIDE="مشخص کنید سیستم چگونه بازه‌های زمانی قابل رزرو را برای مشتریان ایجاد کند."
OS_WIZARD_TIP_TIMESLOT_1="در حالت عادی، بازه‌های زمانی به‌صورت خودکار بر اساس مدت خدمت و ساعات کاری ایجاد می‌شوند."
OS_WIZARD_TIP_TIMESLOT_2="اگر زمان‌های ثابتی مانند ۹:۰۰، ۱۱:۰۰ یا ۱۴:۰۰ دارید، از حالت «بازه‌های زمانی سفارشی» استفاده کنید."

OS_WIZARD_STEP_RESOURCES_ASIDE="کارکنان یا منابعی را که خدمات شما را ارائه می‌دهند اضافه کنید."
OS_WIZARD_TIP_RESOURCES_1="منابع به خدمات اختصاص داده می‌شوند و مشتریان هنگام رزرو می‌توانند منبع موردنظر خود را انتخاب کنند."
OS_WIZARD_TIP_RESOURCES_2="اگر گزینه «خیر» را انتخاب کنید، سیستم به‌طور خودکار یک منبع پیش‌فرض ایجاد خواهد کرد."

OS_WIZARD_STEP_VENUES_ASIDE="محل‌ها یا اتاق‌هایی را که خدمات شما در آن‌ها ارائه می‌شود اضافه کنید."
OS_WIZARD_TIP_VENUES_1="با تعریف محل ارائه خدمت، مشتریان می‌توانند هنگام رزرو مکان موردنظر خود را انتخاب کنند."
OS_WIZARD_TIP_VENUES_2="اگر خدمات شما مکان مشخصی ندارد یا به‌صورت آنلاین ارائه می‌شود، گزینه «خیر» را انتخاب کنید."

OS_WIZARD_STEP_SUMMARY_ASIDE="پیش از پایان، تنظیمات خود را بررسی کنید. در صورت نیاز، همیشه می‌توانید به مراحل قبل بازگردید و آن‌ها را تغییر دهید."
OS_WIZARD_TIP_SUMMARY_1="تمام این تنظیمات بعداً نیز از طریق پنل مدیریت قابل ویرایش هستند."
OS_WIZARD_TIP_SUMMARY_2="پس از پایان، به داشبورد منتقل می‌شوید تا اولین خدمت خود را ایجاد کنید."

