COM_AKEEBABACKUP_CONFIG_ANGIE_KEY_DESCRIPTION="می توانید به صورت اختیاری از اسکریپت بازیابی Akeeba Backup با رمز عبور محافظت کنید و از دسترسی غیرمجاز به نصب کننده جلوگیری کنید. هنگامی که نصب کننده را اجرا می کنید از شما خواسته می شود که این رمز عبور را وارد کنید. لطفاًً توجه داشته باشید که رمز عبور به حروف بزرگ و کوچک حساس است، یعنی ABC، abc و Abc سه رمز عبور متفاوت هستند."
