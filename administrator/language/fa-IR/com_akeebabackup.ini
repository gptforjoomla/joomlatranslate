COM_AKEEBABACKUP_CONFIG_MYSQLNOBTREE_TITLE="موتور شاخص را پرش کنید"
COM_AKEEBABACKUP_CONFIG_NODEPENDENCIES_DESCRIPTION="وقتی فعال باشد، Akeeba Backup وابستگی‌های بین جداول و نماها را ردیابی نمی‌کند. از این تنها زمانی استفاده کنید که صدها جدول پایگاه داده دارید و از نماهای MySQL، عملکردها، روش ها، TRIGGER ها یا جداول با استفاده از موتورهای موقت، حافظه، ادغام یا FEDERATED (بسیار به ندرت استفاده می شود) استفاده نمی کنید."
