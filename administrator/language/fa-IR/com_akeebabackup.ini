COM_AKEEBABACKUP_CONFIG_AUTORESUME_DESCRIPTION="وقتی تیک این گزینه را بردارید Akeeba Backup وقتی سرور با خطا پاسخ می‌دهد، پشتیبان‌گیری را متوقف می‌کند. هنگامی که این گزینه فعال است، Akeeba Backup سعی می کند با تکرار آخرین مرحله، پشتیبان‌گیری را از سر بگیرد. این فقط برای پشتیبان‌گیری‌های بک‌اند اعمال می‌شود. همچنین به شما اجازه نمی‌دهد همه پشتیبان‌گیری‌ها را با موفقیت از سر بگیرید که منجر به خطا می‌شود: فقط تلاش‌های پشتیبان‌گیری که به‌طور موقت توسط محدودیت‌های استفاده از CPU سرور مسدود شده‌اند یا مشکلات قطع شبکه می‌توانند از سر گرفته شوند."
