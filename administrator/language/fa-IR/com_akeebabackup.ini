COM_AKEEBABACKUP_CONFIG_PERMISSIONS_0666="0666 - امنیت ضعیف، حداکثر سازگاری با میزبان های تجاری"
COM_AKEEBABACKUP_CONFIG_PERMISSIONS_DESCRIPTION="مجوزهای فایل را برای فایل‌های آرشیو پشتیبان تنظیم کنید. فقط روی لینوکس، macOS، BSD و سایر میزبان‌های سبک یونیکس (نه ویندوز) اعمال می‌شود. اگر مطمئن نیستید 0666 را ترک کنید. تغییر آن ممکن است بارگیری و/یا حذف فایل‌های آرشیو پشتیبان را از طریق FTP و SFTP غیرممکن کند. اگر سرور شما از PHP-FPM استفاده می کند یا در غیر این صورت PHP را تحت همان کاربری که حساب سیستم سایت شما اجرا می کند، از 0600 برای بهترین امنیت استفاده کنید."
