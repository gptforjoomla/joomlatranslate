COM_AKEEBABACKUP_CONFIG_OAUTH2_HEADER_DESC="فقط برای نسخه حرفه‌ای. به شما امکان می دهد به جای استفاده از نشانی اینترنتی کمکی OAuth2 سفارشی داشته باشید که توسط Akeeba Ltd ارائه شده است. لطفاًً مستندات را بخوانید."

