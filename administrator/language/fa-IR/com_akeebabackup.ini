COM_AKEEBABACKUP_TRANSFER_DESC="بایگانی را با اجرای موتور پس پردازش \\"_QQ_"%s\\"_QQ_" در برابر بایگانی منتقل می کند."
COM_AKEEBABACKUP_TRANSFER_ERR_CANNOTACCESSTESTFILE="Akeeba Backup نمی تواند تأیید کند که اطلاعات اتصالی که وارد کرده اید با URL سایتی که وارد کرده اید مطابقت دارد. اگر می‌خواهید داخل یک زیرشاخه یک سایت موجود را بازیابی کنید، به این معنی است که سایت اصلی دسترسی به زیر شاخه را مسدود می‌کند. لطفاً با مدیر سایت خود تماس بگیرید در هر مورد دیگر شما اطلاعات اتصال را اشتباه وارد کرده اید، به احتمال زیاد پوشه اشتباهی است. لطفاًً با میزبان خود تماس بگیرید و از آنها اطلاعات اتصال صحیح را بخواهید، <em>از جمله پوشه</em>، که با URL شما که در این ویزارد وارد کرده اید مطابقت دارد. سپس به اینجا برگردید، اطلاعات صحیح را وارد کنید و به بازیابی ادامه دهید."
COM_AKEEBABACKUP_TRANSFER_ERR_CANNOTREADLOCALFILE="Akeeba Backup نمی تواند از فایل پشتیبان محلی <code>%s</code> بخواند. این جادوگر شکست خورده است. لطفاً یک نسخه پشتیبان جدید بگیرید و دوباره امتحان کنید. توجه داشته باشید که فایل ها در سرور جدید شما باقی مانده اند. ممکن است بخواهید آنها را به صورت دستی حذف کنید."
COM_AKEEBABACKUP_TRANSFER_ERR_CANNOTRUNKICKSTART="Akeeba Backup نمی تواند Akeeba Kickstart را در سایت جدید شما اجرا کند. اگر می‌خواهید داخل یک زیرشاخه یک سایت موجود را بازیابی کنید، به این معنی است که سایت اصلی دسترسی به زیر شاخه را مسدود می‌کند. لطفاً با مدیر سایت خود تماس بگیرید در هر صورت دیگر باید با میزبان خود تماس بگیرید و بررسی کنید که نسخه پیش فرض PHP شما با حداقل الزامات Kickstart مطابقت دارد."
COM_AKEEBABACKUP_TRANSFER_ERR_CANNOTUPLOADARCHIVE="Akeeba Backup نمی تواند فایل پشتیبان <code>%s</code> را آپلود کند. این امکان وجود دارد که فضای دیسک سرور سایت جدید شما تمام شده باشد یا محافظت از سرور انتقال داده ها را مسدود کرده باشد. لطفاًً با انتخاب گزینه انتقال دستی، سایت خود را انتقال دهید. توجه داشته باشید که فایل ها در سرور جدید شما باقی مانده اند. ممکن است بخواهید آنها را به صورت دستی حذف کنید."
COM_AKEEBABACKUP_TRANSFER_ERR_CANNOTUPLOADKICKSTART="Akeeba Backup نمی تواند Akeeba Kickstart را در ریشه سایت جدید شما آپلود کند. لطفاًً بررسی کنید که اطلاعات اتصال صحیح را وارد کرده‌اید و اینکه کاربر FTP/SFTP می‌تواند فایل‌ها را در فهرستی که انتخاب کرده‌اید بنویسد. اگر قبلاً kickstart.php و kickstart.transfer.php را در سایت راه دور دارید، لطفاًً قبل از تلاش مجدد برای انتقال سایت خود، آنها را حذف کنید."
COM_AKEEBABACKUP_TRANSFER_ERR_CANNOTUPLOADTEMP="Akeeba Backup نمی تواند تکه ای از آرشیو پشتیبان شما را از فایل محلی <code>%s</code> در فایل راه دور <code>%s</code> آپلود کند. لطفاًً بررسی کنید که سرور راه دور شما اجازه آپلود فایل‌ها را می‌دهد و فضای دیسک کافی برای فایل(های) آرشیو پشتیبان شما وجود دارد."
COM_AKEEBABACKUP_TRANSFER_ERR_CANNOTUPLOADTESTFILE="Akeeba Backup نمی تواند یک فایل آزمایشی به نام <code>%s</code> را در ریشه سایت جدید شما آپلود کند. لطفاًً بررسی کنید که اطلاعات اتصال صحیح را وارد کرده‌اید و اینکه کاربر FTP/SFTP می‌تواند فایل‌ها را در فهرستی که انتخاب کرده‌اید بنویسد."
COM_AKEEBABACKUP_TRANSFER_ERR_CANNOTWRITEREMOTEFILES="متأسفانه، Akeeba Backup تشخیص داده است که نمی تواند مستقیماً روی فایل‌های سرور راه دور شما بنویسد. این جادوگر نمی تواند ادامه دهد. باید از روش انتقال \\"_QQ_"دستی\\"_QQ_" استفاده کنید."
COM_AKEEBABACKUP_TRANSFER_ERR_CANTCREATETEMPCHUNK="نمی توان یک فایل موقت در این سرور ایجاد کرد. لطفاًً بررسی کنید که پوشه موقت شما توسط کاربری که سرور وب در حال حاضر تحت آن اجرا می شود به درستی تنظیم شده و قابل نوشتن باشد."
COM_AKEEBABACKUP_TRANSFER_ERR_COMPLETEBACKUP="چنین بک آپی یافت نشد. روی دکمه Backup Now کلیک کنید تا اکنون یک نسخه پشتیبان جدید تهیه کنید."
COM_AKEEBABACKUP_TRANSFER_ERR_COMPLETEBACKUP_SPECIFIC="نسخه پشتیبان #%d قابل انتقال نیست. این یک نسخه پشتیبان کامل و کامل از سایت نیست یا فایل‌های آرشیو آن دیگر در این سرور وجود ندارد."
COM_AKEEBABACKUP_TRANSFER_ERR_DNS="نام دامنه نشانی اینترنتی که وارد کرده‌اید (%s) را نمی‌توان از سروری که Akeeba Backup روی آن اجرا می‌کند، حل کرد. اگر اخیراً نام دامنه را ثبت یا انتقال داده اید، لطفاًً زمان بیشتری را تا به روز رسانی سرورهای DNS (معمولاً 6 تا 48 ساعت) در نظر بگیرید. در غیر این صورت لطفاً تنظیمات DNS نام دامنه خود را بررسی کنید."
COM_AKEEBABACKUP_TRANSFER_ERR_ERRORFROMREMOTE="Akeeba Backup هنگام تلاش برای آپلود آرشیو پشتیبان، خطایی از سرور راه دور دریافت کرده است. خطا این بود: %s"
COM_AKEEBABACKUP_TRANSFER_ERR_EXISTINGSITE="سایت دیگری از قبل در آن مکان وجود دارد. لطفاًً قبل از انتقال یک سایت جدید به آنجا، سایت موجود را حذف کنید. تلاش برای بازنویسی یک سایت موجود به احتمال زیاد منجر به خرابی سایت می شود که نمی توانید آن را تعمیر کنید."
COM_AKEEBABACKUP_TRANSFER_ERR_HTACCESS="یک فایل <code>%s</code> در ریشه سایت جدید شما پیدا شد. این فایل می تواند در روند انتقال سایت اختلال ایجاد کند. لطفاًً قبل از ادامه انتقال سایت آن را حذف کنید. لطفاًً توجه داشته باشید که فایل ممکن است <em>hidden</em> باشد. اگر این فایل را در مرورگر فایل کنترل پنل میزبانی خود یا نرم افزار سرویس گیرنده FTP نمی بینید، لطفاًً از میزبان خود برای اطلاعات بیشتر در مورد حذف این فایل بخواهید."
COM_AKEEBABACKUP_TRANSFER_ERR_INVALIDID="خطای داخلی: شناسه پشتیبان برای آپلود نامعتبر است یا وجود ندارد."
