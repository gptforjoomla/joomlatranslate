COM_AKEEBABACKUP_CPANEL_MSG_JOOMLABUGGYUPDATES="<strong>مهم:</strong> اگر Joomla قبل از وارد کردن Download ID شما، به‌روزرسانی‌هایی برای Akeeba Backup پیدا کرده باشد، به دلیل چند اشکال قدیمی در Joomla ممکن است حتی بعد از وارد کردن Download ID هم <em>نتواند آن‌ها را دانلود کند</em>. در این حالت، لطفاً فایل ZIP آخرین نسخه را از سایت ما دانلود کنید. سپس در Joomla به منوی System بروید، بخش Install را پیدا کنید، روی Extensions کلیک کنید، به زبانه Upload Package File بروید و فایل ZIP دانلودشده را <strong>دو بار</strong> پشت سر هم نصب کنید، <strong>بدون</strong> اینکه قبل از آن یا بین دو نصب Akeeba Backup را حذف کنید. نصب دوباره برای رفع یک اشکال قدیمی دیگر در Joomla لازم است که گاهی هنگام نصب به‌روزرسانی افزونه، مانع کپی شدن همه فایل‌های به‌روزشده می‌شود."
