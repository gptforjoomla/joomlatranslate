COM_AKEEBABACKUP_CONFIG_ADVANCED_SBBLF_DESC="Akeeba Backup قبل از بایگانی کردن یک فایل بزرگ، مرحله پردازش را می شکند. وقتی این گزینه را فعال کنید، Akeeba Backup سریعتر کار می کند. با این حال، این ممکن است منجر به مهلت زمانی یا خطاهای سرور داخلی شود."
