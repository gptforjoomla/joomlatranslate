COM_AKEEBABACKUP_TRANSFER_ERR_OVERRIDE="خطاهای شناسایی شده را نادیده بگیرید و به هر حال سایت را منتقل کنید"
COM_AKEEBABACKUP_TRANSFER_ERR_SAMESITE="شما اطلاعات اتصال به سایتی را که از آن منتقل می کنید وارد کرده اید. <strong>اشتباه شما سایت شما را حذف می کرد</strong>. شما باید اطلاعات اتصال FTP/SFTP را به سایتی که در حال انتقال <strong>to</strong> (سایت جدید یا سرور جدید) هستید، وارد کنید. لطفاًً اطلاعات بالا را اصلاح کنید و دوباره امتحان کنید."
COM_AKEEBABACKUP_TRANSFER_ERR_SPACE="شما فقط <span></span> فضای خالی دارید. برای انتقال سایت خود به فضای خالی بیشتری نیاز دارید. لطفاً با میزبان خود تماس بگیرید."
COM_AKEEBABACKUP_TRANSFER_ERR_WRONGSSL="سایت شما دارای گواهینامه SSL نامعتبر یا با امضای خود است. به دلایل امنیتی، انتقال سایت نمی تواند ادامه یابد. لطفاًً روی Reset کلیک کنید تا انتقال سایت دوباره راه اندازی شود و از یک URL بدون <code>https://</code> استفاده کنید. این زمانی ضروری است که می خواهید سایت خود را قبل از انتقال نام دامنه خود به هاست جدید انتقال دهید. همچنین، لطفاًً برای دریافت گواهینامه SSL معتبر با میزبان خود تماس بگیرید. حتی رایگان صادر شده از طریق مجوز بدون هزینه Let's Encrypt مرجع صدور گواهینامه انجام خواهد داد."
COM_AKEEBABACKUP_TRANSFER_FORCE_BODY="شما در حال اجرای Site Transfer Wizard در حالت اجباری هستید. این به این معنی است که برخی از بررسی های سلامتی که معمولاً قبل از انتقال سایت انجام می شوند، اجرا نمی شوند. در نتیجه انتقال ممکن است یک سایت موجود را بازنویسی کند، در نهایت به URL متفاوتی نسبت به URL مورد نظر شما برسد یا به سادگی با شکست مواجه شود. <strong>این یک ویژگی کاربر قدرتمند است. لطفاًً اگر با آن احساس راحتی نمی کنید ادامه ندهید.</strong>"
