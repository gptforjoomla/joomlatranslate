COM_AKEEBABACKUP_CONFIG_LOGFILES_DESCRIPTION="به طور خودکار فایل‌های گزارش سوابق پشتیبان‌گیری موفق را حذف کنید. فایل لاگ آخرین رکورد پشتیبان در محاسبات شرکت می کند اما هرگز حذف نمی شود. اگر نمایه پشتیبان شما دارای موتور پردازش پس از پردازش غیر از None یا Send By Email است، فقط رکوردهایی با وضعیت Remote Backup در این تنظیمات سهمیه فایل‌های گزارش شرکت کنید. اگر نمایه پشتیبان شما دارای موتور پردازش پس از پردازش هیچ است یا فقط رکوردهای Send By Email با وضعیت OK یا Remote backup در این تنظیمات سهمیه فایل‌های گزارش شرکت کنید. این ویژگی پس از سهمیه رکوردهای منسوخ اجرا می شود. سهمیه سوابق منسوخ ممکن است فایل‌های گزارش قدیمی را نیز حذف کند."
