COM_AKEEBABACKUP_CONFIG_ADVANCED_SETMEMLIMIT_DESC="به Akeeba Backup می‌گوید سعی کند محدودیت حافظه PHP را به مقدار بسیار زیاد (16 گیگابایت) افزایش دهد. این به شما امکان می‌دهد فایل‌های بزرگ‌تر را فشرده کنید و بایگانی‌های پشتیبان بزرگ‌تر را با استفاده از گزینه‌های ذخیره‌سازی از راه دور پر حافظه مانند WebDAV آپلود کنید. توجه: این فقط محدودیت حداکثر مصرف حافظه را تعیین می کند. در بیشتر موارد، موتور پشتیبان Akeeba Backup حافظه <em> بسیار کمتر از آن </em> مصرف می کند، معمولاً در منطقه کم 20 مگابایت. فشرده‌سازی و آپلود فایل‌های بزرگ‌تر نیز نیازمند تغییر گزینه‌های دیگر در صفحه پیکربندی نمایه پشتیبان است."
