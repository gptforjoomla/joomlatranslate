COM_AKEEBABACKUP_CPANEL_LBL_OUTDIR_DELETEORBEHACKED="تا زمانی که این کار را انجام نداده‌اید، <strong>بسیار قویاً توصیه می‌کنیم</strong> از سایت خود پشتیبان نگیرید و اگر قبلاً پشتیبان گرفته‌اید، همه فایل‌های پشتیبان و فایل‌های لاگ پشتیبان‌گیری را حذف کنید. <strong>رعایت نکردن این دستورالعمل‌ها به احتمال زیاد باعث نفوذ به سایت شما (هک شدن) و غیرقابل استفاده شدن پشتیبان‌ها خواهد شد.</strong>"
COM_AKEEBABACKUP_CPANEL_LBL_OUTDIR_FILEREADABLE="Akeeba Backup تشخیص داد که پوشه خروجی پشتیبان <code>%s</code> زیر ریشه وب سایت شما قرار دارد. محتویات آن، از جمله آرشیوهای پشتیبان شما، از طریق وب قابل دسترسی هستند. با این حال، فهرست کردن فایل‌ها در فهرست با مرورگر وب امکان‌پذیر نیست. <strong> این می تواند یک مشکل امنیتی باشد</strong>. یک مهاجم می تواند نام آرشیو پشتیبان را حدس بزند و مستقیماً آن را دانلود کند و امنیت سایت شما را دور بزند."
COM_AKEEBABACKUP_CPANEL_LBL_OUTDIR_FIX_RANDOM="\\"_QQ_"نام فایل خروجی پشتیبان\\"_QQ_" شما اصلاح می شود تا متغیر <code>[RANDOM]</code> را در آن گنجانده شود. این امر با افزودن 16 حرف و / یا اعداد مختلف تصادفی در نام فایل بایگانی پشتیبان هر بار که یک نسخه پشتیبان تهیه می کنید، حدس زدن نام فایل‌های پشتیبان را عملا غیرممکن می کند."
COM_AKEEBABACKUP_CPANEL_LBL_OUTDIR_FIX_SECURITYFILES="یک فایل <code>.htaccess</code> و یک فایل <code>web.config</code> در آن پوشه نوشته می شود. در اکثر سرورها این برای جلوگیری از دانلود مستقیم وب هر فایل داخل آن کافی است و فهرست فایل‌های آن را غیرفعال می کند. همچنین برای سرورهایی که این فایل‌های خاص تاثیری ندارند راه‌حلی داریم. سه فایل دیگر به نام های <code>index.php</code>، <code>index.html</code> و <code>index.htm</code> نیز در آن پوشه نوشته می شود. این فایل‌های فهرستی از فهرست کردن نام بایگانی های پشتیبان و فایل‌های گزارش پشتیبان توسط وب سرور جلوگیری می کند."
COM_AKEEBABACKUP_CPANEL_LBL_OUTDIR_ISSYSTEM="علاوه بر این، پوشه خروجی شما همان یا زیر شاخه ای از یک پوشه است که توسط Joomla و پسوندهای آن برای فایل‌های خود و در دسترس عموم استفاده می شود."
COM_AKEEBABACKUP_CPANEL_LBL_OUTDIR_ISSYSTEM_FIX="شما باید به صفحه پیکربندی Akeeba Backup بروید و پوشه خروجی دیگری را انتخاب کنید."
COM_AKEEBABACKUP_CPANEL_LBL_OUTDIR_LISTABLE="Akeeba Backup تشخیص داد که پوشه خروجی پشتیبان <code>%s</code> زیر ریشه وب سایت شما قرار دارد. محتویات آن، از جمله آرشیوهای پشتیبان شما، از طریق وب قابل دسترسی هستند. علاوه بر این، فهرست کردن فایل‌ها در پوشه امکان‌پذیر است، یعنی زمانی که با مرورگر وب به آرشیوهای پشتیبان شما دسترسی پیدا می‌کنید، فهرستی از آرشیوهای پشتیبان ارائه می‌شود. <strong>این یک مشکل امنیتی بزرگ است</strong>. مهاجم می تواند از طریق مرورگر وب به این پوشه دسترسی پیدا کند و بایگانی پشتیبان شما را مستقیماً دانلود کند و امنیت سایت شما را دور بزند."
COM_AKEEBABACKUP_CPANEL_LBL_OUTDIR_TRASHHOST="متأسفانه سرور شما از هیچ روش معقولی برای ایمن سازی پوشه پشتیبانی نمی کند. مهم نیست که ما چه کاری انجام می‌دهیم، همیشه نام فایل‌های موجود را فهرست می‌کند و به شما امکان می‌دهد آنها را از مرورگر دانلود کنید. تنها گزینه شما این است که یک پوشه خروجی پشتیبان در بالای ریشه سایت خود ایجاد کنید."
