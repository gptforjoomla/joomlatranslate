COM_AKEEBABACKUP_CONFIG_OPTIONALFILTERS_FINDER_ENABLED_DESCRIPTION="محتوای غیر مهم جستجوی هوشمند را از نسخه پشتیبان حذف کنید. اکیداً به شما توصیه می شود که به دلایل عملکردی این کار را انجام دهید. پس از بازیابی سایت خود، لطفاًً به قسمت Components، Smart Search بروید و روی دکمه Index کلیک کنید تا این داده ها بازسازی شوند."
