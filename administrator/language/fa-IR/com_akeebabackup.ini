COM_AKEEBABACKUP_CONFIG_UPLOADKICKSTART_DESCRIPTION="هنگامی که علامت بزنید، یک کپی از Akeeba Kickstart Professional در حافظه راه دور مشخص شده در موتور پس از پردازش بالا (به جز موتورهای None و ایمیل) آپلود می شود. هنگامی که از FTP یا SFTP برای انتقال سایت خود به سرور دیگری استفاده می کنید، این منطقی است: هم آرشیو پشتیبان شما و هم Kickstart که برای استخراج آن استفاده می شود، در سرور راه دور شما آپلود می شوند. پس از تکمیل نسخه پشتیبان، فقط می توانید Kickstart را در سایت راه دور راه اندازی کنید و به بازیابی آن ادامه دهید. خیلی ساده!"
