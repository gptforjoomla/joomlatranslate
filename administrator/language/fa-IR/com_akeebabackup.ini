COM_AKEEBABACKUP_CONFIG_POSTPROCSFTP_HOST_DESCRIPTION="نام میزبان سرور SFTP، بدون پروتکل. این بدان معنی است که <code>sftp://example.com</code> یا <code>ssh://example.com</code> <strong>invalid</strong> است و نباید استفاده شود، اما <code>example.com</code> معتبر است و باید استفاده شود. این موتور فقط از سرورهای SFTP (SSH) پشتیبانی می کند. <u></u> از FTP، FTPS یا هر گونه FTP دیگری پشتیبانی نمی کند. برای نصب و فعال کردن پسوند PHP SSH2 نیاز است."
