COM_AKEEBABACKUP_CONFIG_OUTDIR_DESCRIPTION="این پوشه‌ای روی سرور شماست که Akeeba Backup فایل‌های پشتیبان و فایل لاگ پشتیبان‌گیری را در آن ذخیره می‌کند. می‌توانید از ماکروهای زیر استفاده کنید:<ul><li><strong>[DEFAULT_OUTPUT]</strong> پوشه خروجی پیش‌فرض</li><li><strong>[SITEROOT]</strong> پوشه ریشه سایت شما</li><li><strong>[ROOTPARENT]</strong> یک پوشه بالاتر از ریشه سایت شما</li></ul>"
