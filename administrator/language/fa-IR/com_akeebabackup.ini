COM_AKEEBABACKUP_BUADMIN_LOG_DOWNLOAD_CONFIRM="دانلود فایل‌های پشتیبان از طریق مرورگر ممکن است\nبا خطا، خرابی فایل یا ناقص دانلود شدن روبه‌رو شود،\nبه دلایلی که خارج از کنترل ما هستند\nمانند تنظیمات سرور، تنظیمات سایت،\nافزونه‌های دیگر و تنظیمات مرورگر.\n\nما بسیار قویاً توصیه می‌کنیم که فایل‌های پشتیبان را\nفقط از طریق FTP در حالت انتقال Binary دانلود کنید\nاز Auto یا ASCII استفاده نکنید، چون فایل‌های پشتیبان را خراب می‌کند\nو از نرم‌افزارهایی مانند FileZilla،\nCyberDuck، WinSCP یا مشابه آن‌ها استفاده کنید؛ یا از\nقابلیت File Manager در پنل هاست خود کمک بگیرید.\n\nاگر این دانلود را ادامه دهید، صراحتاً می‌پذیرید\nکه برای هر مشکل مربوط به دانلود، استخراج یا بازیابی فایل پشتیبان\nحق دریافت پشتیبانی را کنار می‌گذارید و می‌دانید\nکه به چنین درخواست‌هایی پاسخ داده نخواهد شد.\nآیا مطمئن هستید که می‌خواهید ادامه دهید؟"
