COM_AKEEBABACKUP_BACKUP_ANGIE_PASSWORD_WARNING_1="اسکریپت بازیابی Akeeba Backup تنها در صورتی قابل دسترسی خواهد بود که رمز عبوری را که در صفحه قبل تنظیم کرده اید، قبل از کلیک بر روی دکمه Backup Now ارائه دهید. اگر به خاطر ندارید رمز عبور تنظیم کرده اید، مرورگر شما رمز عبور را در صفحه پیکربندی <strong> بدون اینکه از شما بپرسد </strong> به صورت خودکار تکمیل کرده است. این کار توسط بسیاری از مدیران رمز عبور و مرورگرها انجام می شود."
