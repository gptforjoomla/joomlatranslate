COM_AKEEBABACKUP_CONFIG_OPTIONALFILTERS_HOSTSTATS_ENABLED_DESCRIPTION="هنگامی که فعال باشد، Akeeba Backup به طور خودکار رایج ترین پوشه های اختصاصی میزبان را برای ذخیره آمار دسترسی برای سایت شما حذف می کند. این پوشه‌ها توسط کاربر وب‌سایت شما فقط خواندنی هستند و در صورت پشتیبان‌گیری، مشکلاتی در بازیابی ایجاد می‌کنند."
COM_AKEEBABACKUP_CONFIG_OPTIONALFILTERS_INSTALLEDTABLES_ENABLED_TITLE="فقط از جداول نصب شده توسط Joomla! و برنامه های افزودنی آن نسخه پشتیبان تهیه کنید"
COM_AKEEBABACKUP_CONFIG_OPTIONALFILTERS_INSTALLEDTABLES_ENABLED_DESCRIPTION="با فعال کردن این فیلتر، از پشتیبان‌گیری از هر جدولی در پایگاه داده که توسط خود Joomla! یا یکی از برنامه‌های افزودنی آن نصب نشده است، صرفنظر می‌شود. اطلاعات جداول نصب شده توسط فایل‌های SQL همراه با Joomla! و پسوندهای آن ارائه می شود. این فیلتر زمانی مفید است که تعداد زیادی ناخواسته/کپی شده روی جداول دارید (به <code>#__users_oldcopy_20250910</code> فکر کنید و نمی‌خواهید یا نمی‌دانید چگونه آن‌ها را یکی یکی حذف کنید. همیشه هنگام استفاده از این فیلتر جداول که می‌خواستید هیچ گونه تصادفی در پیکربندی خود استفاده نکنید، نسخه پشتیبان را در یک سرور توسعه/استیجینگ بازیابی کنید."
COM_AKEEBABACKUP_CONFIG_OPTIONALFILTERS_INSTALLEDTABLES_ONLYJOOMLA_TITLE="فیلتر کردن را به جداول با پیشوند Joomla محدود کنید"
COM_AKEEBABACKUP_CONFIG_OPTIONALFILTERS_INSTALLEDTABLES_ONLYJOOMLA_DESCRIPTION="فعال کردن این گزینه فیلتر «فقط پشتیبان‌گیری از جداول نصب شده توسط Joomla! و پسوندهای آن» را به جداولی محدود می‌کند که نام آنها با پیشوند نام جدول پایگاه داده Joomla! شروع می‌شود. اگر اسکریپت های شخص ثالثی دارید که خارج از Joomla اجرا می شوند و جداول خود را بدون پیشوند جدول یا با پیشوند جدول دیگری نصب می کنند و می خواهید آنها را در نسخه پشتیبان خود قرار دهید، مفید است."
COM_AKEEBABACKUP_CONFIG_OPTIONALFILTERS_INSTALLEDTABLES_EXTRA_TITLE="این جداول را به صراحت مجاز کنید"
COM_AKEEBABACKUP_CONFIG_OPTIONALFILTERS_INSTALLEDTABLES_EXTRA_DESCRIPTION="فهرستی از جداول پایگاه داده جدا شده با کاما را وارد کنید تا در پشتیبان قرار دهید، حتی اگر در غیر این صورت توسط «فقط جداول پشتیبان‌گیری نصب شده توسط Joomla! و فیلتر برنامه‌های افزودنی آن حذف می‌شوند. این برای گنجاندن جداول برنامه‌های افزودنی که جداول خود را با استفاده از روشی غیر از پایگاه داده داخلی Joomla نصب می‌کنند، مفید است. نکته‌ای که می‌خواهید یک جدول پشتیبان را در مدیریت طرحواره i مشاهده کنید. صفحه جداول پایگاه داده، آن را به این لیست اضافه کنید."
