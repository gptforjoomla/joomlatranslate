COM_AKEEBABACKUP_CONFIG_DESKTOP_NOTIFICATIONS_DESC="آیا باید از شما خواسته شود که اجازه دهید اعلان های دسکتاپ نمایش داده شوند؟ اعلان‌های دسک‌تاپ زمانی ظاهر می‌شوند که پشتیبان‌گیری شروع می‌شود، به پایان می‌رسد، هشدار می‌دهد یا متوقف می‌شود. آنها فقط در مرورگرهای سازگار (معمولاً: کروم، سافاری، فایرفاکس، اپرا) نمایش داده می‌شوند که به Akeeba Backup اجازه نمایش اعلان‌های دسک‌تاپ را در صورت درخواست در صفحه کنترل پنل بدهید. این گزینه فقط کنترل می کند که آیا این درخواست باید نمایش داده شود یا خیر. هنگامی که مجوزهای پیام های اعلان دسکتاپ را پذیرفتید یا رد کردید، این تنظیم دارای <strong>no effect</strong> است. تنها راه فعال یا غیرفعال کردن اعلان‌های دسکتاپ از طریق تنظیمات مرورگر شما خواهد بود."
