COM_AKEEBABACKUP_ALICE_LBL_ONLYFAILED_SHOWINGLOGS="ALICE ابزاری برای تجزیه و تحلیل فایل‌های گزارش بک‌آپ‌های <em>failed</em> است و - در بیشتر موارد - محتمل‌ترین علت ناموفق شدن پشتیبان‌گیری‌گیری را به شما می‌دهد. این به معنای تجزیه و تحلیل فایل‌های ورود به سیستم پشتیبان‌گیری موفق نیست. انجام این کار نتایج مزخرف، گمراه کننده یا کاملاً اشتباه را به همراه خواهد داشت. به همین دلیل ما فقط فایل‌های گزارش مربوط به پشتیبان‌گیری <em>failed</em> را به شما نشان می دهیم."
COM_AKEEBABACKUP_ALICE_LBL_ONLYFAILED_WHATISFAILED="لطفاًً به یاد داشته باشید که پشتیبان‌گیری‌هایی که بایگانی پشتیبان را در فضای ذخیره‌سازی راه دور آپلود نکرده‌اند، با شکست مواجه نمی‌شوند. به هر حال دلیل اصلی این مشکلات توسط ALICE قابل شناسایی نیست. اگر چنین مشکلی دارید، باید یک تیکت پشتیبانی را در بخش پشتیبانی سایت ما ثبت کنید. اگر شخص دیگری Akeeba Backup Professional را برای شما در سایت شما نصب کرده است، لطفاًً به جای آن با آن شخص تماس بگیرید. در این صورت نمی توانید یک تیکت پشتیبانی در سایت ما ثبت کنید."
COM_AKEEBABACKUP_ALICE_LBL_ONLYFAILED_IFNOFAILED="اگر نسخه پشتیبان شما شکست خورد اما آن را در این صفحه نمی‌بینید، لطفاًً برای <em> سه (3) دقیقه صبر کنید</em>، به صفحه کنترل پنل Akeeba Backup برگردید و سپس به اینجا بازگردید. دلیلی برای آن وجود دارد. در برخی موارد ناموفق شدن پشتیبان‌گیری‌گیری به دلیل خطای سرور ایجاد می‌شود. در این موارد، پشتیبان‌گیری به‌جای شکست‌خوردگی به‌عنوان هنوز در حال انجام علامت‌گذاری می‌شود، زیرا PHP اجرا نمی‌شود، بنابراین کد PHP ما که پشتیبان‌گیری را به‌عنوان ناموفق علامت‌گذاری می‌کند، فرصت اجرا را پیدا نمی‌کند. هنگامی که از صفحه کنترل پنل بازدید می کنید، هر نسخه پشتیبان که بیش از 3 دقیقه به عنوان در حال انجام علامت گذاری شده باشد، به عنوان ناموفق علامت گذاری می شود. بنابراین باید منتظر بمانید و <em> سپس</em> به صفحه کنترل پنل بازگردید."

