COM_AKEEBABACKUP_CONFIG_ADVANCED_SETTIMELIMIT_DESC="اگر سرور شما PHP را در حالت ایمن اجرا نمی‌کند و از set_time_limit() پشتیبانی می‌کند، Akeeba Backup تلاش می‌کند حداکثر زمان اجرای PHP را برای رفع مشکلات احتمالی زمان‌بندی تنظیم کند."
