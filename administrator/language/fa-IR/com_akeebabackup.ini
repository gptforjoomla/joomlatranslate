COM_AKEEBABACKUP_CONFIG_MINEXECTIME_DESCRIPTION="هر مرحله Akeeba Backup <em>حداقل</em> به اندازه زمانی که اینجا تعیین شده طول می‌کشد. این گزینه برای دور زدن راهکارهای امنیتی ضد DoS لازم است. اگر خطای 403 Forbidden یا خطاهای AJAX دریافت می‌کنید، این مقدار را افزایش دهید. مقدار 0 این قابلیت را غیرفعال می‌کند.<br/><br/><strong>نکته</strong>: اگر مقدار مورد نظر شما در فهرست نیست، Custom را انتخاب کنید و مقدار دلخواه را وارد کنید."
