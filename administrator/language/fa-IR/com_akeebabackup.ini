COM_AKEEBABACKUP_CONFIG_PLATFORM_DBPORT_DESCRIPTION="(اختیاری) پورتی که سرور پایگاه داده به آن گوش می دهد. اگر مطمئن نیستید، برای استفاده از پورت پیش فرض (3306 برای سرورهای MySQL) این گزینه را خالی بگذارید. فقط زمانی استفاده می شود که چک باکس لغو پایگاه داده سایت تیک خورده باشد."
