COM_AKEEBABACKUP_SCHEDULE_LBL_ALTCLICRON="مشاغل جایگزین خط فرمان CRON"
COM_AKEEBABACKUP_SCHEDULE_LBL_ALTCLICRON_INFO="این روش تنها در صورتی توصیه می شود که کار معمولی CRON خط فرمان کامل نشود. حتی اگر از طریق برنامه کنسول Joomla در حال اجرا است، از طریق برنامه وب Joomla - با استفاده از روش پشتیبان‌گیری جلویی Akeeba Backup - که سرعت آن را نسبت به روش بومی CLI کندتر می کند."
COM_AKEEBABACKUP_SCHEDULE_LBL_CHECKHEADERINFO="<p>وقتی یک پشتیبان‌گیری زمان‌بندی‌شده ناموفق می‌شود، معمولاً یعنی PHP قبل از کامل شدن پشتیبان‌گیری متوقف شده است. بنابراین Akeeba Backup نمی‌تواند شکست پشتیبان‌گیری را همان‌طور که پایان موفق یا همراه با هشدار را اطلاع می‌دهد، به شما اطلاع دهد.</p><p>برای حل این مشکل می‌توانید بررسی آخرین پشتیبان را طوری زمان‌بندی کنید که بعد از زمان مورد انتظار پایان پشتیبان‌گیری اجرا شود. مطمئن نیستید چه زمانی مناسب است؟ بهتر است مدت آخرین پشتیبان موفق ثبت‌شده در صفحه مدیریت پشتیبان‌ها را به‌علاوه نیم ساعت در نظر بگیرید.</p><p>می‌توانید این بررسی را با روش‌های مختلف، درست مانند خود پشتیبان‌گیری، زمان‌بندی کنید. در ادامه اطلاعات بیشتری درباره هر روش زمان‌بندی موجود برای بررسی پشتیبان‌ها می‌بینید. اگر مطمئن نیستید کدام را انتخاب کنید، توصیه می‌کنیم همان روش زمان‌بندی پشتیبان‌ها را استفاده کنید.</p>"
COM_AKEEBABACKUP_SCHEDULE_LBL_CHECK_BACKUPS="وضعیت پشتیبان‌گیری را بررسی کنید"
COM_AKEEBABACKUP_SCHEDULE_LBL_CLICRON="کارهای CRON خط فرمان (توصیه می شود)"
COM_AKEEBABACKUP_SCHEDULE_LBL_CLICRON_INFO="این روش توصیه شده برای همه سرورهایی است که از کارهای خط فرمان CRON پشتیبانی می کنند. این روش از برنامه کنسول Joomla (CLI) - به جای برنامه وب Joomla! - برای دستیابی به حداکثر سرعت پشتیبان استفاده می کند."
COM_AKEEBABACKUP_SCHEDULE_LBL_CLIGENERICIMPROTANTINFO="مهم است"
COM_AKEEBABACKUP_SCHEDULE_LBL_CLIGENERICINFO="به یاد داشته باشید <em>%s</em> را با مسیر واقعی فایل اجرایی PHP <strong>CLI (Command Line Interface)</strong> هاست خود جایگزین کنید. حتماً باید از فایل اجرایی PHP CLI استفاده کنید؛ فایل اجرایی PHP CGI (Common Gateway Interface) با برنامه CLI جوملا کار <em>نمی‌کند</em>. اگر معنی این مورد را نمی‌دانید، لطفاً با هاست خود تماس بگیرید. فقط آن‌ها می‌توانند این اطلاعات را در اختیار شما قرار دهند."
COM_AKEEBABACKUP_SCHEDULE_LBL_ACCURATEINFO="Akeeba Backup تشخیص داده است که <em>محتمل‌ترین</em> مسیر PHP CLI برابر با <code>%s</code> است و از آن در دستور نمایش‌داده‌شده در بالا استفاده کرده است. اگر کار نکرد، لطفاً <code>%1$s</code> را با مسیر واقعی فایل اجرایی PHP <strong>CLI (Command Line Interface)</strong> هاست خود جایگزین کنید. هاست شما می‌تواند این اطلاعات را در اختیار شما قرار دهد."
COM_AKEEBABACKUP_SCHEDULE_LBL_FRONTENDBACKUP="ویژگی پشتیبان‌گیری جلویی"
COM_AKEEBABACKUP_SCHEDULE_LBL_FRONTENDBACKUP_INFO="این روش از یک URL عمومی و یک کلید مخفی برای راه اندازی یک نسخه پشتیبان از سایت شما استفاده می کند. پشتیبان‌گیری با استفاده از تغییر مسیرهای HTTP پیشرفت می کند. لطفاًً توجه داشته باشید که اکثر مشاغل «CRON» مبتنی بر URL میزبان، و همچنین اکثر سرویس‌های CRON مبتنی بر URL شخص ثالث، از تغییر مسیرهای HTTP پشتیبانی نمی‌کنند. اگر مثال‌های wget و curl در زیر برای شما کار نمی‌کنند، لطفاًً از URL پشتیبان جلویی با سرویس بسیار ارزان شخص ثالث webcron.org استفاده کنید."
COM_AKEEBABACKUP_SCHEDULE_LBL_FRONTENDBACKUP_MANYMETHODS="ویژگی پشتیبان‌گیری جلویی را می توان با روش های بسیار متنوعی استفاده کرد. برای مشاهده تمام توضیحات هر روش، روی برگه های زیر کلیک کنید. به یاد داشته باشید که همه آنها با جزئیات در مستندات ما توضیح داده شده است."
