COM_AKEEBABACKUP_CONFIG_DROPBOXREFRESHTOKEN_DESCRIPTION="این توکن Refresh است که Akeeba Backup را به Dropbox متصل می کند. این <strong>site-specific</strong> است و برای تأیید مجدد اتصال Dropbox زمانی که توکن دسترسی کوتاه مدت منقضی می شود استفاده می شود. اگر چندین سایت دارید، باید از دکمه های مرحله 1 در هر سایتی که می خواهید مجوز دهید استفاده کنید. لطفاًً <strong>DO NOT</strong> توکن دسترسی یا رفرش را در چندین سایت کپی کنید. این باعث می شود که احراز هویت Dropbox از همگام سازی خارج شود و شما باید همه سایت های خود را دوباره با Dropbox متصل کنید."
