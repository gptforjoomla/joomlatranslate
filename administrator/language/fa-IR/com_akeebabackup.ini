COM_AKEEBABACKUP_CONFIG_POSTPROC_ABORT_ON_FAIL_DESCRIPTION="اگر هنگام بارگذاری خطایی رخ دهد، فرایند پشتیبان‌گیری فوراً متوقف و ناموفق علامت‌گذاری می‌شود. <strong>این گزینه می‌تواند گمراه‌کننده و خطرناک باشد.</strong> ممکن است یک پشتیبان کامل و معتبر داشته باشید که فقط بارگذاری آن، کامل یا جزئی، ناموفق شده است. فعال کردن این گزینه فایل‌های باقی‌مانده پشتیبان را از سرور شما حذف می‌کند و فقط فایل‌هایی را که تا حدی در فضای راه دور بارگذاری شده‌اند باقی می‌گذارد. به بیان ساده، ممکن است هیچ پشتیبان قابل استفاده‌ای نداشته باشید. فقط در موارد بسیار محدودی این رفتار بهتر از حالت پیش‌فرض است؛ حالت پیش‌فرض به شما اجازه می‌دهد بارگذاری فایل پشتیبان را از صفحه مدیریت پشتیبان‌ها ادامه دهید. بنابراین قویاً توصیه می‌کنیم این گزینه فقط توسط کاربران باتجربه‌ای فعال شود که پیامدهای آن را کاملاً می‌دانند."
