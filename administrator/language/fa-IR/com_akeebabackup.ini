COM_AKEEBABACKUP_CONFIG_ENGINE_POSTPROC_S3_DESCRIPTION="فایل پشتیبان را در Amazon S3 بارگذاری می‌کند. این گزینه هم احراز هویت جدید (AWS4) مورد نیاز برای مکان‌های جدید S3 و هم احراز هویت قدیمی (AWS2) مورد نیاز برخی ارائه‌دهندگان فضای ذخیره‌سازی سازگار با S3 را پشتیبانی می‌کند.<br/><strong>اگر بارگذاری چندبخشی را غیرفعال می‌کنید، به یاد داشته باشید اندازه بخش‌های فایل پشتیبان را روی 2 تا 30Mb تنظیم کنید، وگرنه ممکن است به دلیل timeout پشتیبان‌گیری ناموفق شود!</strong><br/>اگر می‌خواهید به‌جای Access و Secret Key از Amazon STS استفاده کنید، لطفاً مستندات را بخوانید."
