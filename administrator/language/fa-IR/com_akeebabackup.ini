COM_AKEEBABACKUP_SCHEDULE_LBL_CHECK_UPLOADS_HEADERINFO="<p>وقتی بارگذاری پشتیبان در فضای ذخیره‌سازی راه دور پیکربندی‌شده ناموفق می‌شود، معمولاً خود پشتیبان‌گیری ناموفق در نظر گرفته نمی‌شود، مگر اینکه صراحتاً انتخاب کرده باشید چنین خطایی شکست محسوب شود. دلیلش این است که فایل پشتیبان هنوز روی سرور شما وجود دارد. با این حال باید به سایت خود برگردید و بارگذاری را از صفحه مدیریت پشتیبان‌ها دوباره امتحان کنید؛ شاید لازم باشد مشکل اتصال به فضای ذخیره‌سازی راه دور را هم برطرف کنید.</p></p>مشکل معمول این است که ممکن است از ناموفق بودن بارگذاری باخبر نشوید. اینجاست که بررسی بارگذاری پشتیبان‌ها کاربرد دارد. آن را طوری زمان‌بندی کنید که بعد از زمان معمول پایان پشتیبان‌های زمان‌بندی‌شده اجرا شود؛ اگر هرکدام از پشتیبان‌هایی که از آخرین اجرای بررسی گرفته شده‌اند در بارگذاری به فضای راه دور ناموفق باشند، برای شما ایمیل ارسال می‌کند.</p><p>می‌توانید این بررسی را با روش‌های مختلف، درست مانند خود پشتیبان‌گیری، زمان‌بندی کنید. در ادامه اطلاعات بیشتری درباره هر روش زمان‌بندی موجود برای بررسی بارگذاری پشتیبان‌ها می‌بینید. اگر مطمئن نیستید کدام را انتخاب کنید، توصیه می‌کنیم همان روش زمان‌بندی پشتیبان‌ها را استفاده کنید.</p>"


