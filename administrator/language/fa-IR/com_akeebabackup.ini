COM_AKEEBABACKUP_CONFIG_ADVANCED_SBBD_DESC="Akeeba Backup هر زمان که روی یک دامنه جدید شروع به کار کند، مرحله پردازش را می شکند. این امر پرحرفی فرآیند را بهبود می بخشد، اما زمان پشتیبان‌گیری را 10-20 ثانیه افزایش می دهد. وقتی این گزینه را فعال کنید، Akeeba Backup سریعتر کار می کند. با این حال، ممکن است در مراحل گزارش شده در صفحه پشتیبان، رفتاری پرش را تجربه کنید."
