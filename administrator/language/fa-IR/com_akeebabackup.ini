COM_AKEEBABACKUP_CONFIG_ARCHIVENAME_DESCRIPTION="الگوی نام‌گذاری فایل پشتیبان، در مواردی که قابل استفاده باشد. می‌توانید از ماکروهای زیر استفاده کنید:<ul><li><strong>[HOST]</strong> نام میزبان. هشدار! این تگ در حالت CRON کار نمی‌کند.</li><li><strong>[DATE]</strong> تاریخ فعلی</li><li><strong>[TIME_TZ]</strong> زمان فعلی و منطقه زمانی</li></ul>ماکروهای بیشتری هم وجود دارد؛ لطفاً مستندات را ببینید."
