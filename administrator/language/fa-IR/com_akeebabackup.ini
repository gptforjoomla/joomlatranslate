COM_AKEEBABACKUP_CONFIG_POSTPROCFTP_USER_TITLE="نام کاربری"
COM_AKEEBABACKUP_CONFIG_POSTPROCPARTS_DESCRIPTION="هنگامی که Akeeba Backup فعال باشد، موتور پس از پردازش را به محض کامل شدن، در برابر هر قطعه اجرا می کند. در صورت غیرفعال شدن، Akeeba Backup پس پردازش را برای همه قسمت‌ها در پایان فرآیند پشتیبان‌گیری اجرا می‌کند."
