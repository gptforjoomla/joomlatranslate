COM_AKEEBABACKUP_CONFIG_ADVANCED_SBPP_DESC="Akeeba Backup مرحله پردازش را بین مراحل فرعی نهایی‌سازی پشتیبان‌گیری و پس‌پردازش قطع می‌کند. این می تواند حدود 10 ثانیه به زمان کلی پشتیبان‌گیری اضافه کند. وقتی این گزینه را فعال کنید، Akeeba Backup سریعتر کار می کند. با این حال، این ممکن است منجر به مهلت زمانی یا خطاهای سرور داخلی شود."
