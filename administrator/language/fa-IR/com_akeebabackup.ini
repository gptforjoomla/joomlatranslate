COM_AKEEBABACKUP_CONFIG_PARTSIZE_DESCRIPTION="Akeeba Backup می تواند آرشیوهای تقسیم شده (چند قسمتی) ایجاد کند تا در شرایط مختلف محدودیت های اندازه را حل کند. این گزینه حداکثر اندازه هر قسمت آرشیو را مشخص می کند. اگر آن را به 0 کاهش دهید، ویژگی چند قسمتی غیرفعال می‌شود. </br><strong>مهم:</strong>اگر از موتور پردازش داده استفاده می‌کنید که بایگانی‌ها را به یک مکان دور (مانند فضای ذخیره‌سازی ابری) منتقل می‌کند، از تنظیمی در حدود 1 تا 5 مگابایت برای نتایج بهینه استفاده کنید."
COM_AKEEBABACKUP_CONFIG_PARTSIZE_TITLE="اندازه قسمت برای آرشیوهای تقسیم شده"
COM_AKEEBABACKUP_CONFIG_PCLOUD_ACCESSTOKEN_DESCRIPTION="<strong>WARNING! احراز هویت به دلیل مشکلاتی در سرور API pCloud کار نمی کند. این موتور پس از پردازش در نسخه آینده AKEEBA BACKUP.</strong> حذف خواهد شد. پس از تکمیل مرحله 1 تأیید هویت در بالا، به طور خودکار پر می شود. اگر سایت دیگری را به همان حساب pCloud پیوند می‌دهید، باید رمز دسترسی را از سایتی که قبلاً راه‌اندازی کرده‌اید کپی کنید و سعی نکنید دوباره مرحله 1 احراز هویت را اجرا کنید."
COM_AKEEBABACKUP_CONFIG_PCLOUD_ACCESSTOKEN_TITLE="رمز دسترسی"
COM_AKEEBABACKUP_CONFIG_PCLOUD_DIRECTORY_DESCRIPTION="نام پوشه در pCloud که آرشیو پشتیبان در آن ذخیره می شود. <strong>پوشه باید از قبل وجود داشته باشد، در غیر این صورت آپلود ناموفق خواهد بود.</strong>"
COM_AKEEBABACKUP_CONFIG_PCLOUD_DIRECTORY_TITLE="پوشه"
COM_AKEEBABACKUP_CONFIG_PERMISSIONS_0600="0600 - امنیت شدید. ممکن است در سرورهای پایین رده مشکل ایجاد کند"
