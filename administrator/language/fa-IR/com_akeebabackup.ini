COM_AKEEBABACKUP_CONFIG_JPS_PBKDF2USESTATICSALT_DESCRIPTION="وقتی فعال باشد (پیش‌فرض)، رمز عبور شما به یک کلید رمزنگاری که در سرتاسر بایگانی استفاده می‌شود، گسترش می‌یابد. این سریع است، اما در شرایط بسیار بعید که یک مهاجم با منابع کافی موفق شود کلید رمزنگاری را از یک بلوک رمزگذاری شده در فایل مهندسی معکوس کند - بدون اینکه خود رمز عبور شما را اجباری کند - سپس می توانند کل آرشیو پشتیبان را رمزگشایی کنند. هنگامی که غیرفعال می شود، یک کلید رمزنگاری متفاوت از رمز عبور شما در هر بلوک رمزگذاری شده استخراج می شود که بسیار کندتر است، اما از شما در برابر این نوع حمله محافظت می کند، و مهاجم را ملزم می کند تا رمز عبور را به زور اعمال کند که بسیار کندتر است."
