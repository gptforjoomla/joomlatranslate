COM_AKEEBABACKUP_CONFIG_PLATFORM_DBPREFIX_TITLE="پیشوند"
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBENCRYPTION_TITLE="با یک گواهی SSL متصل شوید"
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBENCRYPTION_DESCRIPTION="آیا باید با استفاده از گواهی SSL به پایگاه داده متصل شویم؟ این را می توان به جای احراز هویت نام کاربری و رمز عبور (اتصال رمزگذاری شده با تأیید اعتبار گواهی) یا <em> در بالای </em> تأیید نام کاربری و رمز عبور (اتصال رمزگذاری شده با تأیید اعتبار رمز عبور) استفاده کرد. اگر نمی دانید این به چه معناست، این گزینه را روی No قرار دهید و چند گزینه بعدی را نیز نادیده بگیرید."
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLCIPHER_TITLE="روش های رمزگذاری SSL/TLS"
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLCIPHER_DESCRIPTION="فهرستی از روش‌های رمزگذاری برای اتصال با گواهی‌های SSL را وارد کنید که با دو نقطه از هم جدا شده‌اند. اگر خالی بماند، لیست پیش فرض (<code>AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-CBC-SHA256:AES256-CBC-SHA384:DES-CBC3-SHA</code>) استفاده می شود (توصیه می شود)."
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLCA_TITLE="پرونده مرجع صدور گواهینامه (CA)."
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLCA_DESCRIPTION="مسیر فایل مطلق به فایل PEM گواهی مرجع صدور گواهینامه (CA) سرور پایگاه داده شما، به عنوان مثال. <code>/home/myuser/ca.pem</code>"
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLKEY_TITLE="فایل کلید خصوصی کاربر پایگاه داده"
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLKEY_DESCRIPTION="مسیر فایل مطلق به فایل PEM کلید خصوصی کاربر پایگاه داده شما، به عنوان مثال. <code>/home/myuser/myuser-key.pem</code>"
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLCERT_TITLE="فایل کلید عمومی کاربر پایگاه داده (گواهی)."
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLCERT_DESCRIPTION="مسیر فایل مطلق به فایل PEM کلید عمومی (گواهینامه) کاربر پایگاه داده شما، به عنوان مثال. <code>/home/myuser/myuser.pem</code>"
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLVERIFYSERVERCERT_TITLE="تایید گواهی سرور"
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBSSLVERIFYSERVERCERT_DESCRIPTION="برای تأیید گواهی که سرور برای ما ارسال می کند، روی Yes تنظیم کنید. این در برابر پرونده مرجع صدور گواهی (CA) که شما مشخص کرده اید تأیید می شود. اگر با خطاهای اتصال مواجه شدید، این را روی No تنظیم کنید. برخی از تنظیمات (مخصوصاً آنهایی که توسط <code>mysql_ssl_rsa_setup</code> ایجاد شده اند) ممکن است در صورت فعال بودن تأیید گواهینامه، اتصال را ممنوع کنند. اگر راستی‌آزمایی را فعال کنید و فیلد فایل CA خالی بماند، گواهی سرور در برابر فایل‌های Certification Authority که سرور شما از آنها می‌داند بررسی می‌شود، به گزینه‌های <code>openssl.cafile</code> و <code>openssl.capath</code> PHP مراجعه کنید."
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBUSERNAME_DESCRIPTION="نام کاربری برای اتصال به پایگاه داده سایت. فقط زمانی استفاده می شود که چک باکس لغو پایگاه داده سایت تیک خورده باشد."
COM_AKEEBABACKUP_CONFIG_PLATFORM_DBUSERNAME_TITLE="نام کاربری"
COM_AKEEBABACKUP_CONFIG_PLATFORM_NEWROOT_DESCRIPTION="هنگامی که گزینه Site Root Override را در بالا فعال کردید، Akeeba Backup از تمام فایل ها و پوشه‌های تحت ریشه این سایت نسخه پشتیبان تهیه می کند."
COM_AKEEBABACKUP_CONFIG_PLATFORM_NEWROOT_TITLE="Force Site Root"
COM_AKEEBABACKUP_CONFIG_PLATFORM_OVERRIDEDB_DESCRIPTION="هنگامی که علامت آن را بردارید (پیش‌فرض)، Akeeba Backup به طور خودکار از پایگاه داده سایتی که در آن نصب شده است (پایگاه داده Joomla! شما) یک نسخه پشتیبان تهیه می‌کند. وقتی علامت بزنید، با استفاده از جزئیات اتصالی که در زیر ارائه می کنید، از پایگاه داده دیگری نسخه پشتیبان تهیه می کند."
COM_AKEEBABACKUP_CONFIG_PLATFORM_OVERRIDEDB_TITLE="لغو پایگاه داده سایت"
COM_AKEEBABACKUP_CONFIG_PLATFORM_OVERRIDEROOT_DESCRIPTION="وقتی علامت آن را بردارید (پیش‌فرض) Akeeba Backup از همه فایل‌ها و فهرست‌های زیر ریشه سایتی که در آن نصب شده است، نسخه پشتیبان تهیه می‌کند. وقتی فعال باشد، از فایل‌ها و پوشه‌ها در پوشه انتخاب شده در Force Site Root زیر نسخه پشتیبان تهیه می‌کند."
COM_AKEEBABACKUP_CONFIG_PLATFORM_OVERRIDEROOT_TITLE="لغو ریشه سایت"
COM_AKEEBABACKUP_CONFIG_POSTPROCFTP_FTPS_DESCRIPTION="اگر فعال باشد، Akeeba Backup تلاش می‌کند با اتصال رمزنگاری‌شده SSL به سرور FTP شما وصل شود. <strong>این گزینه با SFTP، SCP یا \\"_QQ_"Secure FTP\\"_QQ_" یکسان نیست!</strong> توجه داشته باشید اگر سرور شما از این روش پشتیبانی نکند، خطای اتصال دریافت می‌کنید."
