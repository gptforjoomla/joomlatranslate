COM_AKEEBABACKUP_LBL_CPANEL_UPGRADED_FROM_AKEEBABACKUP8_BODY="شما قبلاً تنظیمات خود را از نسخه قدیمی Akeeba Backup منتقل کرده اید. اگر می‌خواهید دوباره مهاجرت را اجرا کنید، روی «انتقال تنظیمات» کلیک کنید. اگر از انتقال راضی هستید، روی \\"_QQ_"Show me what to uninstall\\"_QQ_" را کلیک کنید تا صفحه \\"_QQ_"Extensions: Manage\\"_QQ_" Joomla به افزونه قدیمی Akeeba Backup باز شود. سپس می توانید آن را انتخاب کرده و بر روی Uninstall کلیک کنید تا حذف شود."
COM_AKEEBABACKUP_LBL_CPANEL_UPGRADED_FROM_AKEEBABACKUP8_NOTE="اگر حذف نصب نسخه قدیمی Akeeba Backup انجام نشد لطفاًً موارد زیر را انجام دهید. ابتدا آخرین نسخه Akeeba Backup 8 را نصب کنید. سپس آخرین نسخه Akeeba Backup را برای Joomla 4 نصب کنید. به این صفحه بازگردید و روی \\"_QQ_"Show me what to uninstall\\"_QQ_" کلیک کنید. شما به خوبی قادر خواهید بود آن را حذف کنید. لطفاًً توجه داشته باشید که پیام‌های مربوط به عدم امکان حذف نصب FOF یا FEF را می‌توان نادیده گرفت. Akeeba Backup 8 بدون توجه به این پیام ها حذف نصب خواهد شد."
COM_AKEEBABACKUP_LBL_CPANEL_UPGRADED_FROM_AKEEBABACKUP8_BTN="به من نشان بده چه چیزی را حذف کنم"

COM_AKEEBABACKUP_UPGRADE="مهاجرت تنظیمات"
COM_AKEEBABACKUP_UPGRADE_LBL_WARNING_STANDARD="این عملیات تمام تنظیمات موجود و سابقه پشتیبان‌گیری شما را بازنویسی می کند."
COM_AKEEBABACKUP_UPGRADE_LBL_WARNING_INCOMPATIBLE_HEAD="الزامات مهاجرت برآورده نمی شود"
COM_AKEEBABACKUP_UPGRADE_LBL_WARNING_INCOMPATIBLE_BODY="ما نسخه سازگار Akeeba Backup را شناسایی نکرده ایم. اگر اکنون سعی کنید مهاجرت را اجرا کنید، ممکن است با خطاها و/یا از دست دادن داده مواجه شوید. ادامه ندهید مگر اینکه صراحتاً توسط توسعه دهندگان ما به شما دستور داده شده باشد. این هشدار جدی را با خطر و خطر خود نادیده بگیرید!"
COM_AKEEBABACKUP_UPGRADE_LBL_WARNING_ALREADY_RAN_HEAD="شما قبلا تنظیمات خود را انتقال داده اید"
COM_AKEEBABACKUP_UPGRADE_LBL_WARNING_ALREADY_RAN_BODY="قبلاً مهاجرت را اجرا کرده اید. اگر سعی کنید دوباره مهاجرت را اجرا کنید، ممکن است با خطاها و/یا از دست دادن داده مواجه شوید. ادامه ندهید مگر اینکه صراحتاً توسط توسعه دهندگان ما به شما دستور داده شده باشد. این هشدار جدی را با خطر و خطر خود نادیده بگیرید!"
COM_AKEEBABACKUP_UPGRADE_LBL_WHAT_IT_DOES="Akeeba Backup برای Joomla! تنظیمات پیکربندی، نمایه‌های پشتیبان، سابقه پشتیبان‌گیری و <em>some</em> بایگانی‌های پشتیبان (آنهایی که در <code>administrator/components/com_akeeba/backup</code>) از نسخه قدیمی‌تری از ZXQQT. رونویسی تمام تاریخ های موجود برای جلوگیری از از دست رفتن داده ها، فقط باید در اولین باری که Akeeba Backup را برای Joomla! نصب می کنید از این ویژگی استفاده کنید."
COM_AKEEBABACKUP_UPGRADE_LBL_REMEMBER_TO_UNINSTALL="به یاد داشته باشید که پس از تکمیل انتقال، نسخه قدیمی Akeeba Backup را حذف نصب کنید. از آیتم منوی نوار کناری Joomla به نام «سیستم» استفاده کنید. پنل Manage را پیدا کنید و روی Extensions کلیک کنید. پسوند <em>Akeeba Backup بسته</em> از نوع \\"_QQ_"Package\\"_QQ_" را پیدا کرده و انتخاب کنید. سپس بر روی دکمه Uninstall در نوار ابزار کلیک کنید."
COM_AKEEBABACKUP_UPGRADE_BTN_PROCEED="مهاجرت را ادامه دهید"
COM_AKEEBABACKUP_UPGRADE_LBL_SUCCESS="انتقال تنظیمات با موفقیت انجام شد."
COM_AKEEBABACKUP_UPGRADE_LBL_FAIL="انتقال تنظیمات کامل نشد. ممکن است مجبور شوید پروفایل‌های پشتیبان خود را به صورت دستی وارد کنید و/یا بایگانی های پشتیبان را انتقال و وارد کنید."

COM_AKEEBABACKUP_CONFIG_ENGINE_POSTPROC_ONEDRIVEAPP_TITLE="آپلود در Microsoft OneDrive (پوشه مخصوص برنامه)"
COM_AKEEBABACKUP_CONFIG_ENGINE_POSTPROC_ONEDRIVEAPP_DESCRIPTION="بایگانی پشتیبان را در مایکروسافت OneDrive، داخل پوشه مخصوص برنامه برای Akeeba Backup (<code>Apps/Akeeba Backup</code>) آپلود می کند. این نسبت به سایر گزینه‌های آپلود OneDrive محدودتر است، اما کمتر احتمال دارد که در برخی از حساب‌ها که مشکلات احراز هویت را با سایر ادغام‌هایی که ما ارائه می‌کنیم، مشکل ایجاد کند."
COM_AKEEBABACKUP_CONFIG_ONEDRIVEAPP_DIRECTORY_TITLE="زیر شاخه در <code>Apps/Akeeba Backup</code>"
COM_AKEEBABACKUP_CONFIG_ONEDRIVEAPP_DIRECTORY_DESCRIPTION="زیرپوشه‌ای داخل پوشه اختصاصی برنامه Akeeba Backup یعنی (<code>Apps/Akeeba Backup</code>) در Microsoft OneDrive شما که فایل‌های پشتیبان در آن بارگذاری می‌شوند. لطفاً از اسلش رو به جلو استفاده کنید (<code>/</code>)، نه بک‌اسلش (<code>\\<code>)، و همیشه ابتدای مسیر یک اسلش رو به جلو بگذارید. درست: <code>/some/thing</code>. نادرست: <code>some\thing</code>. یک اسلش تنها یعنی فایل‌ها در ریشه drive ذخیره می‌شوند. مسیر پوشه اختصاصی برنامه (<code>Apps/Akeeba Backup</code>) را وارد نکنید؛ این بخش را خود Microsoft OneDrive به‌صورت خودکار اضافه می‌کند!"

