COM_AKEEBABACKUP_CONFIG_ENGINE_POSTPROC_SFTPCURL_DESCRIPTION="فایل پشتیبان را روی یک سرور SFTP (SSH) راه دور بارگذاری می‌کند. این انتقال فایل روی SSH و با پروتکلی به نام SFTP انجام می‌شود که با FTP و FTPS <em>کاملاً متفاوت</em> است.<br/>این موتور پس‌پردازش برای انتقال داده از cURL استفاده می‌کند؛ کتابخانه‌ای که با طیف گسترده‌ای از سرورهای SFTP سازگار است.<br/><strong>به یاد داشته باشید اندازه بخش‌های فایل پشتیبان را روی 2 تا 30Mb تنظیم کنید، وگرنه ممکن است به دلیل timeout پشتیبان‌گیری ناموفق شود!</strong>"
