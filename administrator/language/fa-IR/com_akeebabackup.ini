COM_AKEEBABACKUP_CONFIG_POSTPROCFTP_OPTSUBDIR_TITLE="پوشه فرعی"
COM_AKEEBABACKUP_CONFIG_POSTPROCFTP_PASSIVE_DESCRIPTION="هنگام انتقال داده از حالت غیرفعال FTP استفاده کنید. این به طور پیش فرض فعال است زیرا تنها روشی است که از طریق فایروال هایی که معمولاً روی سرورهای وب نصب می شوند کار می کند. غیرفعال نکنید مگر اینکه مطمئن باشید وب سرور شما پشت فایروال نیست و سرور FTP شما مطلقاً به انتقال فایل حالت فعال نیاز دارد."
