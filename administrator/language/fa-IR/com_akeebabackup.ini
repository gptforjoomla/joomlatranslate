COM_AKEEBABACKUP_CONFIG_POSTPROCFTP_HOST_DESCRIPTION="نام میزبان سرور FTP، بدون پروتکل. این بدان معنی است که <code>ftp://example.com</code> <strong>invalid</strong> است و <code>example.com</code> معتبر است. این موتور فقط از سرورهای FTP و FTPS پشتیبانی می کند. <u></u> از SFTP، SCP و دیگر انواع SSH پشتیبانی نمی کند."
