COM_AKEEBABACKUP_BUADMIN_LABEL_HOWDOIRESTORE_TEXT_CORE_INFO_ABOUT_PRO="<strong>این کار <em>می‌تواند</em> ساده‌تر هم باشد.</strong> می‌توانید فایل‌های پشتیبان را از داخل رابط Akeeba Backup، روی همان سرور یا سروری دیگر بازیابی کنید. نیازی نیست فایل‌ها را خودتان منتقل کنید. درباره این قابلیت‌ها و امکانات بیشتر که فقط در <a href=\\"_QQ_"%s\\"_QQ_">Akeeba Backup Professional</a> در دسترس است بیشتر بدانید!"
COM_AKEEBABACKUP_BUADMIN_LABEL_HOWDOIRESTORE_TEXT_PRO="<p>ساده است! کادر کنار یک مورد پشتیبان را انتخاب کنید. سپس روی دکمه <em>Restore</em> در نوار ابزار کلیک کنید.</p><p>اگر می‌خواهید روی یک سرور عمومی جدید بازیابی کنید، می‌توانید از <a href=\\"_QQ_"%2$s\\"_QQ_">Site Transfer Wizard</a> استفاده کنید. اگر ترجیح می‌دهید دستی انجام دهید یا روی رایانه یا شبکه داخلی خود بازیابی کنید، لطفاً <a href=\\"_QQ_"%1$s\\"_QQ_" target=\\"_QQ_"_blank\\"_QQ_">آموزش ویدئویی</a> ما را ببینید و برای استخراج فایل‌های پشتیبان، <a href=\\"_QQ_"%3$s\\"_QQ_" target=\\"_QQ_"_blank\\"_QQ_">Akeeba Kickstart Core را به‌صورت رایگان دانلود کنید</a>.</p>"
