COM_AKEEBABACKUP_TRANSFER_ERR_NEWURL_NOTEXISTS="سرور شما نمی تواند به URL وارد شده دسترسی پیدا کند. لطفاً بررسی کنید که آن را به درستی تایپ کرده اید. همچنین توجه داشته باشید که نام‌های دامنه جدید اختصاص داده شده یا منتقل شده ممکن است <strong> تا 48 ساعت </strong> قبل از اینکه برای هر سرور و رایانه متصل به اینترنت قابل مشاهده باشند، طول بکشد."
COM_AKEEBABACKUP_TRANSFER_ERR_NEWURL_SAME="نشانی اینترنتی که وارد کردید همان آدرسی است که از آن بازیابی می کنید. این توسط این جادوگر پشتیبانی نمی شود. برای بازیابی پشتیبان بدون استفاده از جادوگر، لطفاًً به آموزش ویدیویی ما در پیوند زیر مراجعه کنید."
