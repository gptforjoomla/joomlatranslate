PLG_WEBSERVICES_AKEEBABACKUP_XML_DESCRIPTION="پشتیبانی از Akeeba JSON API v3 را روی سایت شما فعال می‌کند تا بتوانید با نرم‌افزارها و برنامه‌های سازگار، از راه دور پشتیبان تهیه و مدیریت کنید.<br/><strong>مهم!</strong> این قابلیت به دسترسی بدون مانع به برنامه Joomla API سایت شما نیاز دارد؛ یعنی پوشه <code>/api</code>. اگر دسترسی به برنامه Joomla API را غیرفعال کرده باشید، فعال کردن این افزونه به‌تنهایی کافی نیست. لطفاً مستندات را بخوانید."
